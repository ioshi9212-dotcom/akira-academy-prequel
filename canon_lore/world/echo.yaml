lore_id: echo
visibility: world_context
version: compact_v2

short_definition:
  - "Эхо — аномальное проявление нарушенного энергетического баланса."
  - "Эхо может быть кратким и почти незаметным, а позже — физическим, опасным и разрушительным."
  - "Эхо не появляется из-за одного бытового фона студента."

scene_usage:
  - "Использовать как источник тревоги, слухов, ограничений, рейдов и реальной опасности."
  - "Если Эхо рядом, сцена должна ощущать давление: тишина, сбой, холод, дрожь пространства, тревога персонала."

do_not:
  - "Не превращать Эхо в обычного монстра недели."
  - "Не раскрывать полный механизм случайным студентам."
