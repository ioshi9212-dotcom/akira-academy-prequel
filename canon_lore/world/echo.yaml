lore_id: echo
visibility: public_world
tags: ["echo", "anomaly", "balance", "danger"]

short_definition:
  - "Эхо — аномальное проявление нарушенного энергетического баланса."
  - "Сначала Эхо может быть кратким, скрытым и почти незаметным."
  - "Позже Эхо может становиться физическим, разрушительным и опасным для людей."

scene_usage:
  - "Использовать Эхо как источник тревоги, слухов, ограничений, проверок и реальной опасности."
  - "Эхо не обязано появляться как монстр в каждой сцене."
  - "Если Эхо рядом, сцена должна ощущать давление: тишина, сбой, холод, дрожь пространства, тревога персонала, странная реакция энергии."

do_not:
  - "Не превращать Эхо в обычную магическую зверушку."
  - "Не раскрывать полный механизм Эхо случайным студентам."
  - "Не делать Эхо бытовой шуткой, если сцена не даёт на это основание."
