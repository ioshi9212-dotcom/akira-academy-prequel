lore_id: kairos
visibility: world_context
version: compact_v2

short_definition:
  - "Кайросы — не обычные люди; они глубже связаны с энергией, природным балансом и скрытым устройством мира."
  - "Люди часто понимают кайросов неполно, искажённо или через слухи."
  - "Гибриды и чистые кайросы могут восприниматься иначе, но это не знание для случайного NPC."

scene_usage:
  - "Упоминать кайросов только если сцена, персонаж или файл дают основание."
  - "Учитывать знания говорящего: студент, врач, куратор, сектор, исследователь — разные уровни доступа."

do_not:
  - "Не раскрывать природу Акиры без сыгранного основания."
  - "Не делать каждого кайроса одинаковым."
  - "Не выдавать скрытый расовый/энергетический факт датчиком или случайной фразой."
