lore_id: kairos
visibility: public_world
tags: ["kairos", "race", "balance", "nature"]

short_definition:
  - "Кайросы — не обычные люди. Они глубже связаны с энергией, природным балансом и скрытым устройством мира."
  - "Кайросы возвращают баланс иначе, чем люди."
  - "Гибриды и чистые кайросы могут восприниматься системой, Академией или сенсорами иначе."

scene_usage:
  - "Упоминание кайросов должно ощущаться не как справочник, а как социальный/политический/энергетический факт мира."
  - "Если персонаж говорит о кайросах, учитывать его знания, происхождение и отношение."
  - "Не все люди понимают кайросов правильно."

do_not:
  - "Не раскрывать скрытую природу Акиры без основания."
  - "Не делать каждого кайроса одинаковым."
  - "Не выдавать скрытый расовый/энергетический факт тем, кто не мог его знать."
