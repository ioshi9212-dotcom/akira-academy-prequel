lore_id: continents_and_worlds
visibility: world_context
version: compact_v2

summary:
  - "Есть человеческий материк/цивилизация и скрытый второй слой мира, связанный с кайросами, закрытыми территориями и энергетическим балансом."
  - "Большинство людей живёт в современном человеческом устройстве: города, документы, транспорт, связь, обучение, работа."
  - "Секторы и закрытые структуры знают о мире больше, чем обычные студенты."

scene_usage:
  - "Использовать как фон политики, маршрутов, недоступных зон и слухов."
  - "Не превращать упоминание материков в лекцию."
  - "Не давать студентам точные hidden-факты без источника."
