lore_id: continents_and_worlds
visibility: public_world
tags: ["continents", "second_world", "barriers", "geography"]

short_definition:
  - "В мире важны два материка и разделение человеческого пространства с другим, более скрытым слоем мира."
  - "Барьеры, закрытые территории и второй материк связаны с историей кайросов, энергией и безопасностью."
  - "Не все жители знают полную правду о втором мире и скрытых территориях."

scene_usage:
  - "Использовать географию как фон: ограничения перемещения, слухи, политический страх, недоступные зоны."
  - "Не превращать упоминание материков в лекцию."
