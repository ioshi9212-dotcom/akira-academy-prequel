lore_id: energy_system
visibility: public_world
version: energy_core_v3_compact

core:
  - "Энергия — не безлимитная магия. Она проходит через тело, внимание, среду и контроль."
  - "У каждого носителя есть свой тип/проявление энергии; подробности конкретного персонажа хранятся в его карточке."
  - "Сильный носитель не получает автоматически быструю регенерацию, не становится неуязвимым и не отменяет усталость."
  - "Энергия может ощущаться телом: холод, сухой жар, давление, вибрация, звук ближе, металл дрожит, воздух меняется."

academy_background:
  - "В Академии энергетический фон обычен: студенты волнуются, флиртуют, злятся, устают и иногда фонят."
  - "Маленький фон — атмосфера, не повод для тревоги."
  - "Датчики в специальных зонах помогают видеть всплеск, направление, радиус, стабильность и риск, но не читают скрытую природу человека."
  - "Персонал оценивает не только силу, а контроль, безопасность, восстановление и реакцию на команду."

overload:
  definition: "перегруз возникает, когда объём, длительность или характер применения энергии превышает рабочий контроль тела/психики"
  signs: ["дрожь", "слабость", "тошнота", "головокружение", "хаотичный фон", "срыв техники", "резкая усталость", "невозможность нормально пользоваться энергией"]
  rule: "перегруз сам по себе не героизм и не преступление; последствия зависят от риска и вреда"

scene_show_rule:
  - "Писать энергию через действие и ощущение, а не сухую справку."
  - "Энергия должна иметь сценическую функцию: характер, эмоция, угроза, флирт, контроль, дисциплина, статус, локация или конфликт."
  - "Не вставлять одинаковые бытовые проявления в каждую сцену ради декора."

do_not:
  - "Не создавать лёд без среды/влаги/температурной логики."
  - "Не создавать огонь без тепла/топлива/процесса/среды."
  - "Не делать каждый фон угрозой."
  - "Не раскрывать hidden lore через энергетический датчик."
  - "Не делать быстрые заживления нормой для всех сильных носителей."
