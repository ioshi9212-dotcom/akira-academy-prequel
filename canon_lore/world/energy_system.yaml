core_definition:
- Энергия — не ресурс, не мана и не объект.
- Энергия — непрерывный поток системы мира, связанный с пространством, природой, телом и живыми существами.
- Её нельзя просто взять, накопить и потратить без последствий.
- Любое взаимодействие с энергией входит в общий баланс мира.
access:
  can_use:
  - кайросы
  - гибриды
  - потомки гибридов
  cannot_use:
  - обычные люди без связи с гибридной/кайросской линией
  bloodline_rule:
  - Даже слабое присутствие энергии в роду может сделать человека носителем.
  - Слабый носитель не обязательно ярко проявляет энергию, но связь с потоком есть.
interaction_modes:
  flow_alignment:
    name: встраивание в поток
    meaning:
    - существо действует в рамках системы, не вырывая энергию грубо
    - энергия направляется, а не насильно вытягивается
    - требует контроля, внутренней устойчивости и понимания среды
    - может иметь цену через тело, психику, жизненный ресурс или компенсацию баланса
    kairos_rule:
    - кайросы изначально существуют в этой системе и естественно поддерживают баланс
  force_use:
    name: насильственное использование
    meaning:
    - энергия вытягивается и эксплуатируется
    - пользователь берёт эффект без компенсации
    - это нарушает общий баланс
    - люди и потомки гибридов чаще используют энергию именно так из-за непонимания, привычки или отсутствия необходимости встраиваться мягче
echo_balance:
- Эхо не реагируют на единичный бытовой выброс одного человека.
- Эхо — реакция системы на общий масштаб дисбаланса.
- Если значительная часть носителей использует энергию неправильно и не компенсирует воздействие, система выходит из равновесия.
- 'Не писать: один студент фонит — сразу появилось Эхо.'
character_card_rule:
- Персональные подробности энергии хранятся блоком energy в карточке персонажа.
- 'Не создавать отдельный файл под каждый тип энергии: видов может быть много.'
- 'В карточке персонажа должны быть: тип, класс/уровень на поступление, фон, визуальное ощущение, активное проявление, что умеет, ограничения, запреты для ИИ.'
scene_show_rule:
- Писать энергию эффектно, но без нарушения логики мира.
- Не писать сухие технические фразы вместо энергии.
- 'В сцене энергия должна ощущаться телом: кожа чувствует холод, звук становится ближе, металл дрожит, воздух суше, траектория срывается, пространство давит.'
- 'Эффект должен иметь цель: характер, эмоция, угроза, флирт, контроль, дисциплина, статус, локация или конфликт.'
academy_energy_background:
  normal:
  - В Академии почти все студенты имеют энергетический фон.
  - 'Особенно новички могут фонить заметнее: эмоции, стресс, флирт, злость, усталость и желание показаться сильнее усиливают фон.'
  - Небольшие проявления энергии в быту нормальны.
  - У Райдена рядом может появиться иней или тонкий холод — это не событие само по себе.
  - У Хару воздух может становиться суше и теплее.
  - У Ливии звуки могут казаться ближе, громче или резче.
  - У Киары могут дрожать металлические детали формы или украшений.
  not_a_show_fair:
  - Не вставлять бытовые демонстрации энергии в каждую сцену ради декора.
  - Не повторять один шаблонный пример снова и снова.
  - Энергия появляется, когда она показывает характер, эмоцию, атмосферу, конфликт, статус, дисциплину или локацию.
overload:
  definition:
  - Перегруз возникает, когда объём или характер применения энергии не совпадает с возможностями тела, психики или контроля.
  consequences:
  - физические повреждения
  - психическая нестабильность
  - потеря контроля
  - хаотичный выброс
  - откат
  - временная невозможность нормально пользоваться энергией
do_not:
- Не писать энергию как безлимитную магию.
- Не делать каждый фон угрозой.
- Не делать энергию невидимой и скучной.
- Не создавать лёд без воды/влаги/источника.
- Не создавать огонь без процесса/тепла/топлива/среды.
