lore_id: energy_system
visibility: public_world
tags: ["energy", "raider", "type", "response", "element", "space"]

short_definition:
  - "Энергия в мире связана с природой, телом, типом носителя и способностью контролировать отклик."
  - "Тип энергии может проявляться через элемент, физический эффект, пространство, подавление, свет, тепло, холод и другие формы."
  - "Академия проверяет базовый отклик, контроль, безопасность и практическое применение."

scene_usage:
  - "Энергетические проверки должны быть конкретными: импульс, отклик, контроль, сенсорная реакция, физическая усталость."
  - "Сильный контроль не равен отсутствию энергии."
  - "Не раскрывать максимум персонажа без сыгранной причины."

do_not:
  - "Не делать энергию безлимитной демонстрацией."
  - "Не заставлять систему сразу понимать скрытый потенциал Акиры."
  - "Не путать контроль энергии с эмоциональной открытостью."
