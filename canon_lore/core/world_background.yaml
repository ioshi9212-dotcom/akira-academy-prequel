lore_id: world_background
visibility: public_world_compact
always_load: true
version: world_core_v3_compact

definition:
  - "Мир внешне современный: города, связь, транспорт, обычная техника, учреждения, деньги, документы."
  - "В мире есть люди с проявленной энергией. Энергия даёт способности, но не отменяет тело, усталость, травмы, цену контроля и последствия."
  - "Академия Астрейн готовит сильных носителей энергии к практической работе: рейды, защита, сопровождение, контроль, кризисные ситуации."
  - "Существуют скрытые темы мира: кайросы, Эхо, второй материк/закрытые территории, политические и энергетические последствия."
  - "Скрытые темы не становятся знанием персонажа без сценического источника."

public_tone:
  - "Для большинства студентов Академия — элитное место подготовки сильных носителей, а не мистическая школа."
  - "Эхо, рейды и закрытые зоны звучат как реальная опасность мира, но не как справочник в каждой сцене."
  - "Лор показывать через детали: правила, слухи, осторожность персонала, ограничения, реакции тела, учебные блоки, социальное давление."

knowledge_boundary:
  - "Автор/движок может знать больше, чем персонажи."
  - "NPC не знают hidden lore, прошлые циклы, тайную природу Акиры, связь Акиры и Райдена или будущий канон без сыгранного источника."
  - "Если NPC не знает факт, он может подозревать, ошибаться, спрашивать, проверять или строить версию."

do_not:
  - "Не превращать сцену в лекцию по устройству мира."
  - "Не раскрывать hidden lore ради красивой фразы."
  - "Не делать энергию безлимитной магией."
  - "Не делать современный мир древним, средневековым или киберпанковым без причины."
