lore_id: academy_rules
visibility: academy_common
tags: ["academy", "rules", "checks", "ratings", "admissions"]

summary:
  - "Академия использует регистрацию, допуски, проверки, рейтинги, расписание, кураторское наблюдение и тренировочные блоки."
  - "Первые дни после прибытия — проверки и адаптация, до полноценного начала обучения."
  - "Регистрация не должна раскрывать конфиденциальные досье публично."
  - "Проверки должны быть процедурой, а не допросом без причины."

rules:
  - "Не раскрывать закрытые данные персонажа толпе."
  - "Не делать каждого сотрудника подозрительным без основания."
  - "Не превращать каждую процедуру в тайный тест."
  - "Если процедура скучная, сокращать до значимого момента."
