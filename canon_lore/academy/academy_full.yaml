lore_id: academy_full
visibility: academy_common
version: academy_rules_systems_v4_compact

core:
  formula:
    - "Свобода есть. Последствия тоже есть."
    - "Сорвался сам — вставай, лечись, делай выводы."
    - "Задел другого — это уже дисциплинарная проблема."
    - "Выдержал нагрузку и слушаешь команды — получаешь больше допуска."
  not_about:
    - "не про роскошь"
    - "не про тотальный контроль"
    - "не про публичное унижение слабых"
    - "не про чудо-технику, которая всё знает"

staff:
  registration:
    tone: "вежливо-сухой, процедурный"
    can: ["сверить документы", "выдать пропуск/маршрут", "направить на медосмотр", "выдать форму", "позвать старшего при странности данных"]
    forbidden: ["читать закрытое досье вслух", "обсуждать тип энергии перед очередью", "устраивать драму из каждого новичка"]
  medical:
    tone: "профессиональный, спокойный, сухой"
    method: ["осмотр", "вопросы", "пульс", "давление", "координация", "обычные приборы", "минимальный энергетический отклик при необходимости"]
    can: ["зафиксировать травму", "ограничить нагрузку", "направить к куратору", "заметить несостыковку и спросить"]
    forbidden: ["мгновенно знать дату царапины", "сканировать скрытую природу", "выдавать hidden lore", "делать публичную тревогу без причины"]
  instructors:
    tone: "резкий, практичный, внимательный"
    can: ["остановить упражнение", "дать повтор", "снизить/повысить нагрузку", "назначить наблюдение", "прервать опасный поток", "отстранить от блока"]
    rule: "инструктор смотрит на технику, контроль, риск, восстановление, реакцию на команду и вред окружающим"
  curators:
    role: "не классные руководители, а специалисты траектории: нагрузка, допуски, дисциплина, конфликты, пригодность к направлению"
  senior_students:
    role: ["помогают наблюдать", "держат пары/группы", "следят за техникой и безопасностью", "могут быть социальными крючками"]
    boundary: "не знают hidden lore и не становятся всезнающими надзирателями"

uniform:
  base:
    - "Основной цвет — тёмно-бордовый, база — чёрная."
    - "Форменный жакет/пиджак/куртка с эмблемой — главный обязательный элемент."
    - "Форма дисциплинирует и обозначает принадлежность к Академии, но не должна выглядеть как дорогой школьный костюм ради красоты."
  required_time: "08:00-15:00 для учебных, официальных и административных зон"
  exceptions:
    - "физический блок может требовать тренировочную одежду или адаптацию формы"
    - "после 15:00 допустима свободная одежда"
    - "медблок/спортзоны/бассейн требуют практичности и безопасности"
  state_rule:
    - "received_uniform != current_outfit"
    - "uniform_worn=true нужен, чтобы писать форму как надетую"

energy_and_safety:
  normal:
    - "В Академии почти все фонят энергией в разной степени; небольшой фон не считается событием."
    - "Выброс энергии сам по себе не нарушение. Важны направление, стабильность, риск и вред."
    - "Самоперегруз фиксируют и лечат, но не превращают в трагедию без угрозы другим."
  serious:
    - "применение энергии в толпе без причины"
    - "провокация чужого перегруза"
    - "вред партнёру"
    - "отказ остановиться по команде"
    - "использование энергии в драке без допуска"
  forced_interruption:
    when: ["потеря контроля", "опасное нарастание", "угроза партнёру", "намеренный вред", "игнор команды"]
    effect: ["резкий обрыв потока", "тошнота", "дрожь", "слабость", "откат", "несколько часов плохого доступа к энергии"]
    rule: "это аварийное вмешательство, а не наказание ради наказания"

training_system:
  directions:
    - "физическая подготовка"
    - "энергетический контроль"
    - "тактика"
    - "спарринги"
    - "захват и удержание"
    - "сопровождение/эвакуация"
    - "стрельба и оружейная дисциплина"
    - "командная работа"
    - "выживание под давлением"
  physical_profile_checks:
    - "Академия смотрит рабочий минимум и верхний рабочий уровень, а не публичный максимум для рейтинга."
    - "Проверки нужны для индивидуальной нагрузки, слабых мест, преимуществ и восстановления."
    - "Никого не обязаны делить на слабых/сильных при всех."
  practical_rule:
    - "Тренировка должна ощущаться телом: дыхание, мышцы, пот, покрытие под ногами, команда инструктора, взгляд наблюдателя."
    - "Не заменять физику сцены экраном с результатами."

technology_policy:
  allowed:
    - "обычные современные приборы и техника"
    - "планшеты, компьютеры, камеры, пропуска, рации"
    - "пульсометры/таймеры/датчики нагрузки"
    - "простые датчики энергии в специальных зонах"
  forbidden:
    - "тотальные сканеры тела"
    - "автоматическое считывание органов и скрытой природы"
    - "ИИ, который сам раскрывает тайны персонажа"
    - "голографический футуризм как обычный стиль Академии"
    - "техника, заменяющая наблюдение врача, инструктора или старшекурсника"

ratings_and_access:
  sources: ["дисциплина", "контроль", "тренировки", "командность", "реакция на стресс", "ошибки и исправления", "безопасность энергии", "репутация", "отзывы инструкторов"]
  access: ["тренировочные блоки", "спарринги", "стрельбище", "полигон", "энергетическая практика", "командные задачи", "повышенный риск"]
  rule: "рейтинг не должен звучать как игровое табло в каждой сцене; это фон доступа, статуса и последствий"

daily_life:
  - "Быт писать, если он двигает сцену: усталость, отношения, слухи, репутация, конфликт, восстановление, выбор маршрута."
  - "Студенты живые: едят, шутят, флиртуют, спорят, тренируются, завидуют, наблюдают, ошибаются."
  - "Свободное время после 15:00 не пустое: оно создаёт социальные сцены и выборы игрока."

do_not:
  - "Не делать каждую проверку тайным экспериментом."
  - "Не делать каждую ошибку катастрофой."
  - "Не делать персонал тупым или всезнающим."
  - "Не давать NPC hidden lore через датчик/медосмотр/слух."
  - "Не превращать Академию в сухую канцелярию."
  - "Не забывать физику тела и обычные человеческие способы проверки."
