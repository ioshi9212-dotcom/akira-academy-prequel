core_identity:
  - "Академия Астрейн — элитная система подготовки сильных носителей энергии, будущих рейдеров и специалистов."
  - "Элитность Академии не в богатом ремонте и не в дорогой форме, а в специалистах, кураторах, инструкторах, практических площадках, датчиках и свободе для сильных."
  - "Академия не учит базовой энергии с нуля. Она учит применять уже имеющийся контроль в реальных условиях."
  - "Здесь не сюсюкаются. Здесь дают свободу, нагрузку и последствия."
  - "Правильная формула Академии: можно, но если сорвёшься — отвечаешь."

why_strong_students_choose_it:
  ordinary_institutions_limit: ["не используй", "не показывай", "не раскрывайся", "не рискуй", "делай минимум", "не мешай остальным"]
  astrein_offer: ["открытые энергетические площадки", "датчики", "инструкторы по типам энергии", "кураторы", "спарринги", "захват и удержание", "стрельбище", "бассейн", "полигоны", "командные задачи", "реальная нагрузка"]
  rule: "Сильные идут в Астрейн не только ради статуса, а потому что здесь им дают больше свободы и меньше бессмысленных ограничений."

uniform:
  purpose: ["форма — часть дисциплины и визуальной принадлежности к системе", "форма не украшение и не способ сделать Академию богатой"]
  palette:
    primary: "тёмно-бордовый"
    secondary: "чёрный"
    neutral: "тёмные нейтральные оттенки"
    mandatory_symbol: "эмблема Академии"
    forbidden: ["ярко-красный вместо бордового", "синий/зелёный пиджак как стандарт", "белая рубашка как стандартная база", "школьная форма без эмблемы", "случайный современный костюм без академического признака"]
  mandatory_hours:
    from: "08:00"
    to: "15:00"
    zones: ["учебные корпуса", "регистрация", "ориентация", "официальные проверки", "административные зоны", "занятия"]
  required_piece:
    rule: "Обязателен бордовый жакет / пиджак / форменная куртка с эмблемой Академии."
    flexible_items: ["низ можно заменить", "юбка, брюки, шорты, юбка-шорты допустимы, если соответствуют тёмной палитре и не мешают движению", "рубашка может быть чёрной или другой тёмной, если не нарушает дресс-код", "обувь может быть личной, если подходит по безопасности и внешнему виду"]
  girls_standard: ["бордовый жакет/пиджак с эмблемой", "чёрная рубашка", "бордовая юбка"]
  girls_allowed_replacements: ["чёрные или тёмные брюки", "тёмные шорты", "юбка-шорты", "тёмная рубашка вместо стандартной", "личные ботинки/обувь, если безопасно"]
  boys_standard: ["бордовый жакет/пиджак с эмблемой", "чёрная рубашка", "чёрные брюки"]
  boys_allowed_replacements: ["тёмный практичный низ", "личная обувь", "адаптация под тренировочный день"]
  after_classes:
    rule: "После 15:00 допустима свободная одежда, если внешний вид не нарушает безопасность, приличие и правила общежития/Академии."
  state_rule: ["Форма выдана не значит форма надета.", "Если current_state.uniform_worn=false, нельзя писать форму как текущую одежду.", "Если форма лежит в багаже/комнате/на руках, писать её как предмет, а не как надетую одежду."]

staff_behavior:
  general: ["персонал Академии не сюсюкается со студентами", "персонал не обязан нравиться", "персонал обязан держать систему", "персонал спокойный, опытный, сухой, практичный и внимательный", "персонал не пугается сильной энергии", "персонал не драматизирует каждый сбой", "персонал не раскрывает лишнего публично", "персонал не должен быть карикатурным злодеем"]
  registration_staff:
    tone: "вежливо-сухой, процедурный"
    can: ["сверить документы", "выдать пропуск", "выдать маршрутный лист", "направить на медконтроль", "отметить форму и допуски", "вызвать старшего при странности данных"]
    forbidden: ["читать закрытое досье вслух", "обсуждать тип энергии перед очередью", "делать из каждого новичка подозреваемого"]
  instructors:
    tone: "резкий, практичный, без лишнего утешения"
    principle: "инструкторы учат применять, а не объясняют базу"
    can: ["остановить тренировку", "дать команду повторить", "снизить допуск", "поставить штрафной блок", "отстранить от спарринга", "назначить наблюдение", "резко прервать поток энергии при угрозе"]
    not_required: ["утешать после ошибки", "оправдывать студента", "игнорировать риск", "давать поблажку из-за статуса, характера или внешности"]
  curators:
    role: ["куратор — не классный руководитель, а специалист траектории студента", "следит за нагрузкой, допусками, дисциплиной, конфликтами, перегрузами и пригодностью к направлению", "не решает проблемы за студента, но видит, когда студент становится угрозой себе, группе или будущей службе"]
  medical_staff:
    tone: "профессиональный, спокойный, сухой"
    can: ["стабилизировать после перегруза", "зафиксировать состояние", "дать ограничение", "передать отметку куратору/инструктору при необходимости"]
    rule: "медблок помогает, но не снимает ответственность"

energy_practice_system:
  principle: ["Открытые площадки Академии нужны для практики применения энергии, а не красивых демонстраций.", "Датчики не фиксируют выброс как преступление. Они следят, чтобы выброс не навредил другим серьёзно.", "Себе навредил — почти твои проблемы. Кому-то навредил — уже проблема Академии."]
  sensors_track: ["направление выброса", "плотность", "радиус", "стабильность", "риск для окружающих", "влияние на партнёров", "повторяемость ошибки", "признаки намеренного вреда", "угрозу разрушения защитной зоны"]
  self_overload:
    academy_reaction: "помочь, зафиксировать, оценить самоконтроль"
    tone: "твоя ошибка, твоя нагрузка, твои последствия"
  harm_to_other:
    academy_reaction: "немедленное вмешательство, разбор, дисциплинарные последствия"
    tone: "это уже не только твоя проблема"

forced_energy_interruption:
  trigger_conditions: ["нестабильность", "потеря контроля", "опасное нарастание энергии", "намерение ударить сильнее допустимого", "желание навредить человеку, а не выполнить задачу", "угроза партнёру", "отказ остановиться по команде"]
  action: "инструктор/куратор может резко прервать поток энергии студента"
  nature: ["это не мягкая остановка", "это неприятное техническое аварийное вмешательство", "студенты предупреждены заранее"]
  side_effects: ["тошнота", "слабость", "дрожь", "головокружение", "резкий откат", "тяжесть в теле", "невозможность нормально пользоваться энергией несколько часов", "ощущение обрыва внутри энергетического канала"]
  rule: ["это не наказание ради наказания", "это способ не дать студенту покалечить другого", "приятным его никто делать не обязан"]

discipline:
  formula: "Свобода есть, но последствия тоже есть."
  fights:
    rule: "Драка не считается 'дети поругались'."
    check: ["кто начал", "кто продолжил", "кто мог остановиться", "кто применил энергию", "кто втянул окружающих", "был ли риск для случайных студентов", "было ли намерение унизить, покалечить или спровоцировать перегруз"]
    consequences: ["дисциплинарная отметка", "снижение рейтинга", "штрафной блок", "ограничение допуска", "отдельная проверка", "наблюдение", "разбор у куратора"]
  overload:
    rule: "Перегруз не считается героизмом сам по себе."
    heavier_if: ["из гордости", "из злости", "из желания показать силу", "из-за неверной оценки тела", "из-за игнорирования признаков"]
  uniform_violation:
    rule: "Нарушение формы не катастрофа, но это дисциплина."
    possible_staff_reactions: ["замечание", "требование заменить элемент", "фиксация спора", "оформление исключения/замены", "недопуск к официальному блоку при грубом нарушении"]
  energy_safety_violation:
    serious: true
    forbidden: ["выпускать энергию в толпе без причины", "проверять силу на людях", "провоцировать чужой перегруз", "использовать энергию в драке без допуска", "ломать имущество тренировочным импульсом вне зоны", "скрывать опасное состояние тела"]

training_system:
  not_basic_school: ["Академия не учит базовым вещам с нуля.", "Она не говорит каждому студенту 'почувствуй энергию'.", "Она говорит: держи поток под давлением, отпусти по команде, не бей партнёра сверх задачи, повтори."]
  directions: ["физическая подготовка", "энергетический контроль", "тактика", "захват и удержание", "сопровождение", "эвакуация", "стрельба", "работа с оружием", "командная работа", "выживание под давлением", "работа против Эхо", "работа при контакте с кайросами/неизвестными сущностями"]
  raider_logic: ["рейдер — не просто сильный носитель энергии", "рейдер держит голову в шуме", "видит путь отхода", "не ломает союзников", "не тратит энергию ради красоты", "не устраивает шоу", "признаёт ошибку быстро", "действует, пока страшно", "сохраняет контроль, когда контроль уже неудобен"]

ratings_and_access:
  rating_sources: ["дисциплина", "тренировки", "контроль", "командная работа", "реакция на стресс", "поведение в конфликтах", "энергетическая безопасность", "способность исправлять ошибки", "репутация", "отзывы инструкторов"]
  access_types: ["тренировочный блок", "стрельбище", "полигон", "энергетический тест", "командная задача", "рейдерская подготовка повышенного риска"]

northern_sector:
  sponsor: "Северный сектор"
  rule: ["Академия частично спонсируется Северным сектором.", "Это не должно звучать как рекламный плакат и не обязано быть известно каждому студенту.", "Связь Северного сектора с матерью Райдена — скрытый слой."]
  not_eastern: ["Не писать, что Академию спонсирует Восточный сектор.", "Восточный сектор — будущая линия выбора Райдена, не источник спонсирования Академии на старте."]
  samuel_august_31: ["31 августа, когда Самуэль Стэрлинг получает пост / входит в систему влияния, тон Академии может начать меняться.", "После этого контроль может стать жёстче, скрытая политика заметнее, а свободы — меньше.", "До этого Академия должна ощущаться жёсткой, но живой и функциональной системой."]

daily_life:
  - "Студенты живые: едят, спорят, флиртуют, играют, тренируются, устают, ревнуют и разносят слухи."
  - "Быт нужен, если двигает сцену, отношения, репутацию, конфликт, усталость или атмосферу."
  - "Не писать пустой быт ради пустого быта."
  - "Можно показывать форму на стульях, мокрые волосы после бассейна, усталое возвращение из блока, слухи после столовой."

do_not:
  - "Не писать Академию обычной школой."
  - "Не писать Академию богатым пансионом."
  - "Не делать элитность через ремонт, мрамор и дорогую форму."
  - "Не делать персонал мягкими няньками."
  - "Не делать персонал тупыми злодеями."
  - "Не делать каждую проверку тайным экспериментом."
  - "Не делать каждую ошибку катастрофой."
  - "Не делать каждый выброс энергии нарушением."
  - "Не забывать, что сильным студентам здесь дают больше свободы, чем в других местах."
  - "Не забывать, что свобода держится на кураторах, инструкторах, датчиках и последствиях."
  - "Не забывать, что за Академией — Эхо, кайросы и полевая работа."
  - "Не раскрывать связь Северного сектора, матери Райдена и спонсирования случайным студентам."
  - "Не менять тон Академии на скучную дисциплинарную канцелярию."

short_scene_formula:
  - "Можно. Но если сорвёшься — отвечаешь."
  - "Сорвался сам — вставай."
  - "Задел другого — отвечай."
  - "Проигнорировал команду — получай последствия."
  - "Выдержал — получаешь допуск дальше."
