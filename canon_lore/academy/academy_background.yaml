lore_id: academy_background
visibility: academy_common
always_load: true
version: academy_core_v4_compact

definition:
  - "Академия Астрейн — современная элитная академия подготовки сильных носителей энергии, будущих рейдеров и специалистов."
  - "Элитность здесь не в роскоши, а в людях, системе, практических площадках, опыте инструкторов, кураторах, дисциплине и свободе для сильных."
  - "Академия не учит энергию с нуля как детский кружок. Она предполагает базовый контроль и учит применять силу в реальной нагрузке."
  - "Главная формула: можно больше, чем в обычной школе, но за последствия отвечаешь сам."

visual_identity:
  overall:
    - "Современный кампус, не древний замок, не богатый пансион, не футуристичная лаборатория."
    - "Старые крепкие корпуса могут быть отремонтированы: камень/кирпич, широкие лестницы, современные двери, стекло, металл, нормальные указатели."
    - "Внутри — обычная современная техника: планшеты у персонала, компьютеры, камеры в ключевых местах, ключ-карты, рации, расписания на экранах или стендах."
    - "Места должны ощущаться живыми: мокрый камень, сумки, форма на спинках стульев, стук мяча, шум столовой, коридорные разговоры, усталость после блока."
  not_this:
    - "не киберпанк"
    - "не космическая станция"
    - "не древняя магическая академия"
    - "не стерильная лаборатория"
    - "не дворец с мрамором ради статуса"

technology_level:
  rule:
    - "Технологии примерно как в современном мире, плюс отдельные простые устройства под работу с энергией."
    - "Проверки делают люди: врачи, инструкторы, кураторы, старшекурсники-наблюдатели. Техника помогает, но не заменяет сцену."
    - "Датчики есть в тренировочных зонах, медблоке, на отдельных входах/площадках, но не в каждой комнате и не на каждом углу."
    - "Датчики фиксируют грубые параметры энергии/безопасности: всплеск, направление, радиус, стабильность, риск для окружающих."
  allowed:
    - "планшеты, рации, камеры в ключевых местах, пропуска/ключ-карты, обычные медицинские приборы, пульсометры, таймеры, турникеты"
    - "простые энергетические датчики на полигонах и в зонах практики"
    - "защитная разметка, аварийные протоколы, обычные тренажёры и снаряды"
  forbidden:
    - "супер-сканеры на входе, которые считывают органы, силу, скрытую природу или прошлое"
    - "линия света, которая проходит по телу и выдаёт полную диагностику"
    - "тотальный ИИ-контроль Академии"
    - "голограммы и футуризм как стандартная атмосфера"
    - "магические панели, которые сами знают hidden lore"
    - "техника, которая решает вместо врача, инструктора или выбора игрока"

uniform_core:
  hours: "08:00-15:00 в учебных, официальных и административных зонах; после 15:00 свободная одежда в рамках безопасности и приличия"
  colors: "тёмно-бордовый + чёрный + тёмные нейтральные оттенки"
  symbol: "эмблема Академии на жакете/пиджаке/форменной куртке"
  girls_standard: ["бордовый жакет/пиджак с эмблемой", "чёрная рубашка", "бордовая юбка"]
  girls_allowed_replacements: ["чёрные/тёмные брюки", "тёмные шорты", "юбка-шорты", "личная безопасная обувь"]
  boys_standard: ["бордовый жакет/пиджак с эмблемой", "чёрная рубашка", "чёрные/тёмные брюки"]
  important_state_rule:
    - "Выданная форма не значит надетая форма."
    - "Писать форму на Акире только если current_state.uniform_worn=true или игрок явно переодел её."

academy_rhythm:
  - "07:00-08:00 подъём, завтрак, сборы."
  - "08:00-15:00 учебные, физические, проверочные или практические блоки с перерывами."
  - "После 15:00 свободное время: столовая, двор, спортзоны, общежитие, добровольные тренировки, разговоры."
  - "После 23:00 контроль общежития: поздний вход/отсутствие фиксируются."
  - "Студентов не заставляют тренироваться каждую минуту, но постоянная пустота становится социальным выводом или заметкой персонала."

scene_tone:
  - "Академия живая, конкурентная, статусная, физическая."
  - "Студенты флиртуют, спорят, ревнуют, меряются силой, устают, ошибаются, сплетничают, пытаются выглядеть лучше."
  - "Персонал сухой и практичный, не злой ради злости и не нянька."
  - "Сильным дают пространство, но вред другому, опасный перегруз и игнор команды имеют последствия."

do_not:
  - "Не писать Академию обычной школой."
  - "Не писать Академию богатым пансионом."
  - "Не делать её супер-технологичной лабораторией."
  - "Не делать её древней магической академией."
  - "Не объяснять всё устройствами, сканерами или автоматическим анализом."
  - "Не раскрывать hidden lore через медосмотр, датчик, форму, регистрацию или случайного сотрудника."
