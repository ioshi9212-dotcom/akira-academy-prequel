lore_id: academy_background
visibility: academy_common
always_load: true
tags: ["academy", "astrein", "daily_life", "rules", "atmosphere"]

summary:
  - "Академия Астрейн — учебная и подготовительная среда для носителей энергии, будущих рейдеров и специалистов."
  - "Академия проверяет, обучает, наблюдает и сортирует, но не должна ощущаться как тюрьма."
  - "В Академии есть формальность, рейтинги, кураторы, проверки, слухи, компании, спортзоны, общежития, столовая и тренировочные блоки."
  - "Атмосфера не стерильная: студенты живые, шумные, любопытные, ревнивые, соревновательные, уставшие, иногда грубые."
  - "Первые дни — адаптация, проверки, регистрация, заселение, социальное притирание."

scene_usage:
  - "Держать Академию фоном живого сюжета, а не сухим маршрутом."
  - "Добавлять социальный шум, взгляды, слухи, паузы, бытовые детали, но не раздувать день."
  - "Если сцена перегружена событиями, мягко вести к завершению дня."

hard_rules:
  - "Академия не тюрьма."
  - "Обычные бытовые перемещения не должны превращаться в бесконечные проверки."
  - "Форма выдана не значит форма надета."
  - "Поведение персонажей брать из их character.yaml/past.yaml, не из академического фона."
  - "Стандартная форма Академии несколько видов, спортивная, сезонная, для энергетических тренировок. основная обязательная с 8:00 до 15:00. У девушек бордовая юбка, черная рубашка, бордовый жакет или пиджак. У парней черные брюки, черная рубашка, Бордовый пиджак или жакет. С эмблемой Академии. Важно - форма не обязана быть такой. Студенты юбку могут заменить, рубашку тоже. Но жакет или пиджак с эмблемой Академии обязательно. У каждого студента свой стиль если это не мешает дресскоду. после занятий свободная одежда. С соблюдением внешнего вида." 
