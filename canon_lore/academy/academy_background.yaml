lore_id: academy_background
visibility: academy_common
always_load: true
version: academy_core_v2
tags: [academy, astrein, academy_core, atmosphere, discipline, raider_training, uniform, staff, northern_sector]
hashtags: ["#академия", "#астрейн", "#фон_академии", "#элитность", "#сильные_студенты", "#рейдеры", "#форма", "#персонал", "#дисциплина", "#северный_сектор"]
search_keywords: ["Академия Астрейн", "элитная академия", "сильные носители", "рейдерская подготовка", "форма Академии", "персонал Академии", "инструкторы", "кураторы", "датчики", "перегруз", "дисциплина", "Северный сектор"]

summary:
  - "Академия Астрейн — элитная система подготовки сильных носителей энергии, будущих рейдеров и специалистов."
  - "Элитность Академии не в богатом ремонте, форме или оборудовании, а в подготовленных специалистах, кураторах, инструкторах, практических площадках, датчиках и свободе для сильных."
  - "Академия не сюсюкается со студентами и не учит базе с нуля. Она предполагает, что студент уже способен держать минимум контроля, и учит применять энергию в деле."
  - "Главная формула: сильным дают пространство быть сильными, но за последствия отвечают сами."
  - "За стенами Академии — Эхо, кайросы, рейды, чужие территории и реальные последствия. Там никто не будет держать рейдера за руку."

elite_logic:
  not_about: ["дорогой ремонт", "роскошная форма", "богатые семьи как главная ценность", "витринная престижность"]
  about:
    - "много опытных специалистов и кураторов"
    - "инструкторы по разным типам энергии"
    - "открытые площадки для практики энергии"
    - "датчики и защитные контуры"
    - "персонал, способный вмешаться до катастрофы"
    - "достаточно свободы для сильных студентов"
    - "практика применения энергии, а не вечные запреты"

academy_tone:
  - "строгая, практичная, живая"
  - "не тюрьма, но и не мягкая школа"
  - "студенты спорят, дерутся, флиртуют, перегружаются, конкурируют, получают последствия"
  - "персонал не злой и не тупой, но не обязан быть ласковым"
  - "свобода здесь существует вместе с ответственностью"

core_rules:
  - "Форма выдана не значит форма надета."
  - "Основная форма обязательна с 08:00 до 15:00 в учебных, официальных и административных зонах."
  - "После занятий допускается свободная одежда при нормальном внешнем виде и безопасности."
  - "Если студент подрался — это его вина; причины могут смягчить последствия, но не отменяют факт."
  - "Если студент перегрузился сам — это почти его проблема: медблок поможет, но ответственность остаётся."
  - "Если студент навредил другому — это уже проблема Академии и дисциплинарный случай."
  - "Выброс энергии сам по себе не является нарушением. Важны направление, риск, стабильность и вред окружающим."
  - "В спарринге инструктор может резко прервать поток студента, если видит нестабильность, потерю контроля или желание навредить."
  - "Побочка после принудительного прерывания неприятная: тошнота, слабость, дрожь, откат, невозможность нормально пользоваться энергией несколько часов."
  - "Студенты заранее предупреждены о цене аварийной остановки потока."

academy_sponsorship:
  sponsor: "Северный сектор"
  rule: "Академия частично спонсируется Северным сектором."
  secrecy:
    - "Это не рекламируется широко обычным студентам."
    - "Связь Северного сектора с линией матери Райдена является скрытым слоем и не должна всплывать случайной репликой."
    - "Обычные студенты не должны знать, как именно спонсирование связано с семьёй Райдена."
  samuel_shift:
    - "31 августа, когда Самуэль Стэрлинг получает пост / входит в систему влияния, баланс Академии может начать меняться."
    - "После этого контроль может стать жёстче, скрытая политика заметнее, а свободы — меньше."

scene_usage:
  - "Показывать Академию как сюжетный механизм, а не скучную канцелярию."
  - "Добавлять живой студенческий шум, социальную оценку, дисциплину, практику, последствия, но не превращать каждую процедуру в допрос."
  - "Если сцена про форму, персонал, дисциплину, тренировки, спарринг, стрельбище, бассейн, перегруз, допуск или Северный сектор — использовать academy_full.yaml."
  - "Если сцена про место, маршрут или окружение — использовать academy_locations.yaml."

do_not:
  - "Не писать Академию как обычную школу."
  - "Не писать Академию как богатый пансион."
  - "Не делать элитность через мрамор, дорогую форму и ремонт."
  - "Не делать персонал мягкими няньками."
  - "Не делать персонал карикатурными злодеями."
  - "Не делать каждую проверку тайным экспериментом."
  - "Не делать каждый выброс энергии нарушением."
  - "Не забывать, что Академия даёт сильным больше свободы, чем другие учреждения."
  - "Не раскрывать связь Северного сектора, матери Райдена и спонсирования случайным студентам."
