lore_id: academy_locations
visibility: academy_common
version: academy_locations_v2
tags: [academy, astrein, locations, court, dorm, cafeteria, training, shooting_range, pool, medblock, registration, tactical_rooms, capture_block]
hashtags: ["#академия", "#локации", "#главный_двор", "#задний_выход", "#баскетбольный_корт", "#регистрация", "#общежитие", "#комната_214", "#столовая", "#медблок", "#тренировочные_блоки", "#стрельбище", "#бассейн", "#полигон", "#захват"]
search_keywords: ["главный двор", "задний выход", "баскетбольная площадка", "стойка регистрации", "общежитие", "комната 214", "столовая", "медблок", "тренировочный блок", "стрельбище", "бассейн", "полигон", "захват", "тактическая аудитория"]

global_location_rule:
  - "Локация должна влиять на сцену: шум, движение, взгляды, предметы, дистанция, запахи, контроль персонала, социальная плотность."
  - "Не описывать локации как сухой справочник, если можно показать через действие."
  - "Академия живая: спорт, споры, слухи, мокрые коридоры, форма, усталость, еда, тренировки, персонал, датчики."

locations:
  main_courtyard:
    name: "Главный двор Академии"
    type: "официальная входная зона"
    atmosphere: ["широкие ступени", "мокрый камень после дождя", "стойки регистрации", "таблички маршрутов", "персонал с планшетами", "новички, которые пытаются выглядеть спокойными", "первые взгляды, шёпот и социальная оценка"]
    scene_use: ["официальное прибытие", "первые публичные комментарии", "регистрация", "выдача маршрутов", "первые слухи", "сухая работа персонала"]

  academy_back_court_exit:
    name: "Задний выход со стороны корта"
    type: "менее официальный вход / переходная зона"
    atmosphere: ["металлическая сетка", "влажный воздух", "мокрые пятна на покрытии", "стук мяча", "неформальные группы студентов", "меньше персонала, больше живой социальной среды"]
    scene_use: ["первое неофициальное столкновение", "баскетбол как социальная проверка", "естественное появление Хару", "Райден может быть рядом у стены, на бортике, в тени или на траектории Хару", "проверочные шутки, взгляды на новичков, быстрые слухи"]

  basketball_court:
    name: "Баскетбольные площадки"
    type: "спортзона / социальная сцена"
    atmosphere: ["мяч", "мокрое покрытие", "смех", "ставки на реакцию", "резкие движения", "флирт", "публичность без официального протокола"]
    rules: ["игра может быть дружеской, но считывается как социальный тест", "энергия без допуска на площадке — риск дисциплинарной реакции", "грубое подавление слабого будет замечено, даже если формально это игра"]
    scene_use: ["проверка новичка", "публичная репутация", "баскетбольная линия Акиры/Хару/Райдена", "социальная ревность и внимание"]

  registration_area:
    name: "Зона регистрации"
    type: "официальная процедурная зона"
    atmosphere: ["очереди", "стойки", "планшеты", "маршрутные листы", "временные пропуска", "сухая проверка документов"]
    staff_behavior: ["вежливо-сухо", "процедурно", "без публичного раскрытия досье", "без сюсюканья"]
    staff_can: ["сверить документы", "выдать пропуск", "направить на медконтроль", "отметить форму", "вызвать старшего при странности данных"]
    staff_forbidden: ["читать закрытые данные вслух", "обсуждать тип энергии перед очередью", "устраивать драму из каждого новичка"]

  dorm_block:
    name: "Общежитие"
    type: "бытовая зона / социальный коридор"
    atmosphere: ["ключ-карты", "коридорный шум", "чужие голоса", "мокрая обувь после дождя", "сумки", "форма на спинках стульев", "слухи после столовой или тренировки"]
    scene_use: ["личные разговоры", "конфликты соседей", "восстановление после блоков", "нарушение личной территории", "усталые возвращения"]

  dorm_room_214:
    name: "Комната 214"
    type: "комната Акиры и Ливии"
    facts: ["Акира и Ливия живут вместе", "окна не заблокированы", "комната должна помнить вещи, форму, сумки, состояние волос и личные предметы", "здесь допустимы старые привычки Ливии и Акиры"]
    scene_use: ["переодевание", "коса / волосы", "разбор вещей", "разговор после публичных сцен", "попытка восстановить контроль"]

  cafeteria:
    name: "Столовая"
    type: "социальное сердце Академии"
    atmosphere: ["очереди", "подносы", "шум приборов", "запах горячей еды", "столы по компаниям", "взгляды на новичков", "обсуждение тренировок", "спортивные и энергетические слухи"]
    scene_use: ["Райден ест много и спокойно", "Хару шумит, флиртует, занимает пространство", "Ливия считывает внимание", "Акира выбирает место с обзором", "слухи рождаются быстро"]

  medblock:
    name: "Медблок"
    type: "медицинская система контроля и восстановления"
    atmosphere: ["чистый свет", "датчики", "браслеты", "сухой голос персонала", "запах антисептика", "не уют, а процедура"]
    staff_behavior: ["профессионально", "спокойно", "сухо", "без лишней нежности", "без публичного обсуждения"]
    medblock_does: ["первичный осмотр", "фиксация травм", "восстановление после перегруза", "контроль допуска", "ограничение при риске"]
    medblock_not: ["не гладит по голове за ошибку", "не снимает ответственность за перегруз", "не раскрывает странности студента публично"]

  training_blocks:
    name: "Тренировочные блоки"
    type: "основная практическая система Академии"
    principle: "Контроль, который работает только в спокойной комнате, не считается рабочим контролем."
    includes: ["физическая подготовка", "энергетический контроль", "реакция", "выносливость", "тактика", "командная работа", "захват", "удержание", "сопровождение", "эвакуация", "работа после перегруза", "работа под давлением"]

  energy_practice_yards:
    name: "Открытые энергетические площадки"
    type: "практика энергии с датчиками и кураторами"
    atmosphere: ["разметка зон", "датчики", "защитные контуры", "кураторы", "инструкторы по типам энергии", "аварийные протоколы"]
    rule: ["датчики не паникуют от каждого выброса", "они отслеживают, чтобы выброс не навредил другим серьёзно", "самоперегруз фиксируется, но не становится трагедией без угрозы окружающим"]

  capture_and_restraint_block:
    name: "Блок захвата и удержания"
    type: "практика задержания, обездвиживания, сопровождения цели"
    formats: ["один на один", "пара против цели", "группа против цели", "защита условного гражданского", "удержание без лишнего ущерба", "работа без энергии", "работа с ограничением энергии"]
    consequences: ["грубый захват может дать дисциплинарную отметку", "не удержал цель — ошибка команды", "травмировал партнёра без причины — твоя вина", "перегрузился — неправильно рассчитал нагрузку"]

  shooting_range:
    name: "Стрельбище"
    type: "закрытая тренировочная зона"
    atmosphere: ["металл", "смазка", "холодный пластик", "защитные панели", "линии огня", "мишени", "стойки с оружием", "инструкторская зона", "резкий звук выстрелов"]
    rules: ["ствол только в сторону мишени", "палец не на спуске до команды", "не разворачиваться с оружием", "не играть оружием", "не спорить на линии огня", "ошибка с оружием — дисциплинарный случай, не 'ой'"]
    scene_use: ["оружие показывает характер", "страх или самоуверенность видны быстро", "точность, дисциплина, реакция, контроль тела"]

  pool:
    name: "Бассейн"
    type: "тренировочная зона, не просто отдых"
    purpose: ["дыхание", "выносливость", "восстановление", "контроль тела", "работа с паникой", "работа после нагрузки", "проверка реакции энергии в нестандартной среде"]
    atmosphere: ["запах хлора/минералов", "влажный воздух", "плитка", "шум воды", "бортики", "раздевалки", "инструкторские отметки", "мокрые волосы после тренировки"]
    scene_use: ["разговоры у бортика", "восстановление после блока", "физическая уязвимость без оружия/формы", "вода как фактор для Райдена", "вода как среда, где Акира может чувствовать пространство иначе"]

  tactical_rooms:
    name: "Тактические аудитории"
    type: "разбор действий, не детская лекция"
    topics: ["маршрут", "роли группы", "ошибки рейдов", "поведение при Эхо", "эвакуация", "нарушение приказа", "последствия самодеятельности", "работа с гражданскими", "работа с неизвестным типом энергии"]

  simulation_ranges:
    name: "Симуляционные / полигонные зоны"
    type: "контролируемые сценарии"
    formats: ["поиск цели", "сопровождение", "отступление", "внезапный сбой", "защита точки", "работа при шуме", "ограничение видимости", "команда без связи"]

  administrative_building:
    name: "Административный корпус"
    type: "документы, кураторы, дисциплина, рейтинги"
    tone: ["сухой", "официальный", "без лишнего тепла", "последствия фиксируются", "я не хотел не отменяет результата"]
