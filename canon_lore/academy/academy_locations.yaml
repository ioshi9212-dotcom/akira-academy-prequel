lore_id: academy_locations
visibility: academy_common
version: academy_locations_v4_compact

global_rule:
  - "Локация должна влиять на сцену: шум, дистанция, покрытие, запах, взгляды, очереди, вещи, персонал, маршруты."
  - "Академия современная и практичная: обычная техника, крепкие корпуса, спортивные зоны, общежитие, столовая, медблок."
  - "Не описывать каждое место как стерильную лабораторию или древнюю магическую школу."

campus_visual:
  - "Большая территория с несколькими корпусами, двором, спортзонами и общежитием."
  - "Архитектура может смешивать старые прочные корпуса и современные пристройки: камень/кирпич, стекло, металл, простые указатели."
  - "Здесь много движения: новички с сумками, старшие группы, персонал, шум мяча, запах столовой, мокрое покрытие после дождя, форма в коридорах."

locations:
  arrival_dropoff:
    name: "подъезд к территории Академии / место высадки"
    type: "переходная входная зона"
    look: ["машины у края территории", "таблички маршрутов", "поток студентов", "вид на корпуса и дорожки", "персонал/охрана без лишней театральности"]
    scene_use: ["старт 15 августа", "Рэй привозит Акиру и Ливию", "диалог у машины", "первый взгляд на Академию"]
    rule: "это не корт; к кортам идут после стартового кадра и входного перехода"
  back_court_route:
    name: "задний маршрут со стороны корта"
    type: "менее официальный проход"
    look: ["боковые дорожки", "металлическая сетка", "спортивный шум", "меньше официальной толпы", "живые группы студентов"]
    scene_use: ["переход после приезда", "мягкий ввод территории", "первое приближение к Хару/корту"]
  basketball_court:
    name: "баскетбольные площадки"
    type: "спортзона / социальная сцена"
    look: ["разметка", "мяч", "бортики", "скамейки", "смех", "публичные взгляды", "неофициальная конкуренция"]
    scene_use: ["Хару может отправить мяч к новичкам", "Райден может быть рядом фоном", "репутация и первое впечатление"]
    boundary: "не делать мяч первым кадром дня; до него должен быть приезд и входной переход"
  registration_area:
    name: "зона регистрации"
    type: "официальная процедурная зона"
    look: ["стойки", "очереди", "маршрутные листы", "планшеты/компьютеры", "временные пропуска", "выдача формы"]
    staff: "сухо, вежливо, без публичных досье и драм"
  dorm_block:
    name: "общежитие"
    type: "бытовая зона"
    look: ["коридоры", "ключ-карты", "шум комнат", "сумки", "форма на стульях", "личные разговоры", "контроль после 23:00"]
  room_214:
    name: "комната 214"
    type: "комната Акиры и Ливии"
    facts: ["Акира и Ливия живут вместе", "окна не заблокированы", "вещи и одежда должны помнить state", "форма не надета без действия игрока"]
    scene_use: ["распаковка", "разговоры", "переодевание", "восстановление после публичных сцен"]
  cafeteria:
    name: "столовая"
    type: "социальное сердце Академии"
    look: ["очереди", "подносы", "горячая еда", "шум приборов", "столы по компаниям", "слухи после тренировок"]
    scene_use: ["социальные сцены", "наблюдение за статусом", "флирт Ливии", "компании Хару/Райдена/Киары"]
  medblock:
    name: "медблок"
    type: "медицинская зона"
    look: ["чистый свет", "антисептик", "кушетки", "обычные приборы", "спокойный персонал"]
    does: ["осмотр", "фиксация травм", "ограничение нагрузки", "помощь после перегруза", "минимальный отклик при необходимости"]
    not: ["не супер-сканер", "не раскрывает hidden lore", "не знает дату травмы без слов/записи"]
  training_blocks:
    name: "тренировочные блоки"
    type: "физическая и практическая подготовка"
    look: ["маты", "разметка", "турники", "полоса координации", "таймеры", "пульсометры", "снаряды", "инструкторы", "старшекурсники-наблюдатели"]
    scene_use: ["проверки тела", "спарринги", "выносливость", "координация", "первые трения и наблюдения"]
  energy_practice_yards:
    name: "энергетические площадки"
    type: "специальные зоны практики энергии"
    look: ["разметка", "дистанция", "инструкторы", "простые датчики", "защитные контуры", "аварийные команды"]
    rule: "датчики помогают безопасности, но не читают личность, органы или скрытую природу"
  shooting_range:
    name: "стрельбище"
    type: "закрытая зона оружейной дисциплины"
    look: ["линии огня", "мишени", "инструкторская зона", "защитные панели", "запах металла/смазки"]
    rule: "оружие — дисциплина, не игрушка; ошибка с оружием не 'ой'"
  pool:
    name: "бассейн"
    type: "тренировочная зона"
    purpose: ["дыхание", "выносливость", "восстановление", "контроль тела", "работа с паникой"]
  tactical_rooms:
    name: "тактические аудитории"
    type: "обычные учебные/разборные комнаты"
    look: ["доска", "карты", "экраны/проектор", "планы", "столы", "усталые студенты после блока"]
    rule: "не превращать в голографический центр будущего"
