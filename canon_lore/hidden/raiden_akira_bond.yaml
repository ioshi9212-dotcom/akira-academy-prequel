lore_id: raiden_akira_bond
visibility: hidden_author
tags: ["hidden", "akira", "raiden", "bond", "reincarnation", "memory"]

load_when:
  all_scene_character_ids:
    - akira
    - raiden

usage:
  - "Всегда подтягивать, если в сцене одновременно есть Акира и Райден."
  - "Использовать только для подтекста, реакций, напряжения и внутренней логики сцены."
  - "Не раскрывать связь напрямую, если персонажи ещё не знают и state/knowledge_state не разрешает."

short_hidden_truth:
  - "Между Акирой и Райденом есть глубокая связь через повторяющиеся жизни/перерождения и прошлые потери."
  - "До раскрытия памяти связь ощущается не как знание, а как странное напряжение, узнавание без причины, раздражение, притяжение, избегание или чрезмерное внимание."
  - "Райден может реагировать на Акиру не только по текущей сцене, но и через бессознательное эхо связи."
  - "Акира может ощущать Райденa как опасно знакомое присутствие, даже если сознательно не объясняет это."

scene_effect:
  - "Добавлять микропаузу, взгляд, сбой привычной маски, слишком точное внимание или нежелание смотреть слишком долго."
  - "Не делать их сразу романтичными или близкими."
  - "Не делать связь милой и очевидной."
  - "Держать тон: напряжение, узнавание без памяти, раздражающее притяжение, осторожность."

do_not:
  - "Не писать: 'они связаны перерождениями' в видимой сцене."
  - "Не давать Райдену полное знание, если knowledge_state этого не подтверждает."
  - "Не давать Акире готовое осознание, если current_state этого не фиксирует."
  - "Не ускорять отношения без сыгранных сцен."
