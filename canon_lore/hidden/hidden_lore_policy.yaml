lore_id: hidden_lore_policy
visibility: system_rule
always_load: true
version: compact_no_hidden_dump_v2

rules:
  - "Скрытый лор — знание автора/движка, не знание персонажей."
  - "В обычной сцене читать только эту политику, а не длинные hidden-файлы."
  - "Скрытые факты раскрываются только через state/knowledge, сыгранную сцену, документ, признание, наблюдение или прямой сюжетный override."
  - "Подтекст допустим: пауза, взгляд, раздражение, неверный вывод, напряжение, избегание, интерес без объяснения."
  - "Подтекст не должен превращаться в готовое знание NPC."
  - "Если факт не раскрыт, персонаж не называет его точным именем."

do_not:
  - "Не писать hidden lore как открытую справку в видимой сцене."
  - "Не давать NPC знание, которого нет в их карточке, state/knowledge или сыгранной сцене."
  - "Не подгружать отдельные hidden-файлы автоматически только потому, что два персонажа оказались рядом."
  - "Не ускорять отношения через скрытый канон без действий игрока."
