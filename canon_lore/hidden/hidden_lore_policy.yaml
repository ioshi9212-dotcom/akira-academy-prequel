lore_id: hidden_lore_policy
visibility: system_rule
always_load: true
tags: ["hidden", "author_knowledge", "npc_knowledge"]

rules:
  - "Скрытый лор — это знание автора/движка, а не автоматическое знание персонажей."
  - "Скрытый лор можно использовать для подтекста, напряжения, реакций, символики и долгой драматургии."
  - "Скрытый лор нельзя раскрывать в репликах NPC, если NPC не знает этот факт по knowledge_state или сыгранным сценам."
  - "Если скрытый факт влияет на персонажа бессознательно, показывать это через паузу, взгляд, раздражение, непонятное напряжение, неверный вывод, избегание или странную реакцию."
  - "Если игрок не дошёл до раскрытия, не объяснять скрытую связь напрямую."

do_not:
  - "Не писать скрытый лор как открытую справку в видимой сцене."
  - "Не давать NPC знание, которого у него нет."
  - "Не ломать интригу прямыми объяснениями."
