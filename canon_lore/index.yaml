lore_index_id: canon_lore_index
version: v4_character_energy_blocks
format: yaml_lore_module
purpose:
- Персональная энергия персонажа хранится блоком energy в его main.yaml/character.yaml. Не заводить отдельные файлы под каждый тип энергии.
always_load:
- canon_lore/core/world_background.yaml
- canon_lore/academy/academy_background.yaml
- canon_lore/hidden/hidden_lore_policy.yaml
tag_triggers:
  energy:
    keywords:
    - энергия
    - энергетический
    - тип энергии
    - уровень энергии
    - фонит
    - фонят
    - фон
    - перегруз
    - выброс
    - датчик
    - пространство
    - резонанс
    - огонь
    - тепло
    - холод
    - воздух
    - магнит
    - смещение
    - иней
    - вибрация
    files:
    - canon_lore/world/energy_system.yaml
  academy_npc_social:
    keywords:
    - npc
    - нпс
    - студент
    - студенты
    - слух
    - слухи
    - провокация
    - флирт
    - ревность
    - мини-арка
    - статус
    - богатые
    - бедные
    - фоновые
    files:
    - canon_lore/academy/academy_npc_social_rules.yaml
character_pair_rules:
  akira_raiden:
    when_all_scene_character_ids:
    - akira
    - raiden
    files:
    - canon_lore/hidden/raiden_akira_bond.yaml
    usage: Использовать для подтекста; не раскрывать hidden lore.
