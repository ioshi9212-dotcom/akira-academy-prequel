lore_index_id: canon_lore_index
version: v7_compact_academy_core
format: yaml_lore_module
status: active

purpose:
  - "Активный компактный лор для Академии 1198."
  - "Держит базу мира, Академии, формы, локаций, энергии и границ знания без лишнего hidden lore."
  - "Старые canon/ и архивные hidden-файлы не являются источником истины, если их явно не загрузили."

always_load:
  - "canon_lore/core/world_background.yaml"
  - "canon_lore/academy/academy_background.yaml"
  - "canon_lore/hidden/hidden_lore_policy.yaml"

active_academy_files:
  background: "canon_lore/academy/academy_background.yaml"
  rules_and_systems: "canon_lore/academy/academy_full.yaml"
  locations: "canon_lore/academy/academy_locations.yaml"

active_world_files:
  energy_system: "canon_lore/world/energy_system.yaml"
  echo: "canon_lore/world/echo.yaml"
  kairos: "canon_lore/world/kairos.yaml"
  continents_and_worlds: "canon_lore/world/continents_and_worlds.yaml"

load_rules:
  - "Всегда держать короткую базу мира, Академии и hidden-policy."
  - "Полные файлы Академии грузить по теме: форма, правила, дисциплина, проверка, тренировка, медосмотр, локация, общежитие, рейтинг, допуск."
  - "Энергию грузить, если сцена касается энергии, отклика, фона, перегруза, тренировок, проверки или энергетических проявлений."
  - "Эхо/кайросов/материки грузить только если сцена прямо касается этих тем."
  - "Личный тип энергии персонажа хранится в карточке персонажа, а не в отдельном lore-файле."
  - "Скрытый лор не подгружать автоматически ради отношений или красивого подтекста. Его хватает в карточках персонажей и state/knowledge."
  - "NPC знают только то, что видели, слышали, получили по должности, узнали в сцене или могут логично предположить."

tag_triggers:
  academy_rules:
    keywords: ["академия", "астрейн", "правила", "дисциплина", "рейтинг", "допуск", "куратор", "инструктор", "персонал", "медосмотр", "регистрация", "форма", "дресс-код", "проверка", "физический блок", "старшекурсники"]
    files:
      - "canon_lore/academy/academy_full.yaml"
  academy_locations:
    keywords: ["вход", "двор", "корт", "корпус", "общежитие", "комната", "столовая", "медблок", "зал", "площадка", "полоса", "стрельбище", "бассейн", "регистрация", "маршрут"]
    files:
      - "canon_lore/academy/academy_locations.yaml"
  energy:
    keywords: ["энергия", "отклик", "фон", "фонит", "поток", "перегруз", "выброс", "контроль", "датчик", "резонанс", "иней", "тепло", "холод", "смещение", "магнит", "вибрация"]
    files:
      - "canon_lore/world/energy_system.yaml"
  echo:
    keywords: ["эхо", "аномалия", "искажение", "разлом"]
    files:
      - "canon_lore/world/echo.yaml"
  kairos:
    keywords: ["кайрос", "кайросы", "гибрид", "чистый кайрос", "не человек"]
    files:
      - "canon_lore/world/kairos.yaml"
  continents_worlds:
    keywords: ["материк", "континент", "второй мир", "сектор", "северный сектор", "восточный сектор"]
    files:
      - "canon_lore/world/continents_and_worlds.yaml"

hidden_lore_policy:
  active_file: "canon_lore/hidden/hidden_lore_policy.yaml"
  rule:
    - "Файл политики можно читать всегда: он запрещает утечки."
    - "Отдельные hidden-истины не грузить автоматически."
    - "Если нужен редкий hidden-материал для разработки, подключать вручную вне обычной сцены."
