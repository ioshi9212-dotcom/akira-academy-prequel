character_energy_policy:
  storage: "character_card_energy_block"
  rule:
    - "Не создавать canon_lore/energy/types/*.yaml."
    - "Не создавать characters/{id}/energy.yaml."
    - "Энергия персонажа должна быть в карточке персонажа: type, level/class at academy start, passive_background, visible_manifestation, can_do, limits, do_not."
  character_cards:
    akira: "characters/akira/main.yaml"
    livia: "characters/livia/main.yaml"
    haru: "characters/haru/main.yaml"
    raiden: "characters/raiden/main.yaml"
    kir: "characters/kir/main.yaml"
    kiara: "characters/kiara/main.yaml"

character_pair_rules:
  akira_raiden:
    when_all_scene_character_ids:
      - "akira"
      - "raiden"
    files:
      - "canon_lore/hidden/raiden_akira_bond.yaml"
    usage: "Использовать для подтекста и реакции между Акирой и Райденом; не раскрывать hidden lore напрямую."

visibility_levels:
  public_world:
    meaning: "Можно использовать как фон мира. Персонажи могут знать это, если по логике мира должны знать."
  academy_common:
    meaning: "Можно использовать как знания студентов/персонала Академии, если персонаж имеет доступ."
  hidden_author:
    meaning: "Авторская скрытая истина. Использовать для подтекста. Нельзя выдавать персонажам без сыгранного раскрытия."
  system_rule:
    meaning: "Инструкция для ИИ. Не является знанием персонажей."
