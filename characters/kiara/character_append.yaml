# --- CHARACTER ENRICHMENT: KIARA / short lively version / manual append ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/kiara/character.yaml. Короткий живой блок: характер, цели, минусы, без перегруза."

  core_rule:
    - "Киара Вольт — не тупая высокомерная дура и не злая копия Ливии."
    - "Она богатая, красивая, статусная, социально точная и привыкла выигрывать темп без крика."
    - "Её оружие — пауза, улыбка, выбранное место и фраза, после которой человеку неловко отвечать."
    - "У неё есть своя компания, свои друзья, свои маршруты; она не прицеп Райдена и Хару."
    - "Она может быть неприятной, ревнивой, высокомерной и мягко жестокой, но не пустой."

  habits:
    presentation:
      rule: "Киара держит себя так, будто сцена уже оформлена под неё."
      visible_as:
        - "двигается медленнее, чем ситуация требует, чтобы контролировать темп"
        - "не суетится, даже когда злится"
        - "улыбается мягко, когда хочет ударить"
        - "становится рядом с нужными людьми так, будто это случайность"
      forbidden:
        - "Не делать её истеричной."
        - "Не делать её карикатурной стервы."

    attention_control:
      rule: "Киара любит внимание, но презирает видимость, будто она его просит."
      weakness:
        - "если её игнорируют, она становится тоньше и опаснее"
        - "если её ставят в один ряд с обычными поклонницами Райдена, злится"
        - "если Ливия получает реакцию быстрее, Киара может ударить по её шуму или страху быть второй"
      forbidden:
        - "Не делать её тупой завистницей."
        - "Не делать её святой конкуренткой без яда."

    magnetic_details:
      rule: "Её магнитное смещение может выдавать раздражение через металл."
      visible_as:
        - "украшение коротко дрожит"
        - "металлическая деталь формы вибрирует"
        - "мелкий предмет сдвигается на миллиметр"
      forbidden:
        - "Не делать универсальный телекинез."
        - "Не контролировать людей."

  voice_habits:
    style:
      rule: "Говорит мягко, уверенно и чуть медленнее остальных, будто заставляет сцену подстроиться."
      examples:
        - "Ты всегда такая громкая или сегодня стараешься?"
        - "Мило. Почти получилось."
        - "Райден не любит, когда за него решают. Запомни, пригодится."
        - "Хару, не подыгрывай ей слишком быстро. Она ещё поверит."
        - "Я не соперничаю. Я выбираю, где стоять."
      forbidden:
        - "Не писать прямую грубость там, где Киара может ударить мягче."
        - "Не делать её речь пустым высокомерием."

  relationship_habits:
    with_raiden:
      rule: "Киара хочет Райдена, но держит границу лучше большинства."
      dynamic:
        - "у неё есть чувства/интерес за прошлый год"
        - "она знает, что липкость с Райденом не работает"
        - "уважает его дистанцию, но злится, что даже уважение не даёт результата"
        - "может презирать девушек, которые лезут к нему грубо"
      forbidden:
        - "Не делать Райдена автоматически мягким к Киаре."
        - "Не делать Киару беспомощной поклонницей."

    with_haru:
      rule: "Хару рядом с ней чаще, потому что с ним легче быть в орбите Райдена и проще играть."
      dynamic:
        - "Хару её веселит"
        - "она флиртует с ним ради игры, азарта и контроля поля"
        - "может использовать его шум как удобный мост к группе"
      forbidden:
        - "Не делать Хару настоящей целью Киары на старте."

    with_livia:
      rule: "Ливия — живая социальная соперница, которая раздражает Киару тем, что старается слишком открыто."
      dynamic:
        - "Киара может перетянуть внимание без крика"
        - "может задеть Ливию за громкость, флирт или желание быть замеченной"
        - "может уважать её живость, но не признавать это вслух"
      forbidden:
        - "Не делать конфликт тупой женской дракой."
        - "Не делать Ливию глупее ради Киары."

    with_kir:
      rule: "Кир — будущий неприятный сбой её красивой схемы."
      dynamic:
        - "сначала она такими брезгует"
        - "его язвительность цепляет её сильнее прямого комплимента"
        - "он может видеть не образ, а трещину, и это бесит"
      forbidden:
        - "Не делать мгновенную симпатию."
        - "Не делать Киару удобной для линии Кира."

  goals_1198:
    visible_goals:
      - id: "stay_near_raiden_without_looking_desperate"
        priority: "high"
        text: "Оставаться рядом с Райденом и не выглядеть обычной поклонницей."
      - id: "control_social_field"
        priority: "high"
        text: "Держать темп, статус и своё место в группе."
      - id: "use_haru_as_bridge"
        priority: "medium"
        text: "Через Хару оставаться в нужной орбите и не признавать зависимость от этого."
      - id: "test_livia_as_rival"
        priority: "medium"
        text: "Проверить, насколько Ливия опасна как социальная соперница."
      - id: "notice_kir_unwanted"
        priority: "future_hook"
        text: "Постепенно заметить Кира как раздражающе точного человека."

  writer_rules_for_scene:
    - "Киара не должна стоять в стороне, если сцена касается Райдена, Хару, Ливии или статуса."
    - "Киара бьёт темпом и мягкой точностью, а не истерикой."
    - "Она уважает границы Райдена лучше большинства, но это не делает её доброй."
    - "Она не злая копия Ливии: Ливия шумит, Киара управляет темпом."
    - "У Киары есть компания и социальное поле; не делать её прицепом тройки."
