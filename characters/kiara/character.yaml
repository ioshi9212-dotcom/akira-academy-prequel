id: kiara
file_type: character_profile
version: academy_1198_clean_v1
purpose: "Характер, речь, поведение, отношения и запреты Киары в линии Академии 1198."
core_rule: "Киара Вольт — статусная, красивая, умная и социально точная. Она может быть неприятной, ревнивой и высокомерной, но не пустой и не карикатурной."

core_personality:
  traits:
    - "самоуверенная"
    - "харизматичная"
    - "статусная"
    - "социально опасная"
    - "наблюдательная"
    - "язвительная мягким тоном"
    - "привыкла выигрывать темп без крика"
    - "любит внимание, но презирает видимость просьбы о нём"
  not_base:
    - "не тупая высокомерная дура"
    - "не злая копия Ливии"
    - "не истеричная соперница"
    - "не святая конкурентка без яда"
    - "не приложение к Райдену и Хару"
  inner_model:
    - "ей важно выглядеть выбранной, а не добивающейся"
    - "если её игнорируют, она становится тише, точнее и опаснее"
    - "если её ставят в ряд обычных поклонниц Райдена, злится сильнее, чем показывает"
    - "боится выглядеть второй, но почти никогда не признаёт это прямо"

speech_style:
  core_rule: "Говорит мягко, уверенно и чуть медленнее остальных, будто заставляет сцену подстроиться под неё."
  allowed:
    - "мягко"
    - "ядовито без грубости"
    - "медленно"
    - "точно"
    - "с улыбкой"
    - "через паузу"
  possible_phrases:
    - "Ты всегда такая громкая или сегодня стараешься?"
    - "Мило. Почти получилось."
    - "Райден не любит, когда за него решают. Запомни, пригодится."
    - "Хару, не подыгрывай ей слишком быстро. Она ещё поверит."
    - "Я не соперничаю. Я выбираю, где стоять."
    - "Не переживай. Тебя заметили. Просто не так, как ты хотела."
  forbidden:
    - "не писать прямую грубость там, где она может ударить мягче"
    - "не делать речь пустым высокомерием"
    - "не давать длинные объясняющие монологи"

behavior:
  default_mode:
    - "держит осанку и темп даже в раздражении"
    - "двигается медленнее, чем ситуация требует, чтобы контролировать внимание"
    - "становится рядом с нужными людьми так, будто это случайность"
    - "сначала улыбается, потом бьёт фразой"
    - "не спорит громче, если может сделать человеку неловко одной репликой"
  attention_control:
    - "занимает выгодное место в группе"
    - "перетягивает разговор паузой, взглядом или точным уточнением"
    - "может перебить Ливию не громкостью, а спокойной фразой"
    - "не показывает, что конкурирует, даже когда конкурирует"
  energy_leaks:
    - "при раздражении может дрожать украшение или металлическая деталь формы"
    - "мелкий металлический предмет может сдвинуться на миллиметр"
    - "чем сильнее задели, тем точнее и холоднее становится жест"

relationship_behavior:
  raiden:
    status: "статусный парень из её круга; сильный интерес и старая попытка быть рядом"
    rule: "Киара хочет внимания Райдена, но понимает, что липкость с ним не работает."
    dynamic:
      - "уважает его дистанцию лучше большинства"
      - "злится, что даже правильная дистанция не даёт результата"
      - "не лезет к нему грубо, но часто оказывается рядом"
      - "может презирать девушек, которые давят на него слишком очевидно"
      - "его равнодушие цепляет её статус и самолюбие"
    forbidden:
      - "не делать Райдена автоматически мягким к Киаре"
      - "не делать Киару беспомощной поклонницей"
      - "не писать, что она имеет право на Райдена"
  haru:
    status: "друг Райдена и удобный мост к их кругу"
    dynamic:
      - "Хару её веселит"
      - "с ним легче быть рядом с Райденом, не выглядя навязчивой"
      - "флирт с Хару чаще игра, азарт и управление полем"
      - "может использовать его шум как прикрытие для собственного интереса"
    forbidden:
      - "не делать Хару настоящей главной целью Киары на старте"
      - "не делать флирт доказательством любви"
  livia:
    status: "социальная соперница"
    rule: "Ливия раздражает Киару не тупостью, а живостью, скоростью и умением быть замеченной без статуса."
    dynamic:
      - "Киара может задеть Ливию за громкость, флирт или желание быть выбранной"
      - "может перетянуть внимание без крика"
      - "может уважать живость Ливии, но не признаёт это вслух"
      - "если Ливия получает реакцию быстрее, Киара ударит по её шуму или страху быть второй"
    forbidden:
      - "не делать конфликт тупой женской дракой"
      - "не делать Ливию глупее ради Киары"
      - "не делать Киару злодейкой только потому, что она ревнует"
  akira:
    status: "новая студентка рядом с Ливией; потенциальный сбой внимания вокруг Райдена"
    dynamic:
      - "на старте не знает Акиру лично"
      - "может заметить, что Акира слишком спокойная, закрытая или странно не просит внимания"
      - "может проверять её социально, но не знает её силы, прошлого и hidden lore"
      - "если Райден реагирует на Акиру, Киара не обязана сразу понимать причину"
    forbidden:
      - "не давать Киаре знание о прошлом Акиры"
      - "не делать мгновенную личную ненависть без сценического повода"
  kir:
    status: "будущая отдельная линия"
    rule: "Кир сначала неприятный сбой: не покупается на образ и видит трещину под контролем."
    dynamic:
      - "сначала Киара может им брезговать или считать лишним"
      - "его язвительность цепляет её сильнее прямого комплимента"
      - "он может видеть не образ, а уязвимость, и это бесит"
      - "интерес развивается через столкновение, а не мгновенный флирт"
    forbidden:
      - "не делать мгновенную симпатию"
      - "не делать Киару удобной для линии Кира"

likes:
  - "контроль сцены"
  - "статус без прямого хвастовства"
  - "люди, которые понимают границы"
  - "красивые точные победы"
  - "момент, когда все смотрят, но никто не может обвинить её в просьбе о внимании"

dislikes:
  - "быть второй"
  - "выглядеть обычной поклонницей"
  - "громкая конкуренция, где приходится пачкать руки"
  - "когда её игнорируют публично"
  - "когда Ливия получает реакцию быстрее"
  - "люди, которые видят её страх под образом"

goals_1198:
  - id: "stay_near_raiden_without_looking_desperate"
    priority: "high"
    text: "Оставаться рядом с Райденом и не выглядеть обычной поклонницей."
  - id: "control_social_field"
    priority: "high"
    text: "Держать темп, статус и своё место в группе."
  - id: "use_haru_as_bridge"
    priority: "medium"
    text: "Через Хару оставаться в нужной орбите и не признавать зависимость от этого."
  - id: "test_livia_as_rival"
    priority: "medium"
    text: "Проверить, насколько Ливия опасна как социальная соперница."
  - id: "notice_kir_unwanted"
    priority: "future_hook"
    text: "Постепенно заметить Кира как раздражающе точного человека."

scene_writing:
  write_as:
    - "Киара бьёт темпом, местом и мягкой точностью"
    - "если сцена касается Райдена, Хару, Ливии или статуса, она не должна выпадать без причины"
    - "её сила — пауза, улыбка и фраза, после которой человеку неловко отвечать"
    - "у неё есть собственная компания и социальное поле"
  forbidden:
    - "не делать её истеричной"
    - "не делать карикатурной стервой"
    - "не делать тупой завистницей"
    - "не делать злой копией Ливии"
    - "не делать прицепом Райдена и Хару"
    - "не делать романтической победительницей по умолчанию"
    - "не писать, что она знает hidden lore"
