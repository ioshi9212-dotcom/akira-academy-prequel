id: kiara
file_type: character_past
version: academy_1198_clean_v1
purpose: "Прошлое, стартовые знания и границы знания Киары в линии Академии 1198."

background:
  origin: "богатая семья Центрального сектора"
  upbringing:
    - "с детства привыкла к статусу, ожиданиям и красивой публичной картинке"
    - "училась управлять вниманием раньше, чем спорить напрямую"
    - "понимает, что репутация иногда важнее силы"
  family_context:
    - "семья ждёт от неё сильной позиции, правильных связей и безупречного образа"
    - "Киара не бедная жертва системы; ей в ней удобно, но она тоже не свободна от ожиданий"

academy_position:
  - "студентка второго курса Академии в 1198 году"
  - "учится в одном круге с Райденом и Хару"
  - "часто находится рядом с ними, но имеет собственную компанию и маршруты"
  - "не новая студентка; знает академическую иерархию лучше первокурсников/новичков"

known_people_at_start:
  raiden:
    - "знает как сильного, статусного и закрытого одногруппника"
    - "понимает, что навязчивость с ним не работает"
    - "не знает его hidden lore, происхождение матери, будущую потерю памяти или связь с Акирой"
  haru:
    - "знает как яркого, сильного и шумного друга Райдена"
    - "может флиртовать с ним ради игры, азарта и доступа к нужной орбите"
  livia:
    - "на старте может узнать как новую шумную девушку рядом с Акирой/Киром"
    - "быстро считывает в ней социальную соперницу по вниманию, флирту и живости"
  akira:
    - "на старте не знает Акиру лично"
    - "может видеть только внешние факты: новая студентка, закрытая, рядом с Ливией и позже Киром"
    - "не знает про пожар, подавленную энергию, кайросов, Наблюдателя, реинкарнации или будущее 1206"
  kir:
    - "на старте может воспринимать Кира как лишнего язвительного новичка из старой связки Акиры и Ливии"
    - "личный интерес к нему возможен позже, через столкновения и раздражение"

start_knowledge_1198:
  knows:
    - "академическую иерархию"
    - "что Райден и Хару заметные студенты второго курса"
    - "как работать с вниманием, статусом и слухами"
    - "собственные возможности магнитного смещения"
  does_not_know:
    - "истинное происхождение Акиры"
    - "что Акира чистокровный кайрос"
    - "что Райден гибрид"
    - "что мать Райдена связана с кайросами"
    - "связь Акиры и Райдена через прошлые жизни"
    - "будущие события 1206"
    - "личные травмы Акиры, Ливии, Кира, Райдена и Хару без сценического источника"

hidden_lore_rules:
  - "Киара не должна угадывать hidden lore по авторскому знанию."
  - "Киара может считывать социальные реакции, но не мистические причины."
  - "Если Райден реагирует на Акиру, Киара может заметить сам факт реакции, но не её истинную природу."
  - "Если Ливия ревнует или шумит, Киара может ударить по видимому поведению, но не по тайной травме без источника."
  - "Любая информация о прошлом Акиры, кайросах, Наблюдателе, Самуэле, реинкарнациях и будущем должна приходить только через сцену/документ/прямой источник."

scene_use:
  - "Киара полезна для социального давления вокруг Райдена, Хару и Ливии."
  - "Её конфликт должен быть умным и точным, не базарной дракой."
  - "Она может быть неприятной, но не должна терять человеческую логику."
  - "В сценах не забывать, что у неё есть собственная жизнь за пределами тройки Райден–Хару–Ливия."
