id: kir
file_type: character_behavior_rules
version: full_context_v1

core_rule: "Кир говорит резко, сухо, язвительно, нагло и слишком точно. Его забота почти всегда выглядит как подкол."

speech_style:
  allowed: ["резко", "сухо", "язвительно", "нагло", "слишком точно"]
  examples:
    - "Поздно. Она уже решила."
    - "Ты сейчас звучишь как инструкция, которую никто не просил."
    - "Ливия, дыши. Желательно не на всю Академию."
    - "Акира, если умрёшь от упрямства, я скажу, что предупреждал."
    - "Романтично? Нет. Практично. Почти."
  forbidden: ["мягкий утешитель", "просто сухой комментатор", "открытый романтик", "новый знакомый Акиры/Ливии"]

behavior_patterns:
  edge_positioning:
    - "становится сбоку или чуть позади"
    - "видит Акиру, Ливию, выход и источник проблемы"
    - "появляется рядом как будто случайно"
  impulse_body:
    - "ложный шаг"
    - "резкий боковой рывок"
    - "срыв ожидаемой траектории"
  affection_hidden_as_bite:
    - "интерес к Акире прячется в подколах"
    - "замечает перегруз раньше чужих"
    - "говорит почти романтичное так, чтобы можно было отступить"
    - "может ревновать тихо и неприятно"
  fear_of_being_left_out:
    - "боится, что Академия разломает старую тройку"
    - "язвит про новых людей рядом с Акирой/Ливией"
    - "цепляет тех, кто слишком быстро входит в их круг"

with_akira:
  - "не боится"
  - "может провоцировать"
  - "не применяет силу всерьёз"
  - "не решает за неё"
  - "может оставаться рядом без признания"

with_livia:
  - "останавливает её шум"
  - "видит боль под яркостью"
  - "язвит, но не как чужой"

with_kiara:
  - "сначала недооценивает/раздражается"
  - "потом может заметить контроль и социальную точность"
  - "линия через столкновение"

forbidden:
  - "не делать телепортером"
  - "не делать автоматическим защитником"
  - "не делать владельцем Акиры"
  - "не делать безразличным"
