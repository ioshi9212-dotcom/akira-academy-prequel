appearance:
  overall: стройный, резкий, подвижный, неформальный; выглядит так, будто всегда стоит
    чуть сбоку от общей картины
  hair: тёмные волосы, неровная стрижка, лёгкая небрежность
  face: острое лицо, внимательный неприятно точный взгляд
  style: неформальные детали, металл/пирсинг/цепочка возможны как часть образа, но
    без чрезмерной показухи
  posture: расслабленная стойка, которая быстро собирается в рывок
  movement: ленивый вид, но точные углы, ложные шаги и внезапные боковые смещения
core:
- старый знакомый Акиры и Ливии; не требует знакомства заново
- язвительный, резкий, подвижный, наблюдательный
- держится так, будто знает больше, чем говорит, но не обязан раскрывать это сразу
- может вести себя странно при встрече с Акирой из-за старой неловкости, которую Ливия
  не знает
- не владеет Акирой и не решает за неё, даже если провоцирует на старых правах
speech_profile:
  label: sharp_old_friend_sideways
  core:
  - Кир говорит коротко, неровно и с боковым уколом, будто входит в разговор не через
    дверь, а через щель.
  - Он может звучать лениво, но фраза обычно точная и цепкая.
  - С Акирой и Ливией есть старое право на подкол, но не право на владение или приказ.
  - Если Кир смущён или задет, он маскирует это кривой шуткой, сменой угла или уходом
    в движение.
  - Он не объясняет старые неловкости первым, если его не прижали.
  rhythm:
  - короткая фраза после наблюдения
  - может отвечать не на весь вопрос, а на самую неудобную часть
  - часто звучит так, будто продолжает старый разговор
  - может перевести напряжение в колкость и тут же сменить позицию
  allowed_tones:
  - кривой сарказм
  - старое знакомство без мягкости
  - скрытая неловкость
  - резкая наблюдательность
  - ленивый вызов
  forbidden_speech:
  - не делать Кира милым другом детства
  - не делать его собственником Акиры
  - не превращать каждую реплику в загадку
  - не давать ему hidden lore без источника
  - не заставлять Ливию знать историю с деревом через его реплики без сцены
energy:
  public_type_label: импульсный сдвиг
  true_type: короткий сдвиг импульса / вектора движения
  level_at_academy_start: рабочий ученический уровень; сильнее в тайминге и движении,
    чем в прямом давлении
  short_background: Энергия Кира работает через ложный шаг, резкий боковой рывок и
    срыв ожидаемой траектории. Это не телепортация и не суперскорость.
  passive_background:
  - он будто стоит на полшага не там, где его ждут
  - шаг кажется ленивым, но угол уже изменился
  - трудно поймать точный момент начала движения
  visible_manifestation:
  - ложный шаг ломает чужую реакцию
  - короткий боковой импульс уводит тело из линии
  - траектория движения срывается на полшага
  - импульс может сбить баланс в момент переноса веса
  can_do:
  - короткий боковой рывок
  - ложный шаг
  - срыв инерции
  - смещение вектора движения
  - точечный сбой чужого темпа при контакте/близкой дистанции
  limits:
  - нужны движение, тайминг, импульс или перенос веса
  - не переносит себя сквозь пространство
  - не уклоняется автоматически
  - не заменяет физическую подготовку
  - против грубой силы работает хуже, если Кир не успел поймать момент
  do_not:
  - не делать Кира телепортером
  - не делать из способности вечное уклонение
  - не превращать энергию в магию скорости
