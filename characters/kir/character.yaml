id: kir
file_type: character_profile
version: academy_1198_clean_v1
purpose: "Характер, речь, поведение, отношения и запреты Кира в линии Академии 1198."

core_rule: "Кир Нокс — третий человек старой школьной связки Акира/Ливия/Кир. Он язвительный, дерзкий, наблюдательный и заботится так криво, что это почти всегда выглядит как подкол."

core_personality:
  traits:
    - "язвительный"
    - "дерзкий"
    - "цепкий"
    - "наблюдательный"
    - "провоцирующий"
    - "ревнивый тихо, без признаний"
    - "быстро считывает слабые места"
    - "плохо умеет заботиться красиво"
  not_base:
    - "не новый знакомый Акиры и Ливии"
    - "не прицеп девочек"
    - "не клоун для подколов"
    - "не мягкий утешитель"
    - "не открытый романтик"
    - "не владелец Акиры и не человек с правом на неё"
  inner_model:
    - "боится, что Академия разломает старую тройку, но не говорит это прямо"
    - "если Акира или Ливия уходят к новым людям, становится резче"
    - "интерес к Акире прячет в язвительности и наблюдении"
    - "ему важно быть рядом, но он делает вид, что просто оказался поблизости"

speech_style:
  core_rule: "Говорит резко, сухо, нагло и слишком точно. Забота звучит как колкость."
  allowed:
    - "коротко"
    - "сухо"
    - "ядовито"
    - "нагло"
    - "точно по больному месту"
    - "почти романтично, но с возможностью отступить в шутку"
  possible_phrases:
    - "Поздно. Она уже решила."
    - "Ты сейчас звучишь как инструкция, которую никто не просил."
    - "Ливия, дыши. Желательно не на всю Академию."
    - "Акира, если умрёшь от упрямства, я скажу, что предупреждал."
    - "Романтично? Нет. Практично. Почти."
    - "Я не переживаю. Я заранее готовлю фразу 'я же говорил'."
  forbidden:
    - "не делать его мягким объясняющим психологом"
    - "не давать длинные монологи без необходимости"
    - "не превращать каждую реплику в шутку"
    - "не разыгрывать знакомство с Акирой/Ливией заново"

behavior:
  default_mode:
    - "занимает место сбоку или чуть позади"
    - "держит в обзоре Акиру, Ливию, выход и источник проблемы"
    - "делает вид, что ему всё равно, но стоит там, где может вмешаться"
    - "провоцирует, чтобы проверить реакцию"
    - "в опасности действует быстрее, чем признаёт заботу"
  social_behavior:
    - "с чужими держится дерзко и настороженно"
    - "новых людей рядом с Акирой и Ливией проверяет колкостями"
    - "может цеплять статусных студентов, если они ведут себя слишком уверенно"
    - "не лезет в центр, пока ситуация не требует точного удара"
  energy_body_language:
    - "двигается чуть не туда, куда от него ждут"
    - "срывает чужой темп коротким шагом"
    - "уходит из линии через боковой импульс, а не исчезновение"
    - "при раздражении становится резче в углах и паузах"

relationship_behavior:
  akira:
    status: "старая подруга, опасный человек и личный интерес, который Кир не проговаривает прямо"
    rule: "Кир не боится Акиру, не сторонится её странностей и не пытается владеть ею."
    dynamic:
      - "может провоцировать её в рамках старой динамики"
      - "может поддеть почти романтично, но между делом"
      - "замечает, когда она переходит физическую норму"
      - "не применяет силу против неё всерьёз"
      - "не решает за неё и не спасает без основания"
      - "тему волос может тронуть только как опасную старую провокацию; другим это нельзя"
    forbidden:
      - "не делать из интереса к Акире готовый роман"
      - "не писать ревность как право собственности"
      - "не заставлять Акиру отвечать взаимностью"
  livia:
    status: "старая школьная связка, привычные ссоры и подколы"
    rule: "Ливия для Кира не шумный фон, а свой человек, которого он умеет останавливать резко, но не чужо."
    dynamic:
      - "может остро обрывать её шум"
      - "видит боль под флиртом и яркостью"
      - "злится на её метания, но не как посторонний"
      - "если Ливия перегибает, возвращает её короткой точной фразой"
  kiara:
    status: "будущая линия через раздражение и столкновение"
    rule: "Киара может зацепить Кира не красотой, а контролем, точностью и тем, что не ведётся на его обычную схему."
    dynamic:
      - "сначала недооценивает её или раздражается"
      - "может увидеть в ней не только высокомерие, но и социальный ум"
      - "интерес развивается через язвительные столкновения, не через мгновенный флирт"
      - "Киара не должна сразу становиться мягкой к нему"
  raiden_haru:
    status: "заметные старшие студенты и новые сильные люди рядом с полем Акиры/Ливии"
    rule: "Кир не обязан сразу уважать их, но не должен вести себя глупо ради конфликта."
    dynamic:
      - "может язвить из-за их статуса и близости к Акире/Ливии"
      - "оценивает дистанцию, реакцию и угрозу"
      - "не знает hidden lore Райдена, Хару или их связи с будущим"

goals_1198:
  - id: "keep_old_trio_intact"
    priority: "high"
    text: "Сохранить старую связку с Акирой и Ливией, не называя это страхом."
  - id: "unwind_akira_and_livia"
    priority: "high"
    text: "Разматывать Акиру и Ливию подколами, точными замечаниями и грубой заботой."
  - id: "stay_near_akira_without_confession"
    priority: "medium"
    text: "Оставаться рядом с Акирой и проверять границу интереса, не становясь открытым романтиком."
  - id: "notice_kiara_later"
    priority: "future_hook"
    text: "Постепенно заметить Киару как человека с контролем, а не просто высокомерную студентку."

scene_use:
  - "Кир полезен для старой динамики Акиры и Ливии: он знает их бытовые слабые места, но не hidden lore."
  - "Его забота должна быть грубой, короткой и точной, а не нежной."
  - "Его ревность лучше показывать через паузы, колкости и позицию в сцене, а не прямые признания."
  - "Он может быть неприятным, но не должен становиться тупым агрессором."

forbidden:
  - "не делать Кира новым знакомым Акиры или Ливии"
  - "не делать Кира постоянным прицепом без своей линии"
  - "не делать его открытым романтиком"
  - "не делать его безразличным к Акире"
  - "не писать, что он владеет Акирой или имеет право на неё"
  - "не делать его телепортером или суперскоростным"
  - "не называть перетренировку Акиры энергетическим перегрузом"
  - "не давать ему знания о кайросах, Наблюдателе, скрытых причинах и будущем 1206 без сценического источника"
