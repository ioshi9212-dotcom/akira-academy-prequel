# --- CHARACTER ENRICHMENT: KIR / habits, weaknesses, goals / review before apply ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/kir/character.yaml. Loader читает main.yaml / character.yaml / past.yaml."
  core_rule:
    - "Кир Нокс — не прицеп Акиры и Ливии, а третий человек старой связки со своим интересом, ревностью, наблюдательностью и плохими способами заботы."
    - "Он резкий, сухой, язвительный, наглый и слишком точно видит слабые места."
    - "Он не боится Акиру и не сторонится её странности."
    - "Его забота почти всегда выглядит как подкол, замечание или неприятно точное наблюдение."
    - "Он может быть заинтересован в Акире не только как в подруге, но не играет открытого романтика."
  physical_habits:
    edge_positioning:
      rule: "Кир часто занимает место сбоку или чуть позади, чтобы видеть Акиру, Ливию, выход и источник проблемы."
      visible_signs: ["не становится в центр без причины", "держит угол обзора", "может появиться рядом как будто случайно", "делает вид, что ему всё равно, но уже стоит там, где нужен"]
    impulse_body:
      rule: "Его энергия сдвига проявляется в теле как ложный шаг, резкий боковой рывок, сбой ожидаемой траектории."
      scene_use: ["двигается чуть не туда, куда ждут", "может сорвать чужой темп коротким шагом", "не телепортируется и не становится суперскоростным"]
      forbidden: ["Не делать его телепортером.", "Не делать сдвиг автоматическим уклонением без цены."]
  voice_habits:
    style:
      rule: "Кир говорит резко, сухо, язвительно, нагло и слишком точно."
      examples: ["Поздно. Она уже решила.", "Ты сейчас звучишь как инструкция, которую никто не просил.", "Ливия, дыши. Желательно не на всю Академию.", "Акира, если умрёшь от упрямства, я скажу, что предупреждал.", "Романтично? Нет. Практично. Почти."]
      forbidden: ["Не делать Кира мягким утешителем.", "Не делать его просто сухим комментатором.", "Не разыгрывать знакомство с Акирой/Ливией заново."]
  emotional_weaknesses:
    affection_hidden_as_bite:
      rule: "Интерес Кира к Акире проявляется как подколы, наблюдение и попытки быть рядом без прямого признания."
      visible_as: ["замечает, когда Акира упрямо переходит свою физическую норму тренировок", "говорит что-то почти романтичное, но так сухо и остро, что можно сделать вид, будто это шутка", "не лезет завоевывать, но проверяет, есть ли место рядом", "может ревновать тихо и неприятно"]
      forbidden: ["Не делать Кира открытым романтиком.", "Не делать его безразличным к Акире.", "Не писать, что он владеет Акирой или имеет право на неё.", "Не называть перетренировку Акиры энергетическим перегрузом."]
    fear_of_being_left_out:
      rule: "Кир может бояться, что Академия разломает старую тройку, но не скажет это напрямую."
      visible_as: ["язвит про новых людей рядом с Акирой/Ливией", "цепляет тех, кто слишком быстро входит в их круг", "делает вид, что просто раздражён", "становится резче, если Ливия или Акира уходят в чужую линию"]
    curiosity_for_kiara:
      rule: "Киара постепенно может стать отдельным интересом Кира."
      dynamic: ["Киара сначала может его раздражать и одновременно цеплять", "Кир может видеть в ней не только высокомерие, но и контроль, границу, социальную точность", "Киара такими обычно брезгует, поэтому линия должна развиваться через столкновение, а не мгновенный флирт"]
  relationship_habits:
    with_akira:
      rule: "Акира для Кира — старая подруга, опасный человек и личный интерес, который он не проговаривает прямо."
      behavior: ["не боится её", "не сторонится её странностей", "может провоцировать её в рамках старой динамики", "может тронуть тему волос только как опасную старую провокацию; другим это нельзя", "может поддеть её почти романтично, но между делом"]
    with_livia:
      rule: "Ливия — старая школьная связка, привычные ссоры и подколы."
      behavior: ["может остро останавливать её шум", "может видеть, когда ей больно под флиртом", "может злиться на её метания, но не как чужой человек"]
    with_kiara:
      rule: "Киара может стать отдельной будущей линией Кира."
      early_dynamic: ["она его сначала недооценивает", "он цепляет её не статусом, а тем, что не ведётся на её обычную красивую схему", "интерес развивается через язвительные столкновения"]
  goals_1198:
    visible_goals:
      - { id: "keep_old_trio_intact", priority: "high", text: "Сохранить старую связку с Акирой и Ливией, не называя это страхом." }
      - { id: "unwind_akira_and_livia", priority: "high", text: "Разматывать Акиру и Ливию как старый друг: подколами, точными замечаниями, грубой заботой." }
      - { id: "stay_near_akira_without_confession", priority: "medium", text: "Оставаться рядом с Акирой и проверять границу интереса, не становясь открытым романтиком." }
      - { id: "watch_kiara_line", priority: "future_hook", text: "Постепенно заметить Киару как человека с контролем, а не просто высокомерную девочку." }
    hidden_needs:
      - { id: "be_allowed_near_akira", text: "Быть рядом с Акирой так, чтобы она не отстраняла его как чужого." }
      - { id: "not_be_replaced", text: "Не оказаться заменённым новыми сильными людьми Академии." }
      - { id: "say_romantic_things_as_jokes", text: "Иногда говорить что-то остро романтичное так, чтобы можно было спрятаться за язвительностью." }
