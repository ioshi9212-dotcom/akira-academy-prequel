id: kir
file_type: character_past
version: academy_1198_clean_v1
purpose: "Прошлое, стартовые знания и границы знания Кира в линии Академии 1198."

global_rules:
  - "Кир знает Акиру и Ливию до Академии; заново их не знакомить."
  - "Кир знает бытовое прошлое старой тройки, но не hidden lore."
  - "Подозрение, ревность и наблюдательность не равны мистическому знанию."
  - "Если информация не раскрыта сценой, документом или прямым источником, Кир её не знает."

background:
  old_school_link:
    - "Кир, Ливия и Акира стали связкой до Академии, уже после обычной школы Акиры."
    - "У них есть личные шутки, дозволенные нарушения границ, привычные ссоры и грубоватая забота."
    - "Кир не был случайным знакомым и не должен вести себя как человек, который впервые видит Акиру/Ливию."
  academy_entry:
    - "15 августа 1198 года Кир появляется в Академии чуть позже как опоздавший новичок."
    - "Он может войти в сцену с ощущением 'свой человек пришёл поздно', а не как новый незнакомец."

knowledge_at_start:
  date: "1198-08-15"
  knows_for_sure:
    about_akira:
      - "Акира — старая подруга из школьной связки."
      - "Кир может называть её Кирой, потому что входит в близкий круг."
      - "Волосы Акиры — опасная личная граница; чужим нельзя трогать."
      - "После пожара и истории с Каем Акира стала резче, закрытее и меньше себя бережёт."
      - "Последний год Акира иногда тренировалась сверх разумной физической нормы. Это не энергетический перегруз."
      - "Кир знает пластырь на щеке 15 августа: видел, как Акира доставала кота с дерева в грозу, а Ливия клеила пластырь."
      - "Кир знает часть истории про Кая, Слепую зону, ставку и последствия для Акиры."
      - "Кир помнит своё почти-признание до Кая, но не знает, как Акира его на самом деле восприняла."
    about_livia:
      - "Ливия — старая подруга и часть той же тройки."
      - "Кир знает, что её шум и флирт не всегда означают лёгкость."
      - "Он может останавливать её резко, но как свой человек."
    about_academy:
      - "Кир знает базовые правила поступления и что Академия соберёт вокруг них новых сильных людей."
      - "Он понимает, что старой тройке придётся столкнуться с новой иерархией."
  suspects:
    - "Акира скрывает больше боли, чем показывает."
    - "Кай сломал не всё, но оставил грязный след."
    - "В Академии старую тройку могут быстро растащить по новым людям и статусам."
  does_not_know:
    - "что Акира чистокровный кайрос"
    - "истинное происхождение Акиры"
    - "связь Акиры с Наблюдателем"
    - "причины возможного напряжения между Акирой и Райденом"
    - "что Райден гибрид"
    - "будущие события 1206"
    - "что погибшая учительница из прошлого Акиры связана с Хару/Ханой, если это не раскрыто сценой"
    - "личные hidden-прошлые Райдена, Хару, Киары и Самуэля"

past_blocks:
  old_trio:
    title: "Старая тройка"
    what_happened:
      - "Кир, Ливия и Акира привыкли держаться рядом ещё до Академии."
      - "Связь не идеальная и не мягкая: там колкости, привычные ссоры, личные темы и доверие через действия."
      - "Кир занимает роль того, кто видит сбоку и вмешивается так, будто просто язвит."
    scene_rules:
      - "Не знакомить Кира с Акирой и Ливией заново."
      - "Не делать Кира постоянным молчаливым фоном."
      - "Не делать его единственным защитником старой тройки."

  almost_confession_before_kai:
    title: "Почти-признание до Кая"
    what_happened:
      - "До истории с Каем Кир однажды почти сказал Акире о симпатии."
      - "Сказал это в своей манере: сухо, ядовито, через раздражение и возможность спрятаться за шуткой."
      - "Фраза могла звучать почти романтично, но так, чтобы при отказе можно было сделать вид, что это была колкость."
    effects:
      - "Кир заинтересован в Акире не только как в подруге."
      - "Он не играет открытого романтика."
      - "Ливия могла догадаться."
      - "Акира могла не понять, сделать вид, что не поняла, или не принять смысл."
    forbidden:
      - "Не превращать это в готовые отношения."
      - "Не писать, что Акира обязана помнить или отвечать взаимностью."

  kai_aftereffect:
    title: "Кай и последствия"
    what_happened:
      - "Кир знает видимую часть истории с Каем: Слепая зона, ставка, унижение и последствия для Акиры."
      - "После этого Акира стала жёстче и меньше показывала, когда ей плохо."
      - "Кир может злиться на Кая и на тех, кто похожим образом лезет к Акире."
    scene_rules:
      - "Кир может реагировать на тему Кая резко."
      - "Не давать ему больше фактов, чем было раскрыто старой тройке."

  cat_plaster:
    title: "Кот и пластырь"
    date: "1198-08-14"
    what_happened:
      - "Кир видел, как Акира в грозу доставала кота с дерева."
      - "Он знает, откуда ссадина на щеке в первый день Академии."
      - "Он знает, что пластырь клеила Ливия."
    scene_rules:
      - "Кир может подкалывать Акиру за это как старый друг."
      - "Не писать, что он впервые узнаёт про пластырь."

  akira_overtraining:
    title: "Перетренировка Акиры и грубая забота"
    what_happened:
      - "После пожара и Кая Акира иногда уходила в слишком жёсткие физические тренировки."
      - "Обычная нагрузка, пробежка или баскетбол для неё нормальны."
      - "Проблема начинается, когда она упрямо переходит собственную физическую норму."
      - "Кир и Ливия пытались возвращать её к отдыху и еде."
    care_style:
      - "Кир замечает опасный момент раньше чужих."
      - "Он заботится через язвительность и неприятно точные замечания."
      - "Он не сюсюкает и не делает из Акиры слабую."
    forbidden:
      - "Не называть это энергетическим перегрузом."
      - "Не писать, что Акира слаба от обычной активности."

hidden_lore_rules:
  - "Кир не знает кайросов, Наблюдателя, скрытых причин и будущего 1206."
  - "Кир может замечать странности Акиры, но не должен правильно объяснять их мистическую природу."
  - "Кир может ревновать к новым людям вокруг Акиры/Ливии, но это не даёт ему авторского знания о Райдене, Хару или Киаре."
  - "Информация о hidden lore должна приходить только через сцену, документ или прямой источник."

forbidden:
  - "не делать Кира новым знакомым"
  - "не давать ему hidden lore"
  - "не превращать интерес к Акире в готовый роман"
  - "не делать его владельцем старой тройки"
  - "не называть перетренировку Акиры энергетическим перегрузом"
