id: kir
file_type: character_past
version: full_context_v1

purpose: "Фиксирует, что Кир знает об Акире, Ливии и старой тройке на старте Академии."

knowledge_at_start:
  knows_about_akira:
    - "Кир знает Акиру давно, из школьной связки."
    - "Кир знает Ливию давно."
    - "Кир знает, что волосы Акиры — опасная личная граница."
    - "Кир знает, что Акира после пожара и Кая стала резче и меньше себя бережёт."
    - "Кир знает, что Акира часто тренировалась до изнеможения."
    - "Кир знает пластырь на щеке 15 августа: видел, как Акира доставала кота с дерева в грозу, а Ливия клеила пластырь."
    - "Кир знает часть истории про Кая и последствия."
    - "Кир знает своё почти-признание до Кая, но не знает, как Акира это на самом деле восприняла."
  does_not_know:
    - "не знает hidden lore Акиры"
    - "не знает, что Акира чистокровный кайрос"
    - "не знает связь Акиры с Наблюдателем"
    - "не знает связь Акиры и Райдена через реинкарнации"

blocks:
  - block_id: kir_old_trio_link
    title: "Старая тройка"
    what_happened: >
      Кир, Ливия и Акира знают друг друга до Академии. У них закрытая динамика: личные шутки,
      привычные ссоры, дозволенные нарушения границ и грубоватая забота.
    rules: ["Не знакомить их заново.", "Не делать Кира постоянным прицепом.", "Не делать Кира чужим наблюдателем."]

  - block_id: kir_almost_confession_before_kai
    title: "Почти-признание до Кая"
    what_happened: >
      До истории с Каем Кир однажды почти сказал Акире о своей симпатии, но в своей манере:
      сухо, ядовито, через раздражение и возможность спрятаться за шуткой. Он мог сказать что-то почти
      романтичное, но так, чтобы при необходимости сделать вид, что это была колкость.
    effects:
      - "Кир заинтересован в Акире не только как в подруге."
      - "Он не играет открытого романтика."
      - "Ливия могла догадаться."
      - "Акира могла не понять, сделать вид, что не поняла, или не принять смысл."

  - block_id: kir_cat_plaster_witness
    title: "Кот и пластырь"
    date: "1198-08-14"
    what_happened: >
      Кир видел, как Акира в грозу доставала кота с дерева. На первый день Академии он знает,
      откуда ссадина и почему пластырь наклеила Ливия.
    scene_rule:
      - "Кир может подкалывать Акиру за это как старый друг."
      - "Не писать, что он впервые узнаёт про ссадину."

  - block_id: kir_care_after_overtraining
    title: "Перегрузы Акиры"
    what_happened: >
      После пожара и Кая Акира часто тренировалась до изнеможения. Кир и Ливия пытались заставлять её
      отдыхать и кормить клубникой/едой.
    care_style:
      - "Кир заботится через язвительность."
      - "Он замечает перегруз раньше чужих."
      - "Он может сказать неприятно точно, но не сюсюкает."

forbidden:
  - "Не делать Кира новым знакомым."
  - "Не давать ему hidden lore."
  - "Не превращать его интерес к Акире в готовый роман."
