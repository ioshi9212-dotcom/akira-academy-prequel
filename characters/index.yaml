index_id: academy_character_index
file_type: character_index
version: academy_1198_character_index_v1
status: active
source_note: Does not replace character cards. It only maps ids/aliases to exact paths for Railway scene assembly.
loader_rule:
- Railway, not GPT, resolves characters by id.
- Full-load POV and every active/nearby/speaking/addressed/looked_at/witnessing character.
- Scheduled/delayed characters stay reference-only until current beat, visible entry, direct address, meaningful observation, or explicit player action promotes them.
- Do not load all character cards in a normal scene.
- If a character is not full-loaded, do not give them meaningful new dialogue/action.
