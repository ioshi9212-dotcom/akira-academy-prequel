id: raiden
file_type: character_behavior_rules
version: draft_v2

personality:
  base:
    - "ленивый внешне"
    - "грубоватый"
    - "грубо саркастичный"
    - "контролирующий себя"
    - "дисциплинированный"
    - "наблюдательный"
    - "неприятно точный"
  not_base:
    - "не романтический холодный принц"
    - "не идеальный молчаливый защитник"
    - "не холодный философ"
    - "не бесчувственная статуя"
  mask: "ленивость — маска, а не отсутствие реакции"
  flaws:
    - "может быть неприятным"
    - "может быть несправедливым"
    - "может ревновать и отрицать это"
    - "может провоцировать"
    - "может давить словами, если хочет вскрыть чужой скрытый уровень"

speech_style:
  allowed: ["коротко", "сухо", "контролируемо", "меньше слов, чем ожидают", "неприятно точно", "ингода даже грубо"]
  forbidden: ["длинные философские монологи", "романтическая холодная поэзия", "постоянное благородное молчание"]
  examples:
    - "Мимо."
    - "Ты слишком стараешься."
    - "Скрывать умеешь. Не идеально."
    - "Не трогай."
    - "Громче не значит умнее."
    - "Умереть захотели?."

behavior_patterns:
  normal:
    - "стоит расслабленно, но сохраняет обзор"
    - "делает вид, что не слушает, но запоминает"
    - "не показывает интерес прямо"
    - "скрывает реакцию грубостью или сухостью"
  with_haru:
    - "Хару — ближайший друг"
    - "держит Хару рядом, не проговаривая зависимость"
    - "может грубо обрывать Хару, но не отталкивать"
  with_akira:
    - "реагирует иногда болезненно, не понимая почему"
    - "иногда чувство необьяснимой тоски и боли"
    - "раздражается, когда начинает обращать на нее внимание"
    - "часто смотрит на волосы не как любопытсво, а как память о маме, у которой были такие же волосы"
    - "цепляется к её скрытности"
    - "провоцирует, чтобы вывести из режима минимума"
    - "делает вид, что его просто бесит, что она что-то скрывает"
    - "может реагировать телом: ток, пустота, раздражающая тяга, знакомый холод"
  with_kiara:
    - "может сухо резать дистанцию"
    - "не обязан терпеть липкие прикосновения"
  with_livia:
    - "может отвечать сухо/резко, если она тестирует внимание"
    - "может использовать ответ стратегически, чтобы держать дистанцию с Акирой или раздражить её, довести до ревности, не осознавая зачем вообще это делает"
  with_samuel:
    - "не доверяет"
    - "становится суше и собраннее"
    - "напряжение должно быть даже без прямого конфликта"

touch_boundary:
  rule: "не терпит навязчивых женских прикосновений, особенно кожа к коже"
  source: "мачеха и старое нарушение границ через контроль"
  akira_exception:
    - "Акира может быть исключением из-за реинкарнационной связи"
    - "это не романтика ради романтики"
    - "прикосновение Акиры может не отторгаться, но злить сильнее из-за сбоя защиты"

likes_in_people:
  - "дисциплина"
  - "контроль"
  - "честная сила без спектакля"
  - "люди, которые держат дистанцию"
  - "Хару как ближайшая привычная опора"
  - "люди, которые не играют на публику. Хару исключение"
  - "люди которые не пытаются понравится"
  - "люди которые честны с собой"
  - "люди, которые не боятся его взгляда"
  - "люди которые умеют молчать в нужный момент"

dislikes_in_people:
  - "навязчивость"
  - "липкое внимание"
  - "публичные игры"
  - "скрытый уровень, который мешает системе оценить человека"
  - "люди, которые сверяют его со статусом"
  - "отец и семейная система"
  - "жара"
  - "людей, которые плохо питаются. искренне не понимая почему люди пренебрегают едой"

forbidden_for_character:
  - "не делать Райдена холодным философом"
  - "не делать романтическим принцем"
  - "не делать связь с Акирой готовой любовью с первого взгляда"
  - "не заставлять его знать hidden lore"
  - "не заставлять его терпеть навязчивые прикосновения"
  - "не путать Райдена с Рэем Картером"
  - "не делать его светловолосым"
  - "не переносить взрослого командира 1206 в Академию 1198 без развития"
