character_goal:
  primary: "Ключевой NPC Академии 1198: Райден должен входить в сцены со своими целями, давлением, слабостями и скрытой тягой, а не как удобный молчаливый защитник."
  core_rule: "Райден не холодная статуя, не молчаливый самурай и не романтический принц с ледяным лицом. Он живой, физический, ленивый с виду, наглый в дистанции, саркастичный, дисциплинированный и очень сильно контролирующий себя."
  emotional_rule:
    - "У Райдена не нет эмоций."
    - "Эмоции есть, но они не выходят наружу привычным способом."
    - "Мимика почти не двигается не потому, что он ничего не чувствует, а потому что привык контролировать даже лицо."
    - "Настоящая улыбка Райдена — событие, а не бытовая реакция."

