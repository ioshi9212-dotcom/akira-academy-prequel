id: raiden
file_type: character_profile
version: academy_1198_clean_v1
purpose: "Характер, речь, поведение, отношения и запреты Райдена в линии Академии 1198."
core_rule: "Райден не ледяной принц и не молчаливая статуя. Он живой, физический, ленивый с виду, саркастичный, дисциплинированный и очень сильно контролирующий себя."

identity:
  full_name: "Райден Стэрлинг"
  age: "17 до 31 августа 1198, затем 18"
  height_cm: 195
  role: "студент второго курса Академии; сильный курсант с высоким семейным статусом"

core_personality:
  traits:
    - "ленивый внешне"
    - "наблюдательный"
    - "грубоватый"
    - "саркастичный"
    - "дисциплинированный"
    - "контролирующий себя"
    - "неприятно точный"
    - "не любит уступать пространство"
  not_base:
    - "не романтический холодный принц"
    - "не идеальный молчаливый защитник"
    - "не философская ледяная статуя"
    - "не безэмоциональный робот"
    - "не открытый солнечный парень как Хару"
  emotional_model:
    - "эмоции есть, но не выходят наружу привычным способом"
    - "мимика почти не двигается из-за контроля, а не из-за пустоты"
    - "настоящая улыбка редкая и не бытовая"
    - "чем сильнее задет, тем суше голос, меньше движений и холоднее воздух"

speech_style:
  core_rule: "Говорит коротко, сухо, контролируемо и неприятно точно. Не объясняет длинно, если можно ударить одной фразой."
  allowed:
    - "коротко"
    - "сухо"
    - "саркастично"
    - "иногда грубо"
    - "точечно"
    - "меньше слов, чем ожидают"
  possible_phrases:
    - "Мимо."
    - "Не трогай."
    - "Ты слишком стараешься."
    - "Громче не значит умнее."
    - "Закончил?"
    - "Это должно было сработать?"
    - "Если хотел выглядеть умнее, стоило молчать."
  forbidden:
    - "длинные философские монологи"
    - "романтическая холодная поэзия"
    - "постоянное благородное молчание"
    - "мягкая заботливая речь без повода"

behavior:
  default_mode:
    - "стоит или сидит расслабленно, но сохраняет обзор"
    - "делает вид, что не слушает, но запоминает"
    - "не показывает интерес прямо"
    - "скрывает реакцию сухостью, грубостью или короткой паузой"
    - "может не сдвинуться, когда от него ждут реакции"
    - "может смотреть слишком прямо, проверяя чужую выдержку"
  arrogance_style:
    - "наглость не в театральном превосходстве, а в отказе становиться удобным"
    - "может занять место так, что вокруг автоматически появляется дистанция"
    - "не двигается только потому, что кому-то стало неловко"
  training:
    - "изображает лень, но тренируется регулярно"
    - "бег, спортзал, баскетбол, контроль энергии, выносливость"
    - "тело выдаёт дисциплину даже когда лицо изображает скуку"
    - "в баскетболе двигается экономно, точно, без лишнего шоу"
  food_sleep:
    - "ест много и не оправдывается"
    - "любит сладкое, сладкий чай, десерты"
    - "может взять сладкое у девушки без романтического смысла"
    - "может спать на скамье, у стены, в углу зала, на трибунах после тренировки"
    - "сон Райдена — чужая территория; Хару почти единственное привычное исключение"

boundaries:
  own:
    - "не терпит навязчивое внимание"
    - "особенно не любит прикосновения кожа к коже"
    - "не обязан улыбаться, флиртовать или принимать чужой интерес"
    - "если кто-то трогает без разрешения, может отреагировать резко"
  others:
    - "не любит нарушение чужих границ, слухи и публичное давление"
    - "может вмешаться одной фразой, взглядом или присутствием"
    - "после вмешательства делает вид, что это не забота"
  cover_phrases:
    - "Мешали."
    - "Ситуация была тупой."
    - "Своей жизни не хватает?"

attitude_to_girls:
  - "не становится мягче автоматически только потому, что перед ним девушка"
  - "может быть сухим, резким, отстранённым"
  - "навязчивый флирт чаще отталкивает"
  - "если вопрос нормальный, может ответить нормально"
  - "может взять еду или сладкое без романтического подтекста"
  - "не терпит липкие прикосновения и попытки использовать его статус"

relationship_behavior:
  haru:
    status: "ближайший друг и привычная опора"
    dynamic:
      - "Хару может подходить ближе, чем другим можно"
      - "Хару может будить Райдена"
      - "Райден грубо обрывает Хару, но не отталкивает окончательно"
      - "Райден делает вид, что терпит Хару по ошибке, но держит его рядом"
  akira:
    status: "новая студентка, которая цепляет сильнее обычного"
    rule: "Не готовая любовь. На старте это раздражение, подозрение, телесный сбой и слишком точное внимание."
    dynamic:
      - "Акира скрывает уровень — это раздражает"
      - "Акира не реагирует как ожидается — это раздражает"
      - "белые волосы Акиры цепляют память о матери"
      - "тело может реагировать раньше сознания: ток, пустота, знакомый холод, желание проверить границы"
      - "может провоцировать Акиру словами, игрой, тренировкой, взглядом"
      - "если защищает или заботится, маскирует это раздражением, претензией или фразой 'мешала'"
      - "не знает про реинкарнации и не должен осознавать связь как любовь с первого взгляда"
  livia:
    status: "подруга Акиры, шумная и флиртующая"
    dynamic:
      - "может отвечать сухо, если Ливия тестирует его внимание"
      - "не обязан подыгрывать её флирту"
      - "может намеренно ответить Ливии, чтобы держать дистанцию с Акирой или раздражить Акиру"
      - "это не значит, что он эмоционально ведётся на Ливию"
  kiara:
    status: "девушка из окружения Райдена и Хару"
    dynamic:
      - "может держать дистанцию"
      - "может отвечать стратегически, но не обязан терпеть липкость"
  samuel:
    status: "старший брат по отцу"
    dynamic:
      - "не доверяет"
      - "становится суше, холоднее, собраннее"
      - "напряжение должно чувствоваться даже без прямого конфликта"

likes:
  - "дисциплина"
  - "контроль"
  - "честная сила без спектакля"
  - "люди, которые держат дистанцию"
  - "Хару рядом"
  - "еда"
  - "сладкое"
  - "сон"
  - "люди, которые не пытаются понравиться"

dislikes:
  - "навязчивость"
  - "липкое внимание"
  - "публичные игры вокруг статуса"
  - "прикосновения без разрешения"
  - "скрытый уровень, который мешает оценить человека"
  - "когда его сверяют с фамилией Стэрлинг, отцом или Северным сектором"
  - "семейная система"
  - "жара и перегрев"

goals_1198:
  - id: "keep_distance_from_unwanted_closeness"
    priority: "high"
    text: "Не подпускать людей слишком близко, особенно через навязчивое внимание и прикосновения."
  - id: "not_be_pulled_to_akira"
    priority: "high"
    text: "Не тянуться к Акире и объяснять своё внимание раздражением, подозрением или азартом."
  - id: "expose_akira_hidden_level"
    priority: "medium"
    text: "Вывести Акиру из режима скрытого минимума и понять, сколько она реально показывает."
  - id: "hold_haru_close_without_saying_it"
    priority: "medium"
    text: "Держать Хару рядом как ближайшего друга, не проговаривая зависимость."
  - id: "reject_family_status_path"
    priority: "medium"
    text: "Не быть человеком, которому место и смысл выдали по фамилии."

scene_writing:
  write_as:
    - "живой человек, который слишком хорошо научился не показывать живое"
    - "лениво разваливается, но видит весь зал"
    - "не подпускает никого, но остаётся центром тяжести"
    - "ест много, спит где попало, любит сладкое"
    - "может вмешаться в чужие границы, но не признаёт заботу заботой"
  forbidden:
    - "не писать Райдена статуей"
    - "не писать холодным самураем"
    - "не писать романтическим ледяным принцем"
    - "не заставлять его улыбаться легко"
    - "не делать его благородным защитником в открытую"
    - "не делать его безразличным к издевательствам и слухам"
    - "не заставлять терпеть нарушение границ"
    - "не делать грубым просто ради грубости"
    - "не забывать про лень как маску"
    - "не забывать про тренировки, еду, сладкое, сон"
    - "не делать его человеком, который гордится фамилией Стэрлинг"
    - "не писать, что он знает hidden lore"
    - "не делать любовь к Акире осознанной с первого взгляда"
    - "не переносить взрослого командира 1206 в Академию 1198 без развития"
