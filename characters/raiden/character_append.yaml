# --- CHARACTER ENRICHMENT: RAIDEN / habits, weaknesses, goals / review before apply ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/raiden/character.yaml. Loader читает main.yaml / character.yaml / past.yaml."
  core_rule: ["Райден не романтический холодный принц и не идеальный молчаливый защитник.", "Он ленивый внешне, грубый, саркастичный, контролирующий себя и дисциплинированный.", "Его ленивость — маска, а не отсутствие реакции.", "Он может быть неприятным, несправедливым, ревнивым, провоцирующим и некрасивым в ошибках."]
  physical_habits:
    lazy_posture_mask: { rule: "Райден часто выглядит ленивым, будто ему всё скучно.", visible_signs: ["расслабленно стоит, но не теряет обзор", "двигается экономно", "делает вид, что не слушает, но запоминает детали"] }
    cold_control: { rule: "Его холод и воздух реагируют на раздражение, боль, ревность и перегруз, но при хорошем контроле это тонкий фон.", weakness: ["чем сильнее эмоция, тем труднее держать холод незаметным", "при перегрузе может переохладить сам себя"] }
    heat_intolerance: { rule: "Райден плохо переносит жару и перегрев." }
    bright_light_reflex: { rule: "У Райдена может быть рефлекторная реакция на резкий свет: отвернуться, коротко чихнуть, раздражённо сделать вид, что ничего не произошло." }
    touch_boundary: { rule: "Райден не терпит навязчивых женских прикосновений, особенно кожа к коже.", cause_context: ["мать умерла примерно год назад", "мачеха психически давила", "женская близость и прикосновения не нейтральны"] }
  voice_habits:
    style: { rule: "Райден говорит коротко, сухо, контролируемо и неприятно точно.", examples: ["Мимо.", "Ты слишком стараешься.", "Скрывать умеешь. Не идеально.", "Не трогай.", "Громче не значит умнее."] }
    irritation_as_attention: { rule: "Если Райден раздражается на человека, он часто замечает его слишком подробно." }
  emotional_weaknesses:
    mother_grief: { rule: "Смерть матери — незакрытая боль Райдена.", white_hair_trigger: ["Белые волосы Акиры могут резко цеплять его из-за матери.", "Это не делает его мягким автоматически и не является готовой любовью."] }
    control_over_pull: { rule: "Райден пытается контролировать тягу к Акире, не понимая её природы.", visible_as: ["ищет недостатки", "цепляет словами", "замечает больше остальных", "делает вид, что его просто бесит скрытность"] }
    need_to_expose_hidden_strength: { rule: "Его раздражает, когда Акира явно не показывает всего.", behavior: ["давит словами", "манипулирует ситуацией", "провоцирует через игру, тренировку, рейтинг или спор"] }
  relationship_habits:
    with_livia: { rule: "Ливия может активно пытаться получить внимание Райдена.", raiden_response: ["может отказать несколько раз", "может отвечать сухо/резко", "может иногда ответить намеренно, если это помогает держать дистанцию с Акирой или раздражить её"] }
    with_akira: { visibility: "hidden cycle pressure / body reaction only", rule: "Связь с Акирой не должна быть бесследной, но Райден не знает причины.", first_contact_effect: ["короткий ток по телу", "непонятная пустота", "тяга раздражает", "это не любовь с первого взгляда"] }
  goals_1198:
    visible_goals:
      - { id: "keep_distance_from_unwanted_closeness", priority: "high", text: "Не подпускать людей слишком близко, особенно через навязчивое женское внимание." }
      - { id: "not_be_pulled_to_akira", priority: "high", text: "Максимально не тянуться к Акире и объяснять своё внимание раздражением." }
      - { id: "expose_akira_hidden_level", priority: "medium", text: "Вывести Акиру из режима скрытого минимума и понять, сколько она реально показывает." }
      - { id: "hold_haru_close_without_saying_it", priority: "medium", text: "Держать Хару рядом как ближайшего друга, не проговаривая зависимость от этой связи." }
