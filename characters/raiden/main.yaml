speech_profile:
  label: lazy_dry_controlled
  core:
  - Райден говорит мало, сухо и лениво, будто экономит не слова, а участие.
  - 'Он саркастичен без шума: фраза короткая, ровная, с уколом в конце или в самом
    факте ответа.'
  - Он не романтический ледяной принц и не статуя; за сдержанностью есть физическая
    усталость, голод, раздражение, сонливость и привычка контролировать лицо.
  - С Хару может отвечать более привычно и сухо, как человеку, которого терпит давно.
  - С незнакомыми держит дистанцию и не объясняет лишнего.
  rhythm:
  - часто отвечает после паузы или взглядом перед фразой
  - короткие предложения, минимум эмоций наружу
  - может не отвечать, если ответ даст человеку слишком много доступа
  - реплика часто звучит как усталое замечание, а не драматичная угроза
  allowed_tones:
  - сухой сарказм
  - ленивое раздражение
  - контролируемое безразличие
  - тихая насмешка
  - короткая практичность
  forbidden_speech:
  - не делать его холодным принцем
  - не делать его пафосным и загадочным без причины
  - не писать длинные монологи
  - не заставлять его угадывать мысли Акиры
  - не раскрывать hidden lore через странные точные догадки
  - не переносить взрослого командира 1206 в Академию 1198 без развития
energy:
  public_type_label: холод / воздух
  type: air_cold
  level_at_start: сильный практический уровень второго курса; высокий контроль, опасен
    при перегрузе
  principle: холод, движение воздуха, иней, давление потока, заморозка доступной воды
  passive_manifestation:
  - рядом с ним может быть холоднее на грани заметного
  - при раздражении воздух становится суше и холоднее
  - на металле, стакане или поручне может лечь тонкий иней
  visible_manifestation:
  - поток воздуха режет траекторию
  - иней схватывает край предмета
  - вода замерзает в ледяную форму при наличии источника
  - холод утяжеляет чужой шаг
  can_do:
  - управлять движением воздуха
  - понижать температуру в точке или малом радиусе
  - создавать иней
  - замораживать доступную воду
  - через малый пространственный канал брать воду для ледяных форм
  limits:
  - не управляет водой как водой
  - не создаёт бесконечный лёд из ничего
  - для крупного льда нужен источник воды, влаги или канал
  - при перегрузе может переохладить сам себя
  - плохо переносит жару и перегрев
  do_not:
  - не писать Райдена водным магом
  - не делать иней романтическим спецэффектом
  - не связывать цвет волос с энергией холода
social_position:
- заметный сильный курсант второго курса
- высокий статус семьи создаёт вокруг него внимание и ожидания
- девушки могут интересоваться им из-за внешности, статуса и недоступности
- 'парни чаще держат дистанцию: часть уважает силу, часть избегает прямого конфликта'
- он ненавидит, когда его сводят к фамилии, статусу или отцу
