  - "Хару может будить его и подходить ближе, чем другим можно"
  - "Райден грубо обрывает Хару, но не отталкивает окончательно"

with_akira:
  - "Акира цепляет сильнее обычного, но Райден не понимает причины"
  - "его внимание внешне выглядит как раздражение"
  - "может провоцировать её, чтобы вывести из скрытого минимума"
  - "не должен знать hidden lore или осознавать любовь с первого взгляда"
  - "если вмешивается ради неё, называет это раздражением, тупой ситуацией или тем, что ему мешали"

with_livia:
  - "может быть сухим, если Ливия тестирует его внимание"
  - "не обязан подыгрывать флирту"
  - "сухость — защита дистанции, а не желание унизить"

