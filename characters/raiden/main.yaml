  - "живой, физический, ленивый с виду, наглый в дистанции, саркастичный, дисциплинированный"
  - "очень сильно контролирует себя, включая лицо"
  - "эмоции есть, но не выходят наружу привычным способом"
  - "настоящая улыбка — событие"
  - "лениво занимает место так, что другие учитывают его присутствие"
  - "ест много, любит сладкое, может спать где попало"
  - "лень — маска контроля, а не безделье"

with_haru:
