  reference_note: Очень высокий тёмноволосый парень с широкими плечами, сильным телом, тяжёлым серо-голубым взглядом и минимальной контролируемой мимикой.
energy:
  type: холод / воздух
  class_or_level_at_academy_start: сильный практический уровень второго курса; высокий контроль, опасен при перегрузе из-за переохлаждения
  short_background: Энергия Райдена проявляется через холод, движение воздуха, иней, давление потока и заморозку доступной воды. Он не управляет водой как стихией.
  passive_background:
  - рядом с ним холоднее на грани заметного
  - на металле, стакане или поручне может лечь тонкий иней
  - дыхание кажется суше и резче
  - когда он раздражён, воздух становится холоднее, движения меньше, внимание точнее
  visible_manifestation:
  - поток воздуха режет траекторию
  - иней схватывает край предмета
  - вода превращается в ледяную форму при наличии источника
  - холод утяжеляет чужой шаг
  can_do:
  - управлять движением воздуха
  - понижать температуру в точке/радиусе
  - создавать иней
  - замораживать доступную воду
  - через малый пространственный канал брать воду для ледяных форм
  limits:
  - не управляет водой как водой
  - не создаёт бесконечный лёд из ничего
  - для крупного льда нужен источник воды/влаги/канал
  - при перегрузе может переохладить сам себя
  - плохо переносит жару и перегрев
  do_not:
  - не писать Райдена водным магом
  - не делать иней романтическим спецэффектом
