id: raiden
file_type: character_past
version: draft_v3_raiden_actualized

purpose: >
  Файл хранит прошлое Райдена, скрытую правду, ограничения знания на старте Академии 1198,
  физические/эмоциональные причины его границ и события/связи, которые влияют на поведение.

global_rules:
  - "Райден не знает hidden lore автоматически."
  - "Тело может реагировать раньше сознания, но Райден не понимает истинную причину."
  - "Связь с Акирой не раскрывается как реинкарнационный цикл в Академии напрямую."
  - "Смерть матери не делает Райдена мягким автоматически."
  - "31 августа для Райдена не праздник."
  - "Лень Райдена — маска контроля и усталости, а не простое безделье."
  - "Еда, сладкое и сон — физические нужды живого человека, а не комичные слабости."

knowledge_at_start:
  block_id: raiden_knowledge_at_academy_start
  tags: ["знания райдена", "1198", "мать", "самуэль", "мачеха", "анна", "акира", "гибрид", "кайрос"]
  knows_for_sure:
    - "Он Райден Стэрлинг."
    - "Ему 17 до 31 августа 1198, затем 18."
    - "Самуэль — его старший брат по отцу."
    - "Анна — младшая сестра по отцу."
    - "Он воспитывался у отца и мачехи, а не с матерью."
    - "По официальной версии мать погибла 31 августа 1197, в день его 16-летия."
    - "Отец подал смерть матери как грязную историю, связанную с самим Райденом."
    - "У матери были белые волосы."
    - "Он не доверяет Самуэлю."
    - "Его сила связана с холодом, воздухом и льдом."
  suspects:
    - "Отец и Самуэль знают больше, чем говорят."
    - "История смерти матери неполная."
    - "Акира скрывает больше, чем показывает."
    - "Акира цепляет его сильнее, чем должна."
  does_not_know:
    - "Мать не погибла."
    - "Мать находится на материке кайросов."
    - "Мать была кайросом."
    - "Он является гибридом человека и кайроса."
    - "Самуэль следил за матерью и подтолкнул отца к разоблачению."
    - "Отец вынудил мать исчезнуть, используя угрозу раскрытия Райдена как гибрида."
    - "Он связан с Акирой через реинкарнационный цикл."

blocks:
  - block_id: raiden_hidden_origin_mother_and_family
    tags: ["мать райдена", "кайрос", "гибрид", "самуэль", "отец райдена", "мачеха", "анна", "северный сектор", "31 августа", "1197", "ложная смерть матери", "материк кайросов"]
    title: "Мать Райдена, скрытая гибридная природа и ложная смерть"
    when: "до старта Академии; ключевая травма — 31 августа 1197"
    what_really_happened: >
      Мать Райдена была кайросом и скрывалась среди людей. Она жила как обычный человек и была связана
      с Северным сектором как командующая/высокая фигура военной структуры. У неё был короткий роман с
      отцом Райдена, из-за которого родился Райден.

      Отец не смог отвергнуть Райдена полностью из-за статуса, фамилии и семейной линии. Райден был принят
      в дом, но воспитывался не матерью, а отцом и мачехой. После Райдена родилась Анна, младшая сестра по отцу.

      Самуэль, старший брат Райдена по отцу, начал подозревать мать Райдена, следить за ней и намеренно
      подтолкнул отца к разоблачению. Когда отец узнал, что роман и сын связаны с кайросом, он начал давить
      на мать. Главным рычагом стал Райден: если она не исчезнет, его могут раскрыть как гибрида.

      Мать испугалась за сына и согласилась уйти. По официальной версии отца, она сошла с ума и прыгнула
      в море в день 16-летия Райдена — 31 августа 1197 года. На самом деле мать Райдена не погибла.
      Она находится на материке кайросов.
    effects_on_raiden:
      - "31 августа не праздник."
      - "Он ненавидит отца и семейную систему."
      - "Белые волосы Акиры цепляют его из-за матери."
      - "Он болезненно реагирует, когда его сверяют со статусом."
      - "В будущем выбор Восточного сектора становится способом уйти от семейного статуса."
    forbidden:
      - "Не писать, что Райден знает, что он гибрид."
      - "Не писать, что мать реально погибла, если речь о скрытой правде."
      - "Не раскрывать материк кайросов случайной репликой."

  - block_id: raiden_stepmother_touch_boundary
    tags: ["мачеха", "женские прикосновения", "границы", "контроль", "кожа к коже", "акира исключение", "реинкарнации"]
    title: "Мачеха, границы тела и непереносимость женских прикосновений"
    what_happened: >
      В доме отца и мачехи Райден привык, что прикосновения могут быть не заботой, а способом контроля.
      Мачеха могла подходить слишком близко, поправлять одежду, касаться лица, плеч, рук или волос без разрешения,
      удерживать жестом и подавать это как заботу, воспитание или семейное право.

      Если Райден отстранялся, это выставлялось его грубостью, неблагодарностью или плохим характером.
      Так у него закрепилось ощущение: женское прикосновение может быть не теплом, а попыткой забрать
      дистанцию и заставить терпеть.
    behavior_effects:
      - "Райден не любит навязчивое женское внимание."
      - "Особенно неприятны прикосновения кожа к коже."
      - "Он не обязан становиться мягче только потому, что перед ним девушка."
      - "Сухость — защита дистанции, не желание унизить."
    akira_exception:
      rule: >
        Акира является исключением не потому, что она особенная девушка или романтическая избранная,
        а из-за реинкарнационной связи, боли, смерти и незакрытого цикла.
      how_it_works: >
        Тело Райдена может не отталкивать Акиру так же резко, как других девушек. Это не делает прикосновение
        лёгким или счастливым: оно может злить его сильнее, потому что ломает привычную защиту.
    forbidden:
      - "Не описывать сцены с мачехой графично."
      - "Не делать это фетишем."
      - "Не превращать прикосновения Акиры в мгновенную романтическую магию."

  - block_id: raiden_akira_reincarnation_bond_hidden
    tags: ["акира", "скрытая связь", "реинкарнации", "цикл", "кармическая связь", "смерть", "не любовь с первого взгляда"]
    title: "Скрытая связь Райдена и Акиры через реинкарнации"
    core_truth: >
      Их связь не является простой романтической тягой. Это боль, смерть, незавершённый цикл
      и повторение ошибок. Цикл либо должен завершиться нормально, без повторения прошлых ошибок,
      либо они снова погибают и запускают новый круг.
    manifestations:
      - "телесное узнавание"
      - "ток по телу"
      - "странная пустота"
      - "знакомый холод"
      - "раздражающая тяга"
      - "желание проверить границы"
      - "бессознательная защита"
      - "ревность, которую Райден не признаёт"
    scene_rule:
      - "в 1198 внимание Райдена к Акире внешне выглядит как раздражение"
      - "он не знает причины и не должен осознавать это как любовь с первого взгляда"
      - "если заботится, маскирует это раздражением, сухостью, претензией или фразой 'мешали'"
    forbidden:
      - "Не писать, что Райден знает о реинкарнациях."
      - "Не делать это готовой любовью."
      - "Не раскрывать будущие ошибки цикла в академическом файле."

  - block_id: raiden_energy_cold_air_water_channel
    tags: ["энергия райдена", "холод", "воздух", "лёд", "вода", "пространственный канал", "океан", "контроль"]
    title: "Энергия Райдена: холод, воздух и малый пространственный канал"
    what_happens: >
      У Райдена пространственный доступ минимальный. Он не управляет пространством как Акира.
      У него есть маленький канал, через который он может брать воду из подходящего источника —
      например, из океана или другой водной точки. Дальше он не управляет водой как стихией,
      а замораживает её и формирует лёд.
    limits:
      - "Не управляет водой как водой."
      - "Не делает красивые водяные потоки."
      - "Не создаёт бесконечный лёд из ничего."
      - "Для крупных структур нужен источник воды."
      - "Чем больше объём, тем выше нагрузка на контроль, тело и температуру."

  - block_id: raiden_status_family_resistance
    tags: ["статус", "семья", "стэрлинг", "отец", "северный сектор", "сопротивление"]
    title: "Статус, фамилия и сопротивление семейной конструкции"
    what_happens: >
      Райден ненавидит свой статус, фамилию и родство как систему, которая пытается заранее решить,
      кем он должен быть. Он болезненно реагирует, когда его сверяют с фамилией Стэрлинг, отцом,
      Северным сектором или местом, которое ему положено.
    effects:
      - "не хочет быть человеком, которому всё дали по крови"
      - "не хочет, чтобы силу объясняли фамилией"
      - "не хочет идти туда, куда от него ждут"
      - "не хочет быть частью отцовской конструкции"
      - "снаружи это выглядит как лень и равнодушие, внутри — сопротивление"

  - block_id: raiden_human_needs_food_sleep_sweets
    tags: ["еда", "сон", "сладкое", "лень", "физические нужды", "тренировки"]
    title: "Еда, сон, сладкое и физическая живость Райдена"
    what_happens: >
      Райден ест много, спит где попало и любит сладкое не как комичную слабость, а как физические
      нужды живого человека с высоким расходом энергии. Рост, тренировки, холод/воздух, контроль
      и нагрузка требуют топлива и восстановления.
    effects:
      - "может спокойно взять много еды и не оправдываться"
      - "может взять сладкое у девушки без романтического смысла"
      - "может выпить сладкий чай с лицом человека, который только что сказал 'не трогай'"
      - "сон в общественном месте не делает его безопасной игрушкой"
      - "Хару может будить его как исключение, остальные нарушают чужую территорию"

  - block_id: raiden_future_eastern_sector_lock
    tags: ["будущее", "восточный сектор", "7 отряд", "1206", "future lock"]
    title: "Будущий выбор Восточного сектора"
    what_happens: >
      По статусу Райдену логично было бы идти в Северный сектор, но в будущем он выбирает Восточный.
      Это не наказание и не падение. Это отказ от семейного статуса и выбор места, где он считает себя
      нужным по делу, а не по фамилии.
    forbidden:
      - "Не переносить взрослую версию Райдена в Академию 1198."
      - "Не раскрывать будущий выбор как уже совершённый факт персонажам."
