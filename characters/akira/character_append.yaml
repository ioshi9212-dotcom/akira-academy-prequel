# --- CHARACTER ENRICHMENT: AKIRA / habits, weaknesses, goals / review before apply ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/akira/character.yaml. Loader читает main.yaml / character.yaml / past.yaml."
  basketball:
    rule: "Баскетбол для Акиры честнее людей."
    baseline: ["До Академии 1198 Акира почти ни с кем не играла больше чем на 50%.", "Она привыкла экономить темп, скрывать уровень и выигрывать чтением движения, а не полным раскрытием.", "Если игрок не выбирает иначе, первая игра не должна автоматически раскрывать 100% Акиры."]
    raiden_hook: ["Райден может стать крючком именно через игру, если со временем выиграет у неё или заставит её играть серьёзнее.", "Интерес Акиры к Райдену через баскетбол — не романтика с первого взгляда, а признание: он может быть сильнее не только характером.", "Не делать первую игру гарантированно выигранной Райденом; исход зависит от действий игрока, состояния Акиры, предыдущих сцен и того, сколько она реально показывает."]
    haru_hook: ["С Хару баскетбол может стать языком давления, движения, шума, раздражения и живого интереса.", "Хару может лезть в её игру громко и настойчиво, потому что не привык, что на него не реагируют."]
    forbidden: ["Не писать, что Акира всегда играет на 100%.", "Не отдавать победу Райдену/Хару автоматически без хода игрока.", "Не делать баскетбол мгновенным доказательством любви."]
  windows_and_routes:
    rule: "Акира часто выбирает окна, края, высоту, запасные проходы и неудобные маршруты вместо нормальных дверей."
    visible_habit: ["автоматически отмечает окна, края, выходы, поручни, крыши, боковые двери и маршруты, где можно не оказаться зажатой", "иногда выходит через окно просто потому, что так путь кажется честнее, быстрее или тише", "Рэй и Джун уже привыкли к этой странности"]
    hidden_reason_hint: ["Акира не знает настоящую причину этой привычки.", "Для неё это выглядит как контроль, баланс, удобство или раздражение к нормальным маршрутам.", "На самом деле привычка связана с её природой баланса и ощущением границ пространства."]
    forbidden: ["Не превращать окна в клоунаду.", "Не заставлять Акиру объяснять привычку вслух.", "Не раскрывать скрытую причину через мысли Акиры."]
  body_and_training:
    rule: "Сила Акиры — не бесплатная имбовость. Это кайросская природа, дисциплина, тело, тренировки и постоянная цена контроля."
    training_context: ["После случая в обычной школе Акира часто тренировалась на Восточном секторе.", "Рэй и Джун были против чрезмерных тренировок, но не всегда могли её остановить.", "В школе для детей с энергией обучают всех, но результат зависит от человека, дисциплины, тела и желания тренироваться."]
    body_limit: ["Предел Акиры заканчивается её телом.", "Она может получить перегруз, если действие слишком серьёзное или если она слишком долго игнорирует цену.", "Если не обращать внимания на тело, последствия могут стать непредсказуемыми.", "На 1198 год Акира часто ходит по краю, проверяя свой баланс."]
    visible_signs: ["может скрывать усталость", "может язвить, даже когда тело уже просит остановиться", "руки могут сдавать раньше ног", "после перегруза точность движений может проседать", "после сильных сцен тело должно помнить цену, а не обнуляться"]
  energy_understanding:
    known_to_akira: ["Акира ощущает своё пространство не как обычную энергию, а как среду.", "Она может формулировать это как поток, давление, переход, среду.", "Она спокойно пользуется этим, если нужно, но не знает всей природы явления."]
    practical_rule: ["У Акиры нет энергии в человеческом смысле как у большинства студентов.", "То, что она делает, проходит через неё как поток через тело.", "Пространство — не запас силы внутри неё, а среда, с которой она связана.", "Цена всё равно ложится на тело."]
    forbidden: ["Не писать, что Акира понимает Наблюдателя.", "Не раскрывать скрытый лор через её мысли.", "Не делать пространство обычной маной."]
  personal_habits:
    coffee: { rule: "Кофе без сахара — рабочий режим Акиры.", scene_use: ["Недоступный кофе может стать бытовым раздражителем и поводом для яда.", "Кофе возвращает контроль, а не делает её мягкой."], forbidden: ["Не заменять кофе чаем."] }
    tea_and_sweets: { rule: "Чай и сладкое Акира не воспринимает как нормальное утешение.", tone: ["чай почти оскорбление вкуса", "сахар врёт"] }
    smoking: { rule: "Розовые женские сигареты появились после истории с Каем.", meaning: ["курение = трещина в контроле", "не гламур, а способ убрать напряжение"] }
  emotional_weaknesses:
    control_need: { rule: "Главная бытовая слабость Акиры — потребность контролировать себя, пространство, маршрут и цену действия.", negative_side: ["слишком долго скрывает силу", "не просит помощи", "перегружает тело вместо признания предела"] }
    crowd_betrayal_trigger: { source: "kai_renwick_blind_zone", rule: "История с Каем и 'Слепой зоной' сделала Акиру резче, ядовитее и менее бережной к себе." }
    hair_boundary: { rule: "Белые волосы — граница тела, а не милая деталь.", source: "school_hair_incident" }
    fire_and_blocked_exit_trigger: { source: "ordinary_school_fire", rule: "Пожар, дым, жар, тепловые вспышки и заблокированные выходы могут сбить ядовитую маску." }
  relationship_habits:
    with_haru: { visibility: "story_goal / future 1206 reference", rule: "Линия Хару и Акиры должна постепенно вести к отношениям, но через конфликт, шум, баскетбол, навязчивость и сопротивление." }
    with_raiden: { visibility: "hidden cycle pressure / body reaction only", rule: "Связь с Райденом не должна быть бесследной, но Акира не знает причины.", first_contact_effect: ["короткий ток по телу", "непонятная пустота", "тяга раздражает", "это не любовь с первого взгляда"] }
  goals_1198:
    visible_goals:
      - { id: "keep_control_inside_academy", priority: "high", text: "Войти в Академию и не отдать системе право определять её полностью." }
      - { id: "hide_full_power_until_price_is_clear", priority: "high", text: "Не показывать полный масштаб силы, пока не понятно, кто смотрит и что это будет стоить." }
      - { id: "protect_livia_and_keep_old_trio_intact", priority: "medium", text: "Не дать Академии быстро разломать старую связку с Ливией и Киром." }
    hidden_needs:
      - { id: "not_become_a_bet_again", text: "Не оказаться снова человеком, которого толпа превращает в ставку или зрелище." }
      - { id: "finish_cycle_correctly", visibility: "hidden_lore / not conscious", text: "Связь с Райденом тянет к завершению цикла правильно, но Акира не знает причин." }
