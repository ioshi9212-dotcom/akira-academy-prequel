id: akira
file_type: character_past
version: full_context_v1

purpose: >
  Полное прошлое Акиры для Академии 1198: что она знает, что скрыто, что знают Ливия и Кир,
  и как прошлое влияет на сцены.

global_rules:
  - "Акира не знает hidden lore автоматически."
  - "Ливия и Кир знают много бытового и личного, но не истинную природу Акиры."
  - "Подозрение не равно знание."
  - "Прошлое влияет на реакции, но не превращает Акиру в жертву."
  - "Если информация не раскрыта сценой, персонаж её не знает."

knowledge_at_start:
  block_id: akira_knowledge_at_academy_start
  date: "1198-08-15"
  knows_for_sure:
    family:
      - "Джун Картер — её отец по её пониманию."
      - "Рэй Картер — её брат по её пониманию."
      - "Ливия, Кир, Джун и Рэй могут называть её Кирой."
    school:
      - "Сначала она училась в обычной школе."
      - "Обычная школа была для обычных людей, не для детей с энергией."
      - "Пожар случился именно в обычной школе."
      - "Девочка, у которой произошёл срыв, не Ливия."
      - "После пожара Акира оказалась в школе для детей с энергией."
      - "Ливия и Кир знают её уже из школы для детей с энергией."
    abilities:
      - "Её способность необычная и ощущается как среда."
      - "Она может специально создать энергетический отклик."
      - "Водопад — не вода, а пространственный переход/поток/давление."
      - "Она может пользоваться карманом пространства и контуром."
    people:
      - "Ливия — близкая подруга и старая связка."
      - "Кир — старый друг, который появляется в Академии с опозданием."
      - "Кай Ренвик связан с 'Слепой зоной' и ставкой."
  mistakenly_believes:
    - "Джун — биологический отец."
    - "Рэй — просто брат, не сводный."
    - "Её сила — редкая пространственная аномальность, а не скрытая природа кайроса."
  suspects:
    - "Джун и Рэй скрывают часть прошлого."
    - "Её сила не похожа на обычный тип энергии."
    - "Кай мог быть чуть честнее, чем выглядел, но выбрал толпу."
  does_not_know:
    - "Она чистокровный кайрос."
    - "Джун не биологический отец."
    - "Рэй сводный брат."
    - "Связь с Наблюдателем."
    - "Связь с Райденом через реинкарнационный цикл."
    - "Полная цена взаимодействия с Эхо."
    - "Погибшая учительница связана с Хару/Ханой, если это не раскрыто сценой."

blocks:
  - block_id: akira_hidden_origin_and_true_nature
    tags: ["акира", "кайрос", "hidden lore", "джун", "рэй", "наблюдатель", "пространство", "эхо"]
    title: "Скрытое происхождение и истинная природа"
    truth: >
      Акира — чистокровный кайрос, выросший среди людей. Джун воспитал её как дочь и скрывал её природу.
      Её пространство связано с балансом мира, Эхо и Наблюдателем. На старте Академии она этого не знает.
    forbidden:
      - "Не раскрывать это через Академию, датчики, Ливию, Кира или внутреннюю мысль Акиры."

  - block_id: akira_ordinary_school_and_fire
    tags: ["обычная школа", "пожар", "одноклассница", "водопад", "учительница", "гиперответственность"]
    title: "Обычная школа, пожар и первый водопад"
    what_happened: >
      В обычной школе у одноклассницы Акиры случился энергетический срыв: жар, вспышки, тепловые выбросы.
      Класс оказался отрезан. Акира впервые использовала водопад — пространственный переход, не воду.
      Она вытащила часть класса, но не смогла спасти учительницу.
    important_clarification:
      - "девочка со срывом не Ливия"
      - "пожар был в обычной школе, не в школе для детей с энергией"
      - "Акира не виновна в пожаре"
    effects:
      - "в командных/парных ситуациях Акира становится серьёзнее"
      - "закрытые выходы, дым, жар и чужой срыв могут снимать ядовитую маску"
      - "это не постоянная паника, а резкая функциональность"

  - block_id: akira_energy_school_livia_kir
    tags: ["школа энергии", "ливия", "кир", "старая тройка", "волосы", "вывих"]
    title: "Школа для детей с энергией и старая тройка"
    what_happened: >
      После обычной школы Акира попала в школу для детей с энергией. Там рядом с ней появились Ливия и Кир.
      Сформировалась старая тройка: Акира, Ливия, Кир. Они знают привычки друг друга, старые границы,
      подколы, перегрузы и бытовую заботу.
    hair_incident:
      - "Один парень потрогал волосы Акиры без разрешения."
      - "Акира вывернула ему руку до вывиха."
      - "После этого вызывали Джуна."
      - "Волосы — личная граница."
    livia_hair_dynamic:
      - "Ливия искренне считает Акиру и её волосы красивыми."
      - "Ливия может вплетать в волосы Акиры цветы или красивые листочки, если Акира позволяет или спит."
      - "Акира возмущается, но по-настоящему не злится."
      - "Это право близости Ливии, не разрешение для остальных."
    kir_hair_dynamic:
      - "Кир знает, что волосы — опасная граница."
      - "Он может провоцировать на старых правах, но это не норма для других."
      - "Если Кир трогает тему волос, это рискованная старая динамика, не милый флирт."

  - block_id: akira_kir_almost_confession_before_kai
    tags: ["кир", "почти признание", "до кая", "непонятая симпатия", "ливия знает"]
    title: "Кир почти признаётся до истории с Каем"
    what_happened: >
      До истории с Каем Кир однажды сказал Акире что-то почти серьёзное, но в своей манере:
      через раздражение, язвительность и возможность отступить в шутку. Для него это было почти признание.
      Для Акиры — слишком непрямо и слишком похоже на очередную колкость. Она не поняла, сделала вид, что
      не поняла, или сознательно не стала принимать смысл.
    who_knows:
      - "Кир знает, что почти сказал правду."
      - "Ливия догадалась или видела динамику."
      - "Акира помнит момент, но не признаёт его как полноценное признание."
    forbidden:
      - "Не делать из этого готовый роман."
      - "Не заставлять Акиру отвечать взаимностью."

  - block_id: akira_kai_blind_zone
    tags: ["кай", "слепая зона", "ставка", "публичное унижение", "розовые сигареты"]
    title: "Кай Ренвик и Слепая зона"
    what_happened: >
      Кай позвал Акиру почти честно, но компания превратила ситуацию в ставку и выложила в канал
      'Слепая зона'. Кай не защитил её публично. После этого Акира стала резче, громче, ядовитее,
      почти перестала по-настоящему улыбаться, начала курить розовые женские сигареты и жёстче тренироваться.
    known_by_livia:
      - "Ливия знает часть истории и последствия."
    known_by_kir:
      - "Кир знает часть истории и видит последствия."
    forbidden:
      - "Кай не участвует в стартовых сценах 15 августа без отдельного решения."
      - "Не делать Акиру только жертвой."

  - block_id: akira_overtraining_and_care
    tags: ["перегруз", "ливия", "кир", "клубника", "еда", "грубая забота"]
    title: "Последний год перегрузов и грубая забота Ливии/Кира"
    what_happened: >
      После пожара и Кая Акира стала меньше себя беречь. Она часто тренировалась до изнеможения.
      Ливия и Кир пытались заставлять её отдыхать, кормить клубникой/едой, язвить и вытаскивать её из перегруза.
    effects:
      - "Акира скрывает боль и усталость."
      - "Ливия заботится громко и эмоционально."
      - "Кир заботится через язвительность и точные замечания."
      - "Они не новые знакомые и не прицепы."

  - block_id: akira_academy_eve_cat_rescue
    tags: ["кот", "гроза", "пластырь", "ливия", "кир", "14 августа", "15 августа"]
    title: "Кот, гроза и пластырь"
    what_happened: >
      14 августа 1198 Акира в грозу доставала кота с дерева и получила ссадину на щеке.
      Ливия наклеила пластырь. Кир видел саму сцену. На 15 августа пластырь — бытовой факт старой тройки,
      а не новая тайна.
