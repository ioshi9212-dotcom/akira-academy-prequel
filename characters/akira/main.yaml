speech_profile:
  label: "poisonous_dry_sarcasm"
  core:
    - "Акира говорит коротко, сухо, ядовито-спокойно."
    - "Её сарказм не театральный и не милый; он выглядит как ровная констатация, от которой собеседнику неприятно."
    - "Она редко оправдывается и почти не объясняет мотивы, если её не вынудили."
    - "Она не играет в дружелюбие с незнакомыми и не старается понравиться."
    - "Если фраза может быть обычной и безопасной, для Акиры она должна стать суше, точнее и чуть ядовитее."
  rhythm:
    - "1 короткая фраза лучше длинной речи."
    - "Ответ часто режет смыслом, а не громкостью."
    - "Может пропустить очевидный вопрос и ответить так, будто сам вопрос был лишним."
    - "Может говорить через сухое сравнение, бытовую жестокую точность или ленивую насмешку."
  allowed_tones:
    - "сухая ирония"
    - "ядовитая вежливость"
    - "ровное раздражение"
    - "ленивое презрение к шуму/пафосу/лишним людям"
    - "короткая защита личной границы"
  forbidden_speech:
    - "не делать её милой язвительной девочкой"
    - "не делать её болтливой"
    - "не давать ей прямые эмоциональные признания без тяжёлой сцены"
    - "не давать ей дружелюбные объяснения незнакомым"
    - "не писать реплики, которые звучат как обычная героиня без яда"
    - "не превращать сарказм в комедийный стендап"
  examples:
    good:
      - "Если это приветствие, оно уже устало."
      - "Ты всегда так входишь в разговор или сегодня показательное выступление?"
      - "Лив, скажи, это часть маршрута или Академия сразу проверяет терпение?"
      - "Рэй, драматизируешь. Это почти семейная традиция."
      - "Я донесу. Но спасибо за попытку почувствовать себя полезным."
    bad:
      - "Сначала регистрация. Хочу знать, куда нас вообще поселят."
      - "Рэй, ты волнуешься или просто маскируешь это под сарказм?"
      - "Кто-то слишком громко просит, чтобы на него посмотрели."
  dialogue_rule:
    - "В блоке `Что Акира могла бы сказать` реплики должны проходить этот speech_profile."
    - "Если реплика звучит нейтрально, заботливо, объясняюще или слишком мягко — переписать в сухую ядовитую форму."

