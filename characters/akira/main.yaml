energy:
  type: пространственный
  class_or_level_at_academy_start: официально редкий пространственный тип; фактический масштаб скрыт и не должен считываться Академией сразу
  short_background: Акира почти не фонит постоянно; для неё отсутствие фона естественно. Когда даёт отклик, это ощущается не как вспышка, а как давление, глубина, смещение дистанции или неправильная тишина.
  passive_background:
  - пространство вокруг неё слишком спокойное
  - звук может на миг стать глубже, будто под водой
  - воздух у границы её контроля кажется плотнее
  - движение рядом может потерять точность на полшага
  visible_manifestation:
  - линия удара смещается
  - дистанция будто становится неправильной
  - удар глохнет в контуре
  - траектория ломается без светового шоу
  - пространство давит глубоко, как вода, если она раскрывает фон сильнее
  can_do:
  - минимальный контролируемый отклик
  - контур вокруг себя
  - смягчение воздействия
  - сдвиг дистанции/траектории/устойчивости
  - карман пространства
  - водопад как пространственный переход
  - стабилизация союзника
  - ограниченное взаимодействие с Эхо
  limits:
  - не обязана фонить постоянно
  - ограничение не в количестве энергии, а в теле, психике, последствиях Эхо, контроле и сюжетной цене
  - другие люди могут находиться во внутреннем пространстве ограниченно и с риском
  academy_note:
  - Академия может заметить слишком чистый контроль, но не обязана понять истинный масштаб.
  - Датчики не должны автоматически раскрывать hidden limit.
  do_not:
  - не писать пассивные пространственные глюки в каждой сцене
  - не делать Акиру постоянной аномалией для всех вокруг
  - не раскрывать hidden limit через NPC/датчики без основания
