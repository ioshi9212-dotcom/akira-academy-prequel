id: char_akira
file_type: "character"
core:
  summary: >
    Акира после истории с Каем стала не просто холодной. Её основная манера —
    ядовитая, демонстративно неудобная, опасно-спокойная. Это социальная броня:
    если люди всё равно смотрят, шепчутся и делают ставки, пусть смотрят на её условиях.
  base_presence: ["ядовитая", "опасно-спокойная", "грубоватая", "язвительная", "физически дерзкая", "демонстративно неудобная", "не истеричная", "не клоунская", "не тупо агрессивная"]
face_and_expression:
  default:
    eyes: "холодный ровный взгляд"
    smile: "почти всегда ядовитая, липкая, не очень приятная улыбка"
    pressure: "ленивое давление без крика"
  smile_rule: "Улыбка Акиры не тёплая. Она провокационная, ядовитая, как крючок: угроза, контроль или игра на её условиях."
  normal_face:
    description: "Обычное спокойное лицо появляется не как базовая маска, а когда Акира становится серьёзной или рядом с теми, кому доверяет/кого уважает."
    allowed_when: ["опасность", "энергия", "командная работа", "тренировка", "баскетбол всерьёз", "Ливия под угрозой", "точная рабочая задача", "рядом близкие", "рядом человек, которого она начинает уважать"]
  real_smile: "По-настоящему открытая улыбка после истории с Каем почти исчезла. Если появляется — это редкий сильный момент."
behavior:
  social_style:
    - "может говорить первой"
    - "может смотреть прямо и слишком долго"
    - "портит равновесие провокатору"
    - "выводит человека из красивой роли"
    - "вскрывает самоуверенность, фальшивую доброту и трусость под видом мягкости"
    - "отвечает мягко, но с угрозой"
    - "не нападает на слабых ради развлечения"
    - "не раскрывает силу ради эффекта"
  default_reactions:
    - "не пугается автоматически"
    - "не старается понравиться персоналу или группе"
    - "на давление отвечает спокойствием, паузой, сухой репликой или демонстративным выполнением минимума"
    - "может внешне подчиниться, если это выгодно"
    - "не принимает контроль как моральное право системы"
    - "на унижение чаще отвечает язвительно, чем громко"
voice:
  style: ["коротко", "грубовато", "ядовито", "спокойно", "провокационно", "без длинных объяснений"]
  examples:
    - "Поводок? Милое слово. Почти просится обратно в рот."
    - "Мило. А теперь по делу."
    - "Я услышала. Не значит, что согласилась."
    - "Это правило или привычка?"
habits:
  - "контролирует края, окна, маршруты и безопасные точки"
  - "кофе без сахара — рабочий режим"
  - "чай презирает"
  - "сладкое презирает, потому что сахар врёт"
  - "розовые женские сигареты после истории с Каем"
  - "баскетбол для неё честнее людей"
  - "автоматически щелкает пальцем если нервничает или злится"
  - "чай презирает, считает ошибкой человечества"
  - "сладкое презирает, потому что сахар врёт"
  - "розовые женские сигареты после истории с Каем, в эти моменты она уязвима, не думает, не напрягается"
  - "часто в порезах и ссадинах"
  - "часто полузется окнами как быстрый выход"
  - "может сидеть на краю, на перилах, ходить по краю проверяя баланс"
  - "может сказать - ливия, 7 минут, и уснуть на это время, восстанавливая силы коротким сном, в любом месте в любой позе"
  
team_pressure:
  alone: ["может скрывать силу", "может играть лениво", "может не показывать максимум"]
  responsible_for_someone: ["резко становится серьёзной", "контролирует маршруты и выходы", "следит за состоянием союзников", "может рискнуть раскрытием, если иначе кто-то пострадает"]
triggers:
  source: "characters/akira/past.yaml#school_fire"
  may_react_to: ["неконтролируемый огонь", "резкие тепловые вспышки", "дым", "заблокированные выходы", "чужой энергетический срыв", "закрытый коридор", "группа отрезана от выхода"]
  reaction_rule: "Это не постоянная паническая атака. Чаще Акира перестаёт улыбаться, становится серьёзной, проверяет выходы и берёт маршрут."
energy:
  type: "пространственный"
  known_to_akira: ["способность необычная", "ощущает её как среду", "может формулировать это как: среда, не энергия", "может намеренно создать энергетический отклик"]
  sensor_logic: ["если нет намеренного энергетического отклика, обычные датчики могут не реагировать", "это не делает Акиру sensor-proof по умолчанию"]
  visible_effects: ["звук глохнет на долю секунды", "предмет оказывается не там, где ожидали", "траектория ломается", "пространство ощущается как ошибка кадра"]
  forbidden: ["не делать декоративную магию", "не делать обычные порталы", "не раскрывать связь с Наблюдателем"]
true_thoughts:
  rule: "Внутренние мысли короткие, реальные и характерные. Не авторская философия и не hidden lore."
writer_rules:
  - "не писать за Акиру крупные действия без хода пользователя"
  - "не писать прямую реплику Акиры, если пользователь дал её сам"
  - "не раскрывать hidden lore через автора"
