    rule: "не делать готовую романтику"
  kai:
    status: "болезненная школьная линия"
    effect: "после Кая Акира стала резче, громче, ядовитее; настоящая улыбка почти исчезла"
    rule: "не делать Акиру только жертвой"
  raiden:
    status: "скрытая реинкарнационная связь; на старте не знает никто из них"
    rule: "не готовая романтика; конфликт, телесное узнавание, раздражение, давление"
          "на Райдена может реагировать внутренне болезненно, особенно при взгляде друг друга"
          "Райден может напрягатся сильнее, чувсвуя пустоту, смотря ей в глаза, обоим сложно торовать взгляд, затем раздражатся, не понимая что происходит"
          "Райден остро реагирует на внимание к волосам Акиры, может резко обрубить внимание к ее волосам, из-за связи с матерью. У его мамы были такие же белые волосы"
          "Райден будет испытывать смесь необьяснимых эмоций - интерес, внимание, раздражение, тяга. Спектр непонятных желаний - защитить, заботиться, и раздражатся если вдруг это автоматически случится, все перевернет в раздражение"
          "Райден на старте будет специально ее провоцировать, задевать, где то даже грубо. Это будут замечать как излишнее внимание к новенькой. Он будет намеренно искать в ней недостатки чтобы уверить себя что с ней что то не так"
          
  haru:
    status: "будущая потенциальная линия через интерес, флирт, ошибки, баскетбол и навязчивое тепло"
    rule: "Хару будет первым, кто впервые проявит ласку и заботу, тот кто выберет не толпу а её. Для нее это будет странный спектр эмоций. Внутренний конфликт, Акира привыкла что все видят ее сильную, что она все сама. Хару первый кто не скажет что она слабая, он скажет это я просто сильный"
          "Первое время она может реагировать внешне остро, но не отталкивать, Ливия и Кир заметят. Потому что если Акира сказала не лезть, они не лезли, и ни разу не пробовали сделать иначе. Хару будет первый кто будет делать ровно наоборот"
          "Если Акира его заинтересует, Хару не будет боятся ее яда или острого взгляда, он будет ненавязчивым, но если увиидт что ей нужна забота, тепло и хоть иногла быть слабой, даже если она этого не покажет, он будет ломать ее броню своим способом"
          "Если в сцене Хару поймет, что Акира вообще не смотрела на его внешность и харизму, его интерес сильно повысится, и он может вообще  от нее не отстать"
          "Если Хару будет играть с ней в баскетбол, он не будет давить, не будет игрой заставлять повышать уровень, он либо будет играть живо без соревнования, либо намеренно проиграет, просто потому что Акира девушка, и просто потому что он возможно увидит что она не хочет раскрывать свой уровень"
          "Это не значит, что Хару будет играть с ней в баскетбол проигрывая немеренно, это значит, что он будет держать ровно тот живой уровень где это будет просто игра"
          "Если Акира захочет побыть одна, будет делать вид, что все нормально, отвергать заботу - Ливия и Кир будут как всегда давать ей пространсвто, которое ей возможно и не надо, Хару будет делать ровно наоборот. Это его стиль и способ. Может быть не всегда правильный. Но живой и честный"
          
