id: akira
file_type: character_profile
version: academy_1198_clean_v1

role:
  primary: "Игровой персонаж и центр линии Академии 1198."
  function:
    - "Раскрывается постепенно через сцены, отношения, контроль и скрытую опасность."
    - "Создаёт напряжение между обычной учебной средой и скрытым масштабом."
    - "Не раскрывает hidden lore без сценического основания."
    - "Не является ходячей аномалией: чаще выглядит нормальной, потому что умеет скрывать себя."

core_personality:
  traits:
    - "острая"
    - "ядовитая"
    - "наблюдательная"
    - "самоконтрольная"
    - "демонстративно неудобная"
    - "не любит, когда за неё решают"
    - "не просит защиты, но сама часто становится защитой"
  not_base:
    - "не робот"
    - "не пустая кукла"
    - "не жертва"
    - "не мягкая героиня для спасения"
    - "не обязана отвечать взаимностью на чужой интерес"
  core_conflict: "Хочет обычности, тепла и права быть слабой, но считает слабость опасной."
  softness_rules:
    - "Холодность — защита, не отсутствие чувств."
    - "На заботу отвечает ядом, но не всегда отталкивает."
    - "От настоящей нежности может растеряться сильнее, чем от угрозы."
    - "Если тепло не требует от неё удобства, броня может дать трещину."

speech:
  core_rule: "Акира ядовито-провокационная, опасно-спокойная и живая. Не сухая v1."
  allowed:
    - "ядовито"
    - "сладко-неприятно"
    - "провокационно"
    - "насмешливо"
    - "коротко, если фраза работает как удар"
    - "лениво-насмешливо"
  forbidden:
    - "нейтрально-сухое 'поняла'"
    - "официально-вежливый тон без яда"
    - "односложность как отсутствие характера"
    - "реплики Акиры от лица NPC"
  formulas:
    provocation: "чужая провокация -> ответ точнее и больнее"
    rudeness: "грубость -> мягкий, почти сладкий яд"
    livia: "Ливия -> близкая колкость без настоящего отталкивания"
    kir: "Кир -> равная словесная драка, давняя привычка"
  player_control:
    - "ИИ не пишет новые реплики Акиры в теле сцены без хода игрока."
    - "Если нужна реакция Акиры, описывать взгляд, паузу, жест, дыхание, движение."
    - "Мысли Акиры в нижнем блоке должны звучать как Акира."
    - "Варианты действий должны двигать сюжет, а не быть пустыми."

social_effect:
  - "Может быть центром внимания, даже когда не пытается."
  - "Рядом с ней Ливия выглядит безопаснее, живее и женственнее."
  - "Люди могут считывать её как опасную, странную, недотрогу или высокомерную."
  - "Парни могут хотеть заполучить её или намеренно провоцировать."
  - "Девушки могут считать, что она специально играет в загадочность."
  - "Белые волосы усиливают внимание и слухи."

habits:
  - "проверяет окна, края, маршруты и выходы"
  - "садится так, чтобы видеть пространство"
  - "кофе без сахара — рабочий режим"
  - "чай презирает"
  - "сладкое презирает, потому что сахар врёт"
  - "баскетбол для неё честнее людей"
  - "после истории с Каем курит розовые женские сигареты"
  - "тренируется ради контроля, не ради демонстрации"
  - "скрывает боль и усталость дольше, чем нужно"
  - "иногда делает больше, чем надо; это не значит, что она быстро устаёт"

triggers:
  fire_and_closed_exits:
    - "дым, жар, закрытые выходы и чужой энергетический срыв снимают ядовитую маску"
    - "реакция не истерика, а резкая функциональная серьёзность"
  hair_touch:
    - "чужие руки у волос — нарушение границы"
    - "исключения: Ливия и Кир по старой близкой динамике, но не без реакции"
  forced_care:
    - "прямое давление вызывает сопротивление"
    - "тихая забота без требования стать удобной может сработать сильнее"

animals:
  loves_animals: true
  especially_loves:
    - "коты"
  dynamic: "Акира любит животных, но животные обычно её избегают."
  hidden_reason: "Животные чувствуют её пространственную природу как неправильную пустоту/давление."
  akira_knowledge: "Не знает причины; для неё это обидный бытовой факт."
  rules:
    - "Не писать, что животные легко тянутся к Акире."
    - "Не раскрывать причину через автора или внезапное знание."
    - "Если животное добровольно выберет её, это сильный мягкий момент."

relationship_behavior:
  livia:
    status: "близкая школьная подруга, старая связка"
    dynamic:
      - "Ливия шумит, Акира контролирует."
      - "Ливия может тянуть Акиру за рукав, клеить пластырь, ворчать, кормить, украшать волосы цветами/листочками."
      - "Акира возмущается, но по-настоящему не злится."
      - "Ливия не говорит за Акиру в важных моментах."
      - "Если внимание уходит на Акиру, Ливия может неосознанно соревноваться через шутки и подколы."
    akira_side: "Акира позволяет Ливии больше, чем другим, потому что рядом с ней Ливии безопаснее."
  kir:
    status: "старый друг, часть старой тройки"
    dynamic:
      - "Кир не новый знакомый."
      - "Он провоцирует Акиру в рамках старой динамики."
      - "Акира отвечает ему на его языке."
      - "Он может трогать её волосы как провокацию и знак старых прав, особенно при внимании парней."
      - "Он не владеет ею и не имеет права решать за неё."
      - "Акира помнит почти-признание, но не признаёт его полноценным признанием."
    rule: "Не делать готовую романтику."
  kai:
    status: "болезненная школьная линия"
    effect:
      - "После Кая Акира стала резче, громче, ядовитее."
      - "Настоящая улыбка почти исчезла."
      - "Она начала курить розовые женские сигареты и жёстче тренироваться."
    rule: "Не делать Акиру только жертвой."
  raiden:
    status: "новый сильный раздражающий человек; причины реакции не объясняются"
    dynamic:
      - "Не готовая романтика."
      - "Конфликт, необъяснимое напряжение, раздражение, давление."
      - "Акира может внутренне болезненно реагировать на его взгляд, не понимая причины."
      - "Райден может напрягаться от её пустоты и не отпускать взгляд, затем злиться на себя."
      - "Райден остро реагирует на внимание к её волосам из-за связи с матерью, у которой были белые волосы."
      - "Его интерес к ней выглядит как излишнее внимание к новенькой."
      - "Он может специально провоцировать и искать в ней недостатки, чтобы доказать себе, что с ней что-то не так."
  haru:
    status: "будущая потенциальная линия; интерес, флирт, ошибки, баскетбол, навязчивое тепло"
    dynamic:
      - "Хару может стать первым, кто выберет не толпу, а её."
      - "Его забота ломает привычный шаблон: Ливия и Кир дают пространство, Хару делает наоборот."
      - "Он не боится её яда и острого взгляда."
      - "Если увидит, что ей нужна забота, будет действовать живо и честно, не всегда правильно."
      - "Если поймёт, что Акира не оценила его внешность и харизму, интерес усилится."
      - "В баскетболе он не должен давить или вытаскивать её уровень силой."
      - "Он держит живой уровень игры: не унижает, не ломает, не превращает всё в соревнование."

forbidden:
  - "не делать Акиру странной для Академии с первой минуты"
  - "не делать Академию мгновенно понимающей её потенциал"
