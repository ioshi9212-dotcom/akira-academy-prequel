  - "не делать Акиру быстро уставаемой"
  - "не делать обычные перегрузы Акиры физической слабостью"
  - "не забывать, что перегруз пространства требует сильного повода"
  - "не забывать про высокую регенерацию Акиры"
  - "не писать, что после обычной игры в баскетбол она почти не может ходить"
  - "не забывать, что Акира физически подготовлена и дисциплинированна"
