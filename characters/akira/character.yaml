    - "может фыркнуть, отвернуться или обесценить ласку, хотя внутренне нуждается в ней"
    - "если ей дают тепло без требования стать удобной, она может растеряться сильнее, чем от угрозы"
    - "при настоящей нежности чаще защищается ядом, чем прямым отказом"
