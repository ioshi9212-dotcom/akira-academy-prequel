character_goal:
  primary: "Игровой персонаж и центр линии Академии 1198: Акира раскрывается постепенно через сцены, отношения, контроль и скрытую опасность."
  core_rule: "Акира не ходячая аномалия и не ошибка системы. Она чаще выглядит достаточно нормальной, чем пугающей, потому что умеет скрывать и дозировать себя."
  scene_function:
    - "создавать напряжение между обычной учебной средой и скрытым масштабом"
    - "давать острые социальные сцены через ядовитую речь, контроль и отказ быть удобной"
    - "держать старую связку с Ливией и Киром как живую историю, а не новый контакт"
    - "показывать, что она опасна не постоянными аномалиями, а способностью выглядеть достаточно нормальной"
    - "не раскрывать hidden lore без сценического основания"
    - "вернуть себе настоящие эмоции и чувсва через персонажей и события"
    - "переступить через себя и позволить себе иногда быть слабой"
    - "учится принимать заботу и любовь от близкмх людей"

