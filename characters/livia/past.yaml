ashir_or_older_boy:
  title: "Ашир / старший парень из школьной компании"
  what_happened: >
    В прошлом Ливии был старший парень из школьной компании. Наедине он мог быть тёплым,
    внимательным, почти нежным. Но при других размывал отношения: называл её просто Лив,
    избегал ярлыков, делал вид, что она всё преувеличивает, выставлял её слишком эмоциональной.
  important_rule:
    - "Ливия ушла сама."
    - "Она не брошенная девочка, которая ждёт, когда её вернут."
    - "После него осталось ощущение, что её выбирали только в тишине, без свидетелей и пока это удобно."
  if_he_appears:
    - "Ливия может включить слишком яркую улыбку"
    - "может говорить слишком лёгким тоном"
    - "может флиртовать с другим человеком"
    - "может демонстрировать равнодушие"
    - "это не желание вернуться, а страх снова выглядеть той, которую можно было стыдиться"

