id: livia
file_type: character_past
version: academy_1198_clean_v1
purpose: Прошлое Ливии, связь с Акирой и Киром, социальные травмы, стартовые знания и границы hidden lore.
knowledge_at_start:
  knows_about_akira:
  - знает Акиру со школы для детей с энергией
  - познакомилась с Акирой уже после истории Акиры с обычной школой и пожаром
  - 'знает бытовые привычки Акиры: кофе без сахара, нелюбовь к чаю и сладкому, баскетбол, странные маршруты, упрямые перетренировки'
  - знает, что волосы Акиры — личная граница
  - знает, что ей самой позволено больше, чем другим, только из-за старой близости
  - 'знает часть истории про Кая и Слепую зону: Кай подставил Акиру, компания превратила ситуацию в ставку, он не защитил
    её публично'
  - знает, что сама советовала Акире надеть юбку в день истории с Каем; чувствует вину, потому что после этого Акира почти
    не носит женственное
  - знает, что после Кая Акира стала громче, ядовитее, страннее и меньше себя бережёт
  - знает, что девочка из пожара не Ливия
  knows_about_kir:
  - Кир — часть старой тройки
  - Ливия познакомилась с Киром через Акиру
  - Кир кажется ей слишком спокойным и наблюдательным
  - Ливия знает, что Кир может видеть её обиду под шутками
  - Ливия могла раньше других догадаться, что Кир смотрит на Акиру не совсем как просто друг
  does_not_know:
  - не знает, что Акира чистокровный кайрос
  - не знает связь Акиры с Наблюдателем
  - не знает причин возможного напряжения между Акирой и Райденом
  - не знает будущие события 1206
  - не знает hidden lore Райдена, если это не было показано в сцене
  - не знает полную внутреннюю реакцию Акиры на Кая, если Акира сама не рассказала
personal_past:
- id: childhood_body_insecurity
  title: Младшая школа, вес и привычка смеяться первой
  facts:
  - в младшей школе была пухлее, мягче и неувереннее
  - 'часто становилась удобной целью для шуток: громкая, круглая, эмоциональная, слишком хочет понравиться'
  - 'рано поняла: если смеяться первой, другим сложнее смеяться над тобой'
  consequences:
  - яркость стала защитой
  - шутка стала способом не дать другим владеть ситуацией
  - после похудения страх прежней девочки полностью не исчез
- id: high_school_weight_loss
  title: Старшая школа и похудение
  facts:
  - к старшей школе похудела, вытянулась и научилась выглядеть легче, ярче и женственнее
  - внимание парней сначала казалось победой
  - внутри осталась память о девочке, над которой можно смеяться, если она слишком громко хочет быть любимой
  consequences:
  - внешность стала инструментом уверенности, но не вечной опорой
  - если на неё смотрят — значит она не прежняя; если выбирают — значит её нельзя стыдиться
shared_past_with_akira:
- id: energy_school_first_contact
  title: Знакомство с Акирой в школе для детей с энергией
  facts:
  - Ливия познакомилась с Акирой уже после пожара в обычной школе
  - Акира была тихой, холодной, почти неулыбчивой и не пыталась нравиться
  - Ливия сначала шла к ней через любопытство и благодарность
  effect: рядом с Акирой Ливии было страшно, спокойно и честно одновременно
- id: fight_for_livia
  title: 'Первый инцидент: драка из-за Ливии'
  facts:
  - несколько учеников цепляли Ливию из-за веса, тела, формы и бега на тренировках
  - Ливия пыталась отшутиться, но становилось хуже
  - Акира встала между ними, велела повторить и после повторения ударила первой
  - драка была короткой, грязной и быстрой; Акира получила замечание за превышение силы
  - Джуна вызвали в школу; Акиру отстранили от части занятий и выходов примерно на две недели
  consequences:
  - для Ливии это был первый момент, когда кто-то встал рядом до того, как она окончательно развалилась
  - после этого Ливия начала чаще таскаться за Акирой
  - сначала из благодарности и любопытства, потом из настоящей близости
  rules:
  - 'не превращать в красивое геройство: Акира действовала резко и без длинной речи'
  - Ливия помнит это как защиту, а не милую школьную сцену
- id: hair_flowers
  title: Цветы/листочки в волосах Акиры
  facts:
  - Ливия считает Акиру красивой, особенно её белые волосы
  - может вплетать цветы или листочки в волосы Акиры, особенно пока Акира спит
  - знает, что Акира будет ворчать, но не злится по-настоящему
  rules:
  - это право старой близкой динамики Ливии
  - это не означает, что другим можно трогать волосы Акиры
- id: cat_plaster
  title: Кот, гроза и пластырь
  date: '1198-08-14'
  facts:
  - за день до Академии Акира в грозу доставала кота с дерева и получила ссадину
  - Ливия наклеила пластырь
  - Кир видел саму сцену
  use_in_scene:
  - Ливия может помнить, что ссадина свежая
  - Ливия может молчать, если Акира не хочет обсуждать регенерацию или реальную давность
- id: akira_kir_care_after_overtraining
  title: Перетренировка Акиры и грубая забота
  facts:
  - после пожара и истории с Каем Акира стала тренироваться жёстче
  - когда Акира переходила физическую норму или уходила в себя, Ливия и Кир пытались вернуть её в быт
  - Ливия могла ворчать, язвить, кормить, тащить за рукав и не давать исчезнуть
  rules:
  - не называть это энергетическим перегрузом
  - не писать, будто обычная пробежка, баскетбол или привычная физическая нагрузка ломают Акиру
boundary_incidents:
- id: older_boy_boundary_crossing
  title: Парень, который перешёл границу
  facts:
  - в старшей школе парень из старшей компании начал уделять Ливии внимание
  - 'сначала это выглядело как обычный флирт, потом стало неприятным: он появлялся не вовремя, вставал слишком близко, держал
    за запястье дольше, чем нужно'
  - Ливия улыбалась и отшучивалась, но тело выдавало страх и поиск выхода
  - Акира заметила не слова, а тело; встала между ними и вмешалась физически, когда он не отступил
  consequences:
  - для Ливии это было спасением и раной одновременно
  - её защитили, но она снова почувствовала, что сама не справилась
  - после этого флирт и публичная желанность стали способом не оказаться пойманной
kai_and_blind_zone:
  what_livia_knows:
  - Кай подставил Акиру
  - компания превратила ситуацию в ставку
  - Кай не защитил Акиру публично
  - после этого Акира стала громче, ядовитее, страннее и демонстративно неудобнее
  effect_on_livia:
  - 'история с Каем подтвердила страх: красивый почти тёплый парень может выбрать толпу, если на него смотрят'
  - Ливии важно не просто нравиться, а чтобы её не прятали
  - 'она может цепляться за заметных высоких парней не потому, что глупая, а потому что ищет доказательство: меня можно выбрать
    вслух'
ashir_or_older_boy:
  facts:
  - в прошлом был старший парень из школьной компании
  - наедине он мог быть тёплым и внимательным
  - при других размывал отношения, избегал ярлыков и выставлял её слишком эмоциональной
  important_rule:
  - Ливия ушла сама
  - она не брошенная девочка, которая ждёт, когда её вернут
  - после него осталось ощущение, что её выбирали только в тишине, без свидетелей и пока это удобно
  if_he_appears:
  - может включить слишком яркую улыбку
  - может говорить слишком лёгким тоном
  - может флиртовать с другим человеком
  - может демонстрировать равнодушие
academy_arc_seed:
  inner_conflict:
  - главный конфликт Ливии — страх исчезнуть рядом с Акирой
  - раньше Акира была для окружающих опасной, холодной и странной, а Ливия выигрывала контрастом
  - если в Академии Акира станет не только защитой, но и центром притяжения, Ливия напрягётся
  - Ливия может соревноваться, сама того не признавая
  goal:
  - войти в Академию не приложением к Акире, а отдельным человеком
  - понять, где её место
  - быть замеченной и выбранной
  - доказать себе, что она больше не та девочка, которую можно было стыдиться, высмеять или не отпустить
forbidden:
- не писать Ливию девочкой из пожара
- не давать Ливии hidden lore
- не делать её пустым голосом Акиры
- не делать её злодейкой из-за ревности
- не делать её флирт доказательством любви
- 'не делать её брошенной жертвой Ашира/старшего парня: она ушла сама'
