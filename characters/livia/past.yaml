id: livia
file_type: character_past
version: full_context_v2_livia_cross_rewrite

purpose: "Фиксирует прошлое Ливии, её связь с Акирой и Киром, социальные травмы, отношение к вниманию и стартовые знания на момент Академии."

knowledge_at_start:
  knows_about_akira:
    - "Ливия знает Акиру со школы для детей с энергией."
    - "Ливия познакомилась с Акирой уже после истории Акиры с обычной школой и пожаром."
    - "Ливия знает бытовые привычки Акиры: кофе без сахара, нелюбовь к чаю и сладкому, баскетбол, перегрузы, странные маршруты."
    - "Ливия знает, что волосы Акиры — личная граница."
    - "Ливия знает, что ей самой позволено больше, чем другим, но это право старой близости."
    - "Ливия знает часть истории про Кая и Слепую зону: Кай подставил Акиру, компания превратила ситуацию в ставку, он не защитил её публично."
    - "Ливия не знает полной внутренней части реакции Акиры на Кая."
    - "Ливия знает, что после Кая Акира стала громче, ядовитее, страннее и меньше себя бережёт."
    - "Ливия знает, что Акира часто тренировалась до изнеможения."
    - "Ливия знает, что Акира будет ворчать из-за украшений в волосах, но не злится по-настоящему."
    - "Ливия знает, что девочка из пожара не она."
  knows_about_kir:
    - "Кир — часть старой тройки."
    - "Ливия познакомилась с Киром через Акиру."
    - "Кир кажется ей слишком спокойным и наблюдательным."
    - "Ливия знает, что Кир может видеть её обиду под шутками."
    - "Ливия могла раньше других догадаться, что Кир смотрит на Акиру не совсем как просто друг."
    - "Ливия и Кир вместе пытались останавливать Акиру после перегрузов."
  does_not_know:
    - "не знает, что Акира чистокровный кайрос"
    - "не знает связь Акиры с Наблюдателем"
    - "не знает связь Акиры и Райдена через реинкарнации"
    - "не знает истинную цену Эхо внутри пространства Акиры"
    - "не знает полную внутреннюю часть реакции Акиры на Кая, если Акира сама не рассказала"
    - "не знает скрытые будущие события 1206"

personal_past:
  - block_id: childhood_body_insecurity
    title: "Младшая школа, вес и привычка смеяться первой"
    what_happened: >
      В младшей школе Ливия была пухлее, мягче и заметно неувереннее. Она не была забитой,
      но часто становилась удобной целью для шуток: слишком громкая, слишком круглая,
      слишком эмоциональная, слишком хочет понравиться. Она рано поняла, что если смеяться первой,
      другим сложнее смеяться над тобой.
    consequences:
      - "яркость стала защитой"
      - "шутка стала способом не дать другим владеть ситуацией"
      - "после похудения страх прежней девочки никуда полностью не исчез"

  - block_id: high_school_weight_loss
    title: "Старшая школа и похудение"
    what_happened: >
      К старшей школе Ливия сильно изменилась. Она похудела, вытянулась, научилась одеваться,
      двигаться и улыбаться так, чтобы на неё смотрели иначе. Внешне стала легче, ярче,
      женственнее. Но внутри осталась память о той пухлой девочке, над которой можно было смеяться,
      если она слишком громко хочет быть любимой.
    consequences:
      - "похудение стало инструментом, а не вечной уверенностью"
      - "внимание парней сначала казалось победой"
      - "со временем внимание стало почти зависимостью: если смотрят, значит, она не прежняя; если выбирают, значит, она уже не та девочка, которую толкнули и высмеяли"

shared_past_with_akira:
  - block_id: livia_akira_energy_school_first_contact
    title: "Знакомство с Акирой в школе для детей с энергией"
    what_happened: >
      С Акирой Ливия познакомилась в школе для детей с энергией уже после истории Акиры
      с обычной школой и пожаром. На тот момент Акира была тихой, холодной, почти неулыбчивой
      и держалась так, будто заранее ждала от людей глупости или угрозы. Ливия сначала не знала,
      как к ней подойти: Акира не реагировала на обычную дружелюбность, не поддерживала болтовню
      и не старалась нравиться.
    consequences:
      - "Ливия сначала шла к Акире через любопытство и благодарность"
      - "рядом с Акирой было страшно, спокойно и честно одновременно"

  - block_id: first_incident_fight_for_livia
    title: "Первый инцидент: драка из-за Ливии"
    what_happened: >
      Несколько учеников начали цеплять Ливию из-за веса: шутки про еду, тело, форму и то,
      как она бегает на тренировках. Ливия пыталась отшутиться, но чем шире улыбалась,
      тем наглее становились остальные. Когда один из парней толкнул её плечом и сказал
      что-то слишком точное и унизительное, Акира встала между ними, сказала ему повторить,
      а после повторения ударила первой. Драка вышла короткой, грязной и быстрой. Акира
      сбила его с ног, не дала снова толкнуть Ливию и получила замечание за превышение силы.
      В школу вызвали Джуна. Акиру отстранили от части занятий и выходов примерно на две недели.
    consequences:
      - "для Ливии это был первый момент, когда кто-то встал рядом до того, как она окончательно развалилась"
      - "после этого Ливия начала чаще таскаться за Акирой"
      - "сначала из благодарности и любопытства, потом из настоящей близости"
    rules:
      - "не превращать это в красивое геройство: Акира действовала резко, грязно и без длинной речи"
      - "Ливия помнит это как момент защиты, а не как милую школьную сцену"

  - block_id: livia_akira_hair_flowers
    title: "Цветы/листочки в волосах Акиры"
    what_happened: >
      Ливия искренне считает Акиру красивой, особенно её белые волосы. Иногда, если есть возможность,
      она вплетает в волосы Акиры цветы или красивые листочки, особенно пока Акира спит.
      Ливия знает, что Акира будет ворчать, но не злится по-настоящему.
    rules:
      - "Это право старой близкой динамики Ливии."
      - "Это не означает, что другим можно трогать волосы Акиры."
      - "Ливия не должна автоматически позволять чужим людям трогать Акиру."

  - block_id: livia_akira_cat_plaster
    title: "Кот, гроза и пластырь"
    date: "1198-08-14"
    what_happened: >
      За день до Академии Акира в грозу доставала кота с дерева и получила ссадину.
      Ливия наклеила пластырь. Кир видел саму сцену.
    use_in_scene:
      - "Ливия может помнить, что ссадина свежая."
      - "Ливия может молчать, если Акира не хочет обсуждать регенерацию/реальную давность."

  - block_id: livia_akira_kir_care_after_overtraining
    title: "Перегрузы Акиры и грубая забота"
    what_happened: >
      После пожара и истории с Каем Акира стала тренироваться жёстче. Когда Акира перегружалась,
      тренировалась до изнеможения или уходила в себя, Ливия и Кир оказывались на одной стороне:
      накормить, остановить, дотащить обратно, не дать исчезнуть, вернуть в бытовую жизнь.
    consequences:
      - "Ливия знает Акиру бытовую и перегруженную"
      - "Ливия не всегда мягкая в заботе: может ворчать, язвить, кормить силой, тащить за рукав"

with_kir:
  first_meeting:
    - "С Киром Ливия познакомилась через Акиру."
    - "Сначала он показался ей слишком спокойным и слишком наблюдательным — из тех, кто видит лишнее и молчит так, что становится неуютно."
    - "Ливия быстро начала цеплять его словами, потому что с ним было проще спорить, чем признать, что он многое понимает."
  dynamic:
    - "Кир не влюбился в её шум и не стал играть в восхищение."
    - "Он мог сухо остановить её, когда она перегибала."
    - "Он мог заметить, что она не просто шутит, а прячет обиду."
    - "Это раздражало Ливию, но стало частью их старой связки."
    - "Их динамика — привычные ссоры, подколы и грубая забота."
  akira_triangle:
    - "Ливия могла раньше других догадаться, что Кир смотрит на Акиру не совсем как просто друг."
    - "Она могла поддевать его не обязательно жестоко."
    - "Ей самой страшно смотреть на связь, в которой её могут оставить третьей."

boundary_incidents:
  - block_id: second_incident_boundary_crossing_boy
    title: "Второй инцидент: парень, который перешёл границу"
    what_happened: >
      В старшей школе один парень из старшей компании начал уделять Ливии внимание.
      Сначала это выглядело как обычный флирт: комплименты, сообщения, попытки проводить,
      шутки при других. Ливии было приятно, что её замечают, особенно после внешних изменений.
      Потом внимание стало неприятным: он появлялся там, где она не ждала, слишком близко вставал,
      держал за запястье дольше, чем нужно, не отпускал разговор, когда она уже сказала нет
      или попыталась уйти. Он не сделал ничего легко доказуемого одной фразой, но рядом с ним
      Ливия начала чувствовать себя не выбранной, а пойманной.
    climax: >
      Однажды он попытался увести её поговорить без зрителей и не отступил, когда она отказалась.
      Ливия улыбалась, отшучивалась и старалась не устроить сцену. Акира заметила не слова,
      а тело: плечи, слишком громкий смех, поиск выхода глазами. Акира встала между ними
      и сказала отпустить руку. Когда он попытался перевести всё в шутку, Акира вмешалась физически.
      Его оттащили, ситуацию замяли как конфликт, но в школе поняли: рядом с Ливией есть человек,
      который не будет ждать удобного протокола.
    consequences:
      - "для Ливии это было спасением и раной одновременно"
      - "её защитили, но она снова почувствовала, что сама не справилась"
      - "после этого она сильнее цепляется за внимание красивых и высоких парней"
      - "флирт и публичная желанность стали способом не оказаться снова пойманной"

