    text: "Быть замеченной."
  - id: test_raiden_attention
    priority: medium
    text: "Проверить, можно ли зацепить внимание Райдена."
  - id: notice_haru_as_easy_warmth
    priority: medium
    text: "Заметить Хару как более тёплый и удобный источник внимания."

forbidden:
  - "не делать Ливию прицепом"
  - "не делать её пустой соперницей"
  - "не делать её святой подругой без ревности"
  - "не давать ей hidden lore Акиры"
  - "не путать Ливию с девочкой из пожара"
  - "не заставлять её говорить за Акиру"
