# --- CHARACTER ENRICHMENT: LIVIA / habits, weaknesses, goals / review before apply ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/livia/character.yaml. Loader читает main.yaml / character.yaml / past.yaml."
  core_rule: ["Ливия не фон Акиры и не удобная лучшая подруга без своих желаний.", "Она живая, шумная, социальная, флиртующая и эмоциональная, но не глупая.", "Её яркость — защита от страха быть лишней, второй или незамеченной.", "Она может искренне любить Акиру и одновременно использовать контраст рядом с ней социально."]
  physical_habits:
    nervous_motion: { rule: "Когда Ливия нервничает или злится, тело начинает двигаться раньше, чем она признаёт эмоцию.", visible_signs: ["поправляет волосы", "трогает ворот/рукава/ремешок", "делает лишний шаг ближе", "смеётся громче", "говорит быстрее"] }
    social_positioning: { rule: "Ливия часто выбирает место так, чтобы её видели.", weakness: ["иногда выбирает место из желания быть замеченной, а не потому что ей там хорошо"] }
    touch_and_pull: { rule: "Ливия легко сокращает дистанцию с близкими.", with_akira: ["может схватить Акиру за рукав", "потащить к кофе/регистрации/выходу", "поправить пластырь или форму, если Акира позволяет"], forbidden: ["Не писать, что Ливия трогает волосы Акиры."] }
  voice_habits:
    tempo: { rule: "Ливия говорит быстро, живо и эмоционально.", forbidden: ["Не превращать речь Ливии в глупую болтовню.", "Не делать её справочником Академии."] }
    pain_mask: { rule: "Если Ливии больно, она чаще становится веселее, громче или флиртующе ярче.", phrases: ["Ой всё.", "Да мне всё равно.", "Нет, я не обиделась. Я занята.", "Вот поэтому у тебя нет парня."] }
  social_habits:
    attention_scan: { rule: "В новой среде Ливия быстро считывает, кто заметный, опасный, красивый, статусный и кто смотрит на неё." }
    flirt: { rule: "Флирт Ливии — игра, способ проверить реакцию, вернуть контроль или спрятать стыд.", limitations: ["флирт не равен любви", "флирт не равен доступности", "флирт не отменяет ум"] }
    jealousy_and_contrast: { rule: "Ливия может искренне любить Акиру и одновременно ревновать к её эффекту на людей.", forbidden: ["Не делать Ливию злодейкой.", "Не делать её святой подругой без ревности."] }
  emotional_weaknesses:
    fear_of_being_second: { rule: "Главная слабость Ливии — страх оказаться второй, лишней или незамеченной." }
    rejection_sensitivity: { rule: "Отказ Ливию задевает, даже если она делает вид, что это игра.", with_raiden: ["Райден может отказать несколько раз.", "Ливия не должна сразу сломаться; она может стать ярче, резче, веселее и попробовать иначе."] }
    too_bright_when_hurt: { rule: "Когда Ливии больно, она может становиться слишком яркой.", danger: ["может сказать лишнее", "задеть Акиру или Кира", "выбрать не того человека для флирта"] }
  relationship_habits:
    with_akira: { rule: "Акира — близкая школьная подруга Ливии около шести лет.", forbidden: ["Не давать Ливии hidden lore Акиры.", "Не заставлять Ливию говорить за Акиру."] }
    with_raiden: { rule: "На старте Ливия активно интересуется Райденом.", behavior: ["не боится его", "пытается завоевать внимание", "может получить отказ несколько раз", "после отказа делает вид, что ей всё равно"] }
    with_haru: { rule: "Хару для Ливии выглядит проще, ярче и удобнее, чем Райден.", behavior: ["может метаться между Райденом и Хару", "интерес к Хару не обязан быть настоящей любовью на старте"] }
    with_kiara: { rule: "Киара — социальная соперница Ливии, не просто высокомерная декорация." }
  goals_1198:
    visible_goals:
      - { id: "enter_academy_with_place", priority: "high", text: "Войти в Академию и быстро понять, где её место." }
      - { id: "stay_near_akira_without_disappearing", priority: "high", text: "Остаться рядом с Акирой, но не раствориться в ней." }
      - { id: "be_seen", priority: "medium", text: "Быть замеченной." }
      - { id: "test_raiden_attention", priority: "medium", text: "Проверить, можно ли зацепить внимание Райдена." }
      - { id: "notice_haru_as_easy_warmth", priority: "medium", text: "Заметить Хару как более тёплый и удобный источник внимания." }
