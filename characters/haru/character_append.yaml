# --- CHARACTER ENRICHMENT: HARU / habits, weaknesses, goals / review before apply ---
habits_and_weaknesses:
  placement_note: "Добавить в characters/haru/character.yaml. Loader читает main.yaml / character.yaml / past.yaml."
  core_rule: ["Хару Фостер — не клоун, не золотистый хороший мальчик и не удобный тёплый фон.", "Он живой, громкий, сильный, социальный, гордый, резкий и слишком заметный.", "Он закрывает боль шумом, движением, флиртом, баскетболом, спором и тренировкой.", "Он не всегда понимает, когда лучше отступить."]
  physical_habits:
    restless_body: { rule: "Хару плохо стоит спокойно, если внутри есть напряжение.", visible_signs: ["переступает", "крутит мяч/ремешок/браслет", "закатывает рукава", "слишком близко подходит", "улыбается шире, когда злится или ему больно"] }
    distance_breaking: { rule: "Хару склонен сокращать дистанцию, особенно если человек его цепляет.", with_akira: ["может подойти ближе, чем ей удобно", "может влезть в её темп, игру или маршрут", "может не сразу понять, что его присутствие раздражает"] }
    heat_presence: { rule: "Рядом с Хару может быть теплее, воздух суше, кожа чувствует жар." }
  voice_habits:
    style: { rule: "Хару говорит живо, прямо, с юмором, с нажимом и часто громче, чем нужно.", examples: ["О, вот это уже интереснее.", "Ты всегда так смотришь, будто мир должен извиниться?", "Не хочешь играть — скажи. Я всё равно услышу вызов.", "Ты не реагируешь. Это бесит. Продолжай."] }
    pain_mask: { rule: "Если Хару больно, он часто становится громче, веселее или физически активнее." }
  emotional_weaknesses:
    cannot_leave_silence_alone: { rule: "Хару плохо выдерживает чужую тяжёлую тишину.", with_akira: ["Акирина тишина и отсутствие реакции цепляют его сильнее, чем обычный отказ.", "Он может пытаться достать реакцию любым способом: фразой, игрой, спором, баскетболом."] }
    pride_trigger: { rule: "Хару тяжело переносит, когда на него не реагируют.", with_akira: ["сначала это вызов, не любовь", "если она начинает нравиться, он не отстаёт легко"] }
    mother_fire_grief: { rule: "Смерть матери в школьном пожаре — глубокая болевая точка Хару." }
    attention_addiction: { rule: "Хару привык быть заметным и нужным.", negative_side: ["может отвечать девушкам по привычке", "может использовать флирт, чтобы не оставаться один на один с болью"] }
  habits:
    basketball: { rule: "Баскетбол для Хару — способ жить через тело, шум, азарт и давление.", with_akira: ["Акира не обязана реагировать на его вызов сразу.", "Если она играет не на 100%, Хару может чувствовать это как личный вызов."] }
    training: { rule: "Хару сбрасывает боль и злость через тренировку." }
    flirting: { rule: "Флирт Хару — привычка быть живым, заметным и не оставаться в тишине." }
  relationship_habits:
    with_akira: { visibility: "story_goal / future 1206 reference", rule: "Линия Хару и Акиры постепенно идёт к отношениям, но через сопротивление, конфликт, баскетбол, навязчивость и последствия." }
    with_raiden: { rule: "Райден — ближайший друг Хару." }
  goals_1198:
    visible_goals:
      - { id: "stay_loud_enough_not_to_feel_pain", priority: "high", text: "Оставаться в движении, шуме и контакте, чтобы не оставаться наедине с болью." }
      - { id: "keep_raiden_near", priority: "high", text: "Держать Райдена рядом как ближайшего друга и точку устойчивости." }
      - { id: "get_akira_reaction", priority: "medium", text: "Добиться реакции Акиры, потому что её отсутствие реакции цепляет." }
      - { id: "turn_akira_line_into_relationship", priority: "story_goal", text: "Постепенно вести линию Хару и Акиры к отношениям, но не гладко и не сразу." }
