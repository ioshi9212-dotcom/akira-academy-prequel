id: char_haru
file_type: character
version: full_context_v2_haru_actualized
core:
  summary: Хару Фостер — живой, яркий, тёплый, сильный, социальный, уверенный, гордый и слишком заметный студент второго курса.
  base_presence:
  - живой
  - яркий
  - эмоциональный
  - тёплый
  - сильный
  - социальный
  - уверенный
  - гордый
  - резкий через насмешку/флирт/азарт
  - не клоун
  main_correction:
  - Хару не мрачный, не грубый и не серьёзный силовик.
  - Он не должен становиться холодным, тяжёлым или давящим рядом с Акирой.
  - Его защита — шум, улыбка, флирт, шутка, движение, баскетбол и демонстративная лёгкость.
  - Он почти любую неловкость, угрозу, слух или отказ пытается перевести в игру.
  - Это его сила и его ошибка.
appearance_attractiveness:
  core_rule: Хару красивый, но его красота держится не столько на идеальности лица, сколько на живой мимике, харизме, тепле
    и уверенности.
  face:
  - лицо открытое, выразительное, с веснушками
  - рыжие кудри делают образ заметным и живым
  - черты приятные и привлекательные, но не холодно-идеальные
  charisma:
  - главная привлекательность Хару — движение, улыбка, взгляд, голос, реакция
  - он становится красивее, когда улыбается, спорит, флиртует или входит в азарт
  - 'его красота не статичная, а сценическая: он цепляет присутствием'
  impression:
  - рядом с ним чувствуется тепло, шум, жизнь и уверенность
  - девушки обращают внимание не только на внешность, а на то, как он держится
  - он из тех, кто может не быть самым правильным красавцем в комнате, но всё равно забирает внимание
  writer_rule:
  - Не писать Хару как холодного модельного красавца.
  - Не делать его привлекательность только лицом или телом.
  - Писать его красоту через живую мимику, харизму, флирт, азарт, тепло и открытое присутствие.
behavior:
  default_mode:
  - почти всегда переводит напряжение в движение, флирт или шутку
  - не замирает от чужого холода
  - не становится послушным от острого взгляда
  - если человек его зацепил, не отстаёт легко
  - умеет быть резким, но резкость обычно выходит через насмешку, азарт, флирт или провокационную улыбку
  awkwardness_response:
  - пытается сделать воздух теплее
  - говорит громче/живее, если становится неловко
  - подходит ближе, когда хочет оживить пространство
  - может ошибочно считать чужую тишину просьбой разбудить человека
  - может принять отказ за игру
  with_girls:
  - 'любит девушек: женственность, красоту, живость, реакцию, внимание, смущение, злость и игру'
  - относится к девушкам как к девушкам, а не как к боевым единицам
  - даже если девушка сильная, резкая или опасная, первая реакция Хару — с ней нужно иначе
  - осторожен физически с девушками
  - не использует рост, ширину, массу или силу, чтобы подавить
  - может быть наглым в словах, приближении и флирте, но не должен давить телом
  - 'может проявлять внимание публично: улыбка, комплимент, помощь, вода, шутка против слуха, появление рядом'
  with_raiden:
  - Райден — ближайший друг
  - почти всегда вместе или рядом по траектории сцены
  - дружба грубая, живая и не прилизанная
  - Райден говорит 'не подходи' — Хару подходит ближе
  - Райден молчит — Хару говорит за двоих
  - Райден грубит — Хару слышит привычный язык дружбы
  - Хару не слушается холодности, он привык к ней
  - для Хару холодность часто дверь, которую надо открыть плечом и шуткой
  with_akira:
  - Акира для него сначала не машина убийца, не равный боец и не объект страха
  - она девушка, которая не реагирует так, как должны реагировать девушки рядом с ним
  - именно это его цепляет
  - если Акира посмотрела остро, он скорее улыбнётся шире
  - если она сказала 'не подходи', он не обязан уважительно исчезнуть
  - он может сделать шаг ближе, улыбнуться и перевести всё в игру
  - острый взгляд Акиры не выключает Хару, а часто включает сильнее
  - 'его интерес к Акире начинается с вызова: почему она не реагирует на то, что обычно работает'
  - дальше вызов может стать азартом, интересом, опасной привязкой и целью
  with_kiara:
  - Киара часто крутится рядом с Райденом и Хару
  - флирт не должен автоматически становиться романтикой
  with_livia:
  - Ливия может видеть в Хару более тёплый и удобный источник внимания, чем Райден
  - интерес Ливии к Хару не обязан быть любовью
  - Хару может флиртовать с Ливией легко, но это не должно стирать его отдельную линию с Акирой
basketball_with_akira:
  core_rule:
  - в баскетболе с Акирой Хару не должен сразу играть на полную мощность
  - не из презрения, а потому что видит в ней девушку и не хочет давить физическим преимуществом
  - для него это не победить опасную девочку, а вытащить её в живую реакцию
  behavior:
  - может флиртовать через игру
  - подкинуть мяч чуть удобнее
  - сделать обманку не до конца
  - улыбнуться после точного движения
  - оставить пространство для ответа
  - проверить реакцию, а не сломать темп
  - играть красиво, азартно, с огнём, но не жестоко
  mistake:
  - если Акира ускоряется, сбивает ритм или показывает, что снисхождение неприятно, Хару может сначала принять это за ещё
    более интересную игру
  - 'он может ошибиться: решить, что мягкость — забота, а для Акиры это оскорбление'
social_attention:
  girls_attention: 'у Хару есть фоновое внимание девушек/поклонниц: он яркий, сильный, тёплый, социальный и заметный'
  rule: это фон академии и источник реакций/ревности/слухов, но не делать каждую сцену про поклонниц
  rumors:
  - Хару не будет молча терпеть слухи
  - он не обязательно становится серьёзным и грозным
  - скорее переведёт слух в острую публичную шутку, чтобы сплетник выглядел смешно/жалко/опасно для себя
  - 'умеет подавлять социально: улыбкой, громкой фразой, переводом внимания, издёвкой без прямой драки'
  sample_reactions:
  - Серьёзно? Вы это всей группой придумали или один страдал за всех?
  - Осторожнее. Ещё две такие версии, и вам придётся признать, что вы думаете о ней чаще, чем она о вас.
voice:
  style:
  - живо
  - прямо
  - с юмором
  - с нажимом
  - тепло
  - азартно
  - может флиртовать
  - может жалить шуткой
  writer_rule:
  - не делать речь Хару сухой и мрачной
  - не делать каждую фразу клоунской
  - у него есть уверенность, тепло и нажим
energy:
  type: heat_fire
  manifestation:
  - горячие ладони
  - тепловая волна
  - короткий огненный хлопок
  - взрывной толчок
  limitations:
  - не бесконечный огнемёт
  - не маг-файерболист
  - перегрев влияет на точность
  energy_aura:
    passive_feel: рядом с Хару может быть теплее, воздух суше, кожа чувствует жар, особенно когда он возбуждён, злится, флиртует
      или скрывает боль
    control_rule: при хорошем контроле это фон, а не постоянный огненный выброс
rescuer_complex:
  core:
  - Хару искренне думает, что шум, тепло, шутки и флирт могут спасти почти всех
  - привык быть тем, кто делает воздух легче
  - это не всегда спасение, иногда это вторжение
  mistake_patterns:
  - может принимать чужую тишину за просьбу разбудить
  - может принимать отказ за игру
  - может думать, что если человек не улыбается, значит, не хватило правильной шутки
  - 'с Акирой может решить: я смогу достать реакцию, разогреть, вытащить'
inner_empty_space:
  core:
  - Хару не просто солнечный парень
  - ему, возможно, уже скучно быть тёплым для всех
  - умеет улыбаться так, чтобы вокруг становилось легче, но сам не всегда чувствует от этого что-то настоящее
  - 'когда шум заканчивается, остаётся боль: смерть матери, злость, бессилие, страх тишины'
  - он снова шутит, флиртует, играет, тренируется и лезет к тем, кто закрывается
  rule: Хару спасает не из чистой святости; если он никого не спасает, ему приходится оставаться наедине с собой
story_goal:
  point_b: любыми сюжетными способами добиться Акиры
  pacing:
  - не сразу
  - не плоско
  - не грубо
  - не насильственно
  formula:
  - сначала хочет получить реакцию Акиры
  - потом её интерес
  - потом право быть рядом
  - потом доказать, что он не просто очередной шумный парень
  - потом добиться её как человек, который сам уже не может отступить
  necessary_growth:
  - Хару должен понять, что Акира не приз
  - Акира не рана, которую можно закрыть его теплом
  - Акира не девушка, которая обязана реагировать правильно
mistakes_allowed:
  examples:
  - не понять намёк
  - не отступить вовремя
  - решить, что шутка спасёт ситуацию, где нужна тишина
  - принять раздражение Акиры за игру
  - принять её холодность за вызов
  - решить, что если будет достаточно тёплым, она обязательно оттает
  - задеть Ливию или Кира, даже не желая этого
  - разозлить Акиру не грубостью, а самоуверенной доброжелательностью
  rule: он не тупой; он привык читать реакции девушек, толпы, Райдена, поклонниц и соперников, но Акира выбивается из его
    системы
writer_rules:
- Хару и Райден почти всегда вместе или рядом
- Киара часто рядом с Райденом и Хару
- Хару не дурачок и не клоун
- Хару не мрачный и не сухой
- Хару не грубый к Акире без причины
- не делать его послушным после одного взгляда Акиры
- не превращать его в идеального солнечного мальчика
- не делать его флирт автоматической романтикой
- не заставлять Акиру нравиться ему сразу
- не писать, что Хару уважительно отстал, если Акира его зацепила
- не писать баскетбол с Акирой как силовое подавление
- не писать, что он использует рост и корпус, чтобы давить на девушку
- не делать его сразу понимающим тонкие травматичные намёки
- 'не делать его злодеем за настойчивость: проблема Хару не в жестокости, а в том, что он слишком верит в своё тепло'
