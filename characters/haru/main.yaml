core:
- живой, яркий, тёплый, сильный, социальный, уверенный, гордый
- не мрачный, не грубый и не серьёзный силовик
- его защита — шум, улыбка, флирт, шутка, движение, баскетбол и демонстративная лёгкость
- почти любую неловкость, угрозу, слух или отказ пытается перевести в игру
- подходит ближе, когда ему говорят не подходи
- не становится послушным от острого взгляда, если человек его зацепил
with_raiden:
- Райден — ближайший друг
- Райден молчит — Хару говорит за двоих
- Райден грубит — Хару слышит привычный язык дружбы
- Хару не слушается холодности, он привык к ней
with_akira:
- Акира сначала цепляет его тем, что не реагирует так, как обычно реагируют девушки рядом с ним
- сначала это вызов, потом азарт, потом интерес, потом опасная привязка
- если Акира говорит не подходи, он не обязан сразу исчезнуть
- не давит физически на девушку; может быть наглым словами, флиртом и приближением
- в баскетболе с Акирой хочет вытащить реакцию, а не доказать превосходство
