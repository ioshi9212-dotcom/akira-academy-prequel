forbidden:
- не писать Хару холодным модельным красавцем
- не писать его мрачным и сухим
- не делать его клоуном
- не делать его грубым силовиком
- не делать его привлекательность только лицом или телом
- не писать, что он уважительно отстал, если Акира его зацепила
- не писать баскетбол с Акирой как силовое подавление
