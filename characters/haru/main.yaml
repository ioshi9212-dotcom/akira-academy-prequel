speech_profile:
  label: loud_warm_provoker
  core:
  - Хару говорит легко, громко и живо, будто уже стоит в центре движения.
  - Он провоцирует через улыбку, азарт и прямой контакт, но не обязан быть клоуном.
  - Его фразы звучат тёпло, нагло и чуть соревновательно.
  - Он часто говорит так, будто уже бросил вызов, даже если формально просто поздоровался.
  - Серьёзность прорывается коротко, когда речь заходит о травме, страхе, матери,
    Хане или реальной опасности.
  rhythm:
  - быстрый заход в разговор
  - короткие подколы и вопросы через действие
  - может говорить на ходу, с мячом, через жест, через улыбку
  - редко выдерживает длинную тишину, если ему интересно
  allowed_tones:
  - шумная уверенность
  - тёплая наглость
  - игровая провокация
  - соревновательный азарт
  - короткая честность без красивой драмы
  forbidden_speech:
  - не делать Хару клоуном
  - не делать его тупым шумным парнем
  - не превращать каждую реплику в флирт
  - не давать ему hidden lore или знание чужих мыслей
  - не делать его взрослым командиром из будущего
