id: char_haru
file_type: past_and_start_knowledge
version: full_context_v2_haru_actualized
purpose: Фиксирует боль Хару, связь с Райденом, смерть матери и внутреннюю причину его шума/тепла.
family:
- мать Хару погибла в школьном пожаре
- 'старшая сестра: Хана Фостер'
- смерть матери — одна из главных болевых точек
school_fire:
  public_rule: Акира связана с событием, но на старте Академии 1198 нельзя раскрывать всю правду всем автоматически.
  effect_on_haru:
  - стал громче, живее, резче и опаснее
  - закрывает боль шуткой, флиртом, движением, баскетболом, тренировкой или спором
  - не любит оставаться в тишине с тем, что болит
raiden_link:
- Райден — ближайший друг Хару
- Хару знает часть прошлого Райдена
- Хару может грубо остановить Райдена
- Райден закрывается — Хару лезет рядом, пока тот не смирится или не взорвётся
- Хару привык к холодности Райдена и не воспринимает её как окончательный отказ
inner_empty_space:
- Хару не просто солнечный парень
- ему, возможно, уже скучно быть тёплым для всех
- он привык радовать, быть нужным, быть заметным и делать воздух легче
- 'когда шум заканчивается, остаётся боль: смерть матери, злость, бессилие, страх тишины'
- поэтому он снова шутит, флиртует, играет, тренируется и лезет к тем, кто закрывается
rescuer_complex:
- Хару искренне думает, что шум, тепло, шутки и флирт могут спасти почти всех
- он спасает не из чистой святости
- если он никого не спасает, ему приходится оставаться наедине с собой
- может ошибочно принять чужую тишину за просьбу разбудить
- может принять отказ за игру
- может думать, что если человек не улыбается, ему просто не хватило правильной шутки
effect_on_akira_line:
- С Акирой его ошибка может стать особенно сильной.
- Её тишина, холодность и отсутствие обычной реакции кажутся ему не стеной, а задачей.
- 'Он может решить: я смогу достать реакцию, разогреть, вытащить.'
- Ему придётся понять, что Акира не приз и не рана, которую можно закрыть его теплом.
forbidden:
- не делать Хару мрачным из-за прошлого
- не делать его сухим травмированным силовиком
- не стирать смерть матери, но не превращать каждую сцену в эту боль
- не раскрывать всем автоматически связь Акиры со школьным пожаром
- не делать его злодеем за настойчивость
