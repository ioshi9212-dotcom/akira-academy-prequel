habits_and_weaknesses:
  placement_note: 'Добавить в characters/kael_north/character.yaml. Короткий живой блок: куратор Акиры, системный интерес,
    не добрый наставник.'
  core_rule:
  - Каэл Норт — не добрый наставник и не злой учёный-карикатура.
  - Он спокойный, рациональный, саркастичный, наблюдательный и неприятно терпеливый.
  - Рядом с ним хочется говорить меньше, потому что он слышит не слова, а ошибку в решении.
  - 'Он может защищать Акиру от Академии, но не из мягкости: ему нужен целый объект наблюдения, а не чужой отчёт.'
  - Его интерес к Акире научный, тактический и системный.
  habits:
    stillness_pressure:
      rule: Норт давит неподвижностью, паузой и точным вопросом.
      visible_as:
      - молчит дольше, чем комфортно
      - не впечатляется красивым сильным ударом
      - смотрит так, будто уже записал ошибку
      - может сделать один шаг ближе и этим закончить спор
      forbidden:
      - Не делать его громким командиром.
      - Не делать его эмоциональным папочкой-наставником.
    note_taking:
      rule: Норт фиксирует не только результат, но и способ мышления.
      scene_use:
      - замечает, когда Акира выбрала минимум
      - замечает цену действия, тело, паузу и скрытность
      - смотрит на маршрут, а не только на силу
      - может спросить так, будто вопрос уже ловушка
      forbidden:
      - Не делать его всеведущим.
      - Не раскрывать hidden lore Акиры через его догадку.
  voice_habits:
    style:
      rule: Говорит коротко, спокойно и неприятно точно; часто отвечает вопросом.
      forbidden:
      - Не делать его ласковым куратором.
      - Не заставлять его объяснять все карты.
  teaching_and_testing:
    akira_focus:
      rule: С 16 августа Норт должен стать куратором/инструктором Акиры.
      goal:
      - заставить Акиру показать реальный диапазон
      - понять цену её силы, предел тела, дисциплину и скрытность
      - выяснить, как она может пригодиться системе
      method:
      - создаёт ситуации, где красивый минимум недостаточен
      - проверяет реакцию под давлением
      - давит через точный вопрос, не через крик
      - прикрывает данные, если лишние глаза портят эксперимент
      forbidden:
      - Не делать Норта другом Акиры слишком рано.
      - Не делать его открытым врагом слишком рано.
    system_interest:
      rule: Норт работает внутри системы, но не обязан отдавать системе всё сразу.
      behavior:
      - фильтрует информацию
      - может отложить отчёт
      - может защитить Акиру от чужого доступа, чтобы сохранить качество наблюдения
      - может позволить ей думать, что она контролирует ситуацию
      dark_future_hook:
      - В будущем он может предложить Акиру Самуэлю.
      - На старте 1198 это не раскрывать и не форсировать.
  relationship_habits:
    with_akira:
      rule: Акира интересует Норта почти сразу, потому что её минимум выглядит слишком сознательным.
      dynamic:
      - он не верит красивому минимуму
      - его интересует не эффект силы, а цена и логика выбора
      - он может помогать, если это увеличивает качество данных
      - он раздражает Акиру тем, что видит не силу, а способ скрыться
      forbidden:
      - Не делать его заботливым наставником.
      - Не раскрывать всем её особенности сразу.
    with_academy:
      rule: Норт внутри Академии, но не раб бюрократии.
      dynamic:
      - защищает свою методику
      - спорит с формальными выводами
      - может закрыть доступ к Акире под предлогом кураторства
      - для системы он полезен именно потому, что не шумит
  calendar_1198:
    add_event:
      date: '1198-08-16'
      title: Назначение Норта куратором Акиры
      scene_function: первый серьёзный человек системы, который не покупается на минимум Акиры
      notes:
      - он проверяет её не как ученицу, а как аномальный актив
      - он не рассказывает всё Академии
      - он начинает тихую линию наблюдения
  goals_1198:
    visible_goals:
    - id: become_akira_curator
      priority: high
      text: Стать куратором Акиры и получить доступ к её тестам.
    - id: force_true_demonstration
      priority: high
      text: Заставить Акиру показать не красивый минимум, а реальный диапазон.
    - id: control_information_flow
      priority: high
      text: Удерживать и фильтровать информацию о ней.
    - id: measure_system_usefulness
      priority: medium
      text: Понять, как Акира может пригодиться системе.
    hidden_needs:
    - id: own_hypothesis_over_bureaucracy
      text: Проверить собственную гипотезу раньше, чем бюрократия сделает из Акиры ярлык.
    - id: keep_asset_intact
      text: Сохранить Акиру достаточно закрытой, чтобы её не разобрали другие отделы.
    - id: future_samuel_chain
      visibility: future_hook
      text: В будущем может предложить Акиру Самуэлю, но на старте это скрыто.
  writer_rules_for_scene:
  - 'Норт не должен быть добрым наставником: он помогает, когда это выгодно наблюдению или системе.'
  - Норт не должен раскрывать всё Академии сразу.
  - 'Его давление тихое: взгляд, пауза, вопрос, тест.'
  - Он должен видеть скрытие Акиры как задачу, а не как повод восхищаться.
  - 16 августа Норт должен войти в календарь как куратор Акиры.
  - Не раскрывать future Samuel hook на старте.
