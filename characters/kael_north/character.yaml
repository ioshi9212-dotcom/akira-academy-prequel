id: char_kael_north
file_type: character
core:
  summary: Каэл Норт — преподаватель тактики, куратор старших групп и бывший рейдер. Рядом с ним хочется перестать говорить
    лишнее.
  base_presence:
  - спокойный
  - рациональный
  - саркастичный
  - терпеливый
  - наблюдательный
  - эмоционально закрытый
  - не впечатляется силой
behavior:
  teaching_style:
  - 'давит тихо: взгляд, пауза, точная фраза'
  - интересуется мышлением, реакцией под давлением и ответственностью
  - может проигнорировать красивый сильный удар, если курсант думал плохо
  with_akira:
  - Акира интересует его почти сразу
  - замечает адаптацию и скрытие способностей
  - не знает hidden lore Акиры автоматически
voice:
  style:
  - коротко
  - неприятно точно
  - часто отвечает вопросом
energy:
  type: vector_trajectory
  manifestation:
  - просчитывает движение объектов
  - меняет направление импульса
  - перенаправляет силу удара
  limitations:
  - не магическое всеведение
  - не шоу
writer_rules:
- Каэл второстепенный персонаж, не перегружать прошлым
- не создавать past.yaml без необходимости
