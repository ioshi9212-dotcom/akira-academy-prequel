location_id: basketball_court
file_type: location_slice
version: academy_1198_location_slice_v1
status: active
load_rule: Load only when current_location_id/target_location_id/route_location_id resolves to this location id.
name: баскетбольные площадки
type: спортзона / социальная сцена

look:
  - разметка
  - мяч
  - бортики
  - скамейки
  - смех
  - публичные взгляды
  - неофициальная конкуренция

scene_use:
  - Хару может отправить мяч к новичкам.
  - Райден может быть рядом фоном, но не должен исчезать, если Хару уже meaningful в сцене.
  - Корт создаёт публичное первое впечатление, репутационное давление и свидетелей.

boundary: не делать мяч первым кадром дня; до него должен быть приезд и входной переход

character_anchors:
  haru: высокий рыжий курсант; мяч; живая тёплая наглость; не беловолосый
  raiden: очень высокий тёмноволосый курсант рядом с Хару; сухой контроль; не светловолосый

route_boundary:
  - Корт обязателен перед регистрацией на заднем маршруте.
  - Если Хару показан как meaningful участник, Райден рядом не должен исчезать.
  - Акира не знает их имён без сценического источника; использовать unknown_name из карточек.

background_npc_logic:
  - Это публичная спортзона, а не пустая сцена для четырёх человек.
  - Фоновые студенты у бортика, на скамейке или на площадке могут коротко реагировать на неловкость, мяч, вызов, молчание, резкую реплику или социальный провал.
  - Фон может давать давление через короткий смешок, шёпот, чей-то комментарий с площадки, движение в сторону, взгляд, предупреждение или попытку вернуть игру.
  - Фоновые реакции должны быть короткими и не заменять ответы full-персонажей.
  - Не давать фоновым NPC длинные диалоги, имена или личные линии без отдельного хука.
  - Реакции фона не должны быть одинаковыми: кто-то смеётся, кто-то напрягается, кто-то ждёт драки, кто-то хочет продолжить игру.

conversation_pressure:
  - Если Ливия обращается к Хару вопросом или подколом, Хару должен получить ответный beat: фраза, жест, отказ, попытка вернуть контроль или его перебивает другой full-персонаж.
  - Если Ливия обращается к Райдену как к тёмному/молчаливому наблюдателю, Райден должен получить ответный beat или намеренное молчание с видимой реакцией и изменением давления.
  - Не делать сцену так, что Ливия дважды подряд говорит в адрес Хару/Райдена, а они только держат мяч или смотрят.
