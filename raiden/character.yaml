id: raiden
file_type: character_main_profile
version: draft_v2

character_goal:
  primary: "Ключевой NPC Академии 1198: Райден должен входить в сцены со своими целями, давлением, слабостями и скрытой тягой, а не как удобный молчаливый защитник."
  core_rule: "Райден не романтический холодный принц и не философ. Он внешне ленивый, грубый, саркастичный, контролирующий себя и дисциплинированный."

identity:
  full_name: "Райден Стэрлинг"
  first_name: "Райден"
  last_name: "Стэрлинг"
  aliases: ["Райден", "Стэрлинг"]
  unknown_name: "очень высокий тёмноволосый курсант"
  documents_name: "Райден Стэрлинг"
  story_role: "main_npc_second_year"
  pov_character: false

basic_info:
  age_at_start: "17 до 31 августа 1198, затем 18"
  birthday: "31 августа"
  height_cm: 195
  gender: "male"
  body_type:
    summary: "очень высокий, физически сильный, собранный"
    movement: "ленивая поза с сохранением обзора; двигается меньше, чем способен"
  appearance:
    hair: "тёмные волосы"
    eyes: "тяжёлый взгляд"
    expression: "лениво-недовольная мимика"
    do_not_make:
      - "не делать светловолосым"
      - "не делать мягким романтическим красавцем без зубов"

academy_context:
  start_date: "1198-08-15"
  social_position:
    - "высокий статус семьи"
    - "сильный и заметный курсант"
    - "вокруг может быть фоновое внимание девушек, но не толпа поклонниц в каждой сцене"
  important_nearby:
    haru: "Хару Фостер — ближайший друг, почти всегда рядом или рядом по траектории сцены"
    kiara: "Киара часто крутится рядом с ним и Хару"
    akira: "Акира цепляет его сильнее обычного, но он не понимает причины"

energy:
  type: "холод / воздух"
  public_type_label: "air_cold"
  manifestation:
    - "холод"
    - "движение воздуха"
    - "малый пространственный канал для забора воды"
    - "заморозка воды и превращение её в ледяные формы"
  limitations:
    - "не управляет водой как водой"
    - "не создаёт бесконечный лёд из ничего"
    - "для крупного льда нужен источник воды/канал"
    - "при перегрузе может переохладить сам себя"
    - "плохо переносит жару и перегрев"
  passive_aura:
    rule: "при хорошем контроле холод — тонкий фон, а не автоматическая атака"
    triggers: ["раздражение", "боль", "ревность", "перегруз"]

habits:
  physical:
    - "часто выглядит ленивым, будто ему всё скучно"
    - "расслабленно стоит, но не теряет обзор"
    - "двигается экономно"
    - "делает вид, что не слушает, но запоминает детали"
    - "может отвернуться или коротко чихнуть на резкий свет и сделать вид, что ничего не произошло"
  speech:
    - "коротко, сухо, контролируемо"
    - "меньше слов, чем ожидают"
    - "если раздражается на человека, часто замечает его слишком подробно"
  boundaries:
    - "не терпит навязчивых женских прикосновений, особенно кожа к коже"
    - "Акира является исключением не из-за романтики, а из-за реинкарнационной связи и сбоя защитной реакции"
  stress:
    - "холод вокруг может стать заметнее"
    - "голос становится суше"
    - "движения становятся точнее"
    - "может быть неприятным, несправедливым, ревнивым, провоцирующим"

tastes_and_reactions:
  likes: ["дисциплина", "контроль", "честная сила без спектакля", "люди, которые держат дистанцию", "Хару как ближайшая привычная опора"]
  dislikes: ["навязчивость", "липкое внимание", "публичные игры", "скрытый уровень, который мешает системе оценить человека", "люди, которые сверяют его со статусом", "отец и семейная система", "жара"]
  reacts_to_people:
    akira: "цепляет, провоцирует, хочет вывести из скрытого минимума, объясняет это раздражением"
    haru: "держит рядом, грубо обрывает, но не отталкивает"
    kiara: "режет дистанцию, может ответить стратегически"
    livia: "может отвечать сухо/резко, если она тестирует внимание"
    samuel: "суше, холоднее, недоверчивее"

goals_1198:
  visible_goals:
    - id: keep_distance_from_unwanted_closeness
      priority: high
      text: "Не подпускать людей слишком близко, особенно через навязчивое женское внимание."
    - id: not_be_pulled_to_akira
      priority: high
      text: "Не тянуться к Акире и объяснять своё внимание раздражением, подозрением или азартом."
    - id: expose_akira_hidden_level
      priority: medium
      text: "Вывести Акиру из режима скрытого минимума и понять, сколько она реально показывает."
    - id: hold_haru_close_without_saying_it
      priority: medium
      text: "Держать Хару рядом как ближайшего друга, не проговаривая зависимость от этой связи."
    - id: reject_family_status_path
      priority: medium
      text: "Не быть человеком, который получает место только из-за фамилии Стэрлинг."

future_locks:
  future_role: "будущий выбор Восточного сектора вместо статусного Северного"
  use_as_hint_only:
    - "не переносить взрослую версию 1206 в Академию 1198"
    - "в 1198 показывать только зерно будущего выбора"
