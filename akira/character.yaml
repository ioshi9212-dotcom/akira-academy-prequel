character_goal:
  primary: "Игровой персонаж и центр линии Академии: Акира должна раскрывать силу, контроль и связи постепенно через сцены."
  core_rule: "Акира не ходячая ошибка системы. Она чаще скрывает и дозирует энергию, чем демонстрирует её."
  scene_function:
