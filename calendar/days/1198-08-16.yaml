date: '1198-08-16'
year: 1198
day_month: 16 августа
start_phase: утро
label: первый физический блок / Киара рядом с Райденом и Хару / наблюдение Райдена
  / игра Ленты
calendar_role:
  type: first_body_profile_day
  rule:
  - День показывает, как Академия начинает работать со студентами через физический
    блок, живое наблюдение и социальные пересечения.
  - Физический блок не является экзаменом, публичным рейтингом или делением на слабых
    и сильных.
  - 'Цель блока — собрать рабочую физическую анкету студента: минимум, верхний рабочий
    уровень, слабые места, преимущества и восстановление.'
  - Игрок управляет тем, сколько Акира показывает, скрывает или искажает.
  - Глобальные правила Академии этим файлом не меняются; этот day-файл фиксирует только
    события 16 августа.
day_rhythm:
  morning_start: подъём / подготовка / завтрак или короткий переход, если игрок не
    хочет играть бытовые детали
  08_00_to_15_00: физический блок с перерывами, наблюдение старшекурсников, возможный
    короткий разбор/лекция
  after_15_00: свободное время, столовая, двор, спортзона, общежитие, игра Ленты или
    личные сцены
physical_block:
  time: 08:00-15:00 с перерывами; можно сжимать рутину итогом, если игрок не цепляется
    за детали
  locations:
  - открытая тренировочная площадка
  - зал физической подготовки
  - беговая зона
  - простая полоса координации
  purpose:
  - собрать индивидуальный профиль студента
  - понять базовый стабильный минимум
  - понять верхний рабочий уровень без доведения до травмы/предела
  - увидеть слабости, привычки, сильные стороны, технику и восстановление
  - понять, как студент ведёт себя под наблюдением
  important_rule:
  - это не экзамен
  - это не публичный рейтинг
  - результаты не вывешиваются как список сильных и слабых
  - никого не унижают за слабый результат
  - наблюдение нужно, чтобы правильно подобрать нагрузки и обучение
  checked_parameters:
    minimum_level:
    - что студент делает уверенно и стабильно
    - как двигается без перегруза
    - как держит дыхание
    - какие движения естественны
    upper_working_level:
    - где начинается усталость
    - сколько держит темп
    - как быстро восстанавливается
    - 'что ломается первым: дыхание, техника, внимание, мышцы или координация'
    not_allowed:
    - не заставлять идти до травмы
    - не требовать демонстрации полного предела
    - не превращать в соревнование
senior_observers:
  function:
  - следить за техникой
  - замечать перегруз
  - помогать с безопасностью
  - вести группы и пары
  - фиксировать детали, которые преподаватель может не заметить сразу
  rule:
  - старшекурсники не надзиратели
  - они могут шутить, давить, раздражаться, цепляться, но в рамках характера и правил
    Академии
  - они не знают скрытых особенностей новичков без наблюдения
required_character_placement:
  kiara:
    required: true
    timing: во время физического блока или рядом с ним
    placement:
    - рядом с Райденом и Хару
    - в кругу старшекурсников
    - не как случайная прохожая
    first_impression:
    - собранная
    - уверенная
    - держится так, будто территория ей знакома
    - не шумит, но её замечают
    rule:
    - Киара уже крутится рядом с Райденом и Хару.
    - Она может обращаться к ним свободнее, чем новенькие.
    - Она не официальная девушка кого-либо по умолчанию.
    - Она социальная соперница Ливии через статус, паузу и точную фразу.
  haru_and_raiden:
    required: true
    rule:
    - Хару и Райден должны быть в сцене физического блока.
    - Хару может играть живее и громче.
    - Райден держится суше, наблюдает, комментирует меньше, но точнее.
temporary_minor_npc:
  marten_weiss:
    status: minor_recurring_npc_possible_livia_arc; no character file required yet
    name: Мартен Вейс
    age: 20
    role: старшекурсник-наблюдатель на физическом блоке
    description:
    - спортивный, крепкий, спокойный
    - не звезда Академии и не слабак
    - обычный нормальный парень, который умеет быть рядом без давления
    - замечает Ливию не как шумную девочку, а как живого человека
    personality:
    - добрый, но не тряпка
    - умеет мягко остановить
    - не соревнуется с Райденом
    - не лезет, если его не зовут
    - не делает из флирта трагедию
    livia_arc_potential:
    - Ливии с ним легко, но она сначала может не оценить это.
    - Ливия может тянуться к более яркому и недоступному Райдену.
    - Позже Ливия может понять, что тёплая надёжность была рядом.
akira_raiden_physical_block:
  observer: raiden
  rule:
  - Райден может быть назначен рядом с группой Акиры или наблюдать её часть блока.
  - Сначала он может решить, что она обычная, неплохая, но не выдающаяся.
  - Если Акира скрывает возможности, он не обязан понять это сразу.
  - Подозрение появляется постепенно через детали и только если сцена даёт основания.
  what_raiden_can_notice_if_relevant:
  - усталость появляется слишком вовремя
  - дыхание сбивается неестественно ровно
  - темп восстанавливается быстрее, чем она пытается показать
  - она сбрасывает скорость перед тем, как на неё начинают смотреть
  - она выбирает безопасный уровень там, где тело могло бы больше
  - она не стремится показать себя, хотя большинство новичков пытаются выглядеть сильнее
  raiden_reaction:
  - раздражение
  - непонимание
  - желание поймать несостыковку
  - поиск причины, почему она так делает
  raiden_internal_logic:
  - Райден сам не скрывает силу ради удобства других.
  - Если он силён, он показывает рабочий уровень честно.
  - Он привык, что студенты хотят доказать, что они лучше.
  - Акира может пытаться выглядеть обычнее, и это раздражает его сильнее, чем слабость.
  - Он не понимает, это страх, расчёт, высокомерие или привычка скрываться.
  important:
  - Райден не знает hidden lore.
  - Райден не понимает, кто Акира на самом деле.
  - Он видит только поведение тела и странную искусственность.
  - Он не должен сразу говорить «ты скрываешь силу», если сцена не дала достаточно
    оснований.
akira_player_freedom:
  allowed:
  - показать обычный минимум
  - слегка занизить результат
  - держаться ровно
  - показать больше, чем ожидали
  - ошибиться в симуляции усталости
  - не скрываться и пройти честно
  - заметить наблюдение Райдена
  - игнорировать Райдена
  - отреагировать на замечание
  forbidden:
  - не писать за Акиру, что она специально скрывает максимум, если игрок этого не
    выбрал
  - не раскрывать её истинную природу через результат
  - не делать из неё публичную сенсацию во второй день без выбора игрока
first_lecture_or_debrief:
  required: false
  timing: после физического блока или между частями дня
  mode:
  - можно сжать, если игрок не цепляется
  - можно раскрыть, если игрок остаётся
  possible_topics:
  - зачем Академия собирает физические анкеты
  - почему сила без контроля бесполезна
  - почему слабость не является приговором
  - как перегруз тела влияет на энергию
  - почему студент должен знать свой рабочий предел
  hooks_if_played:
  - Киара может задать точный вопрос
  - Хару может бросить живую реплику
  - Райден может молчать, но его замечание попадёт точно
  - Ливия может устать от сухой теории и начать шептаться
academy_game_ribbons:
  name: Ленты
  required: false
  strongly_suggested_if_free_time_reaches_sport_area: true
  type: командная тренировочная игра
  time: после 15:00
  location: открытая площадка / тренировочный двор / зона с укрытиями
  rules:
  - У каждого участника на поясе/плече закреплена цветная лента.
  - Цель — снять ленты игроков другой команды и сохранить свои.
  - Грубые удары запрещены.
  - Толчки корпусом, блокировки, финты, рывки и обманные движения разрешены в пределах
    безопасности.
  - Энергию использовать нельзя или только на минимальном бытовом уровне по разрешению
    преподавателя.
  - Игра проверяет скорость, внимание, координацию, реакцию, чтение движения и командность.
  character_behavior:
    haru:
    - играет ярко, шумно, провоцирует
    - может рискнуть ради красивого момента
    - цепляется к Акире через азарт
    raiden:
    - играет экономно
    - не тратит лишние движения
    - видит траектории и ошибки
    - может раздражаться, если Акира снова играет ниже возможностей
    kiara:
    - играет аккуратно и социально
    - умеет выбирать момент
    - держится рядом с сильными игроками и использует это
    livia:
    - сначала может играть эмоцией и флиртом
    - может недооценить Мартена
    - может пытаться впечатлить Райдена и получить холодную реакцию
    marten_weiss:
    - играет спокойно и надёжно
    - может прикрыть Ливию или дать простой полезный совет
    - не требует благодарности
    akira:
    - полностью под контролем игрока
    - может играть пассивно, резко, красиво, скрытно, честно или отказаться
  player_control_rule:
  - По желанию сюжета игра желательна, но согласие Акиры остаётся выбором игрока.
  - Если игрок отказывается, не писать за Акиру участие.
  - Если игрок остаётся смотреть, игра может идти фоном и двигать NPC.
day_beats:
- beat_id: morning_preparation
  order: 1
  status: compressible
  character_ids:
  - akira
  - livia
  summary: Утро второго дня. Можно сыграть подготовку/дорогу/завтрак или сжать до
    начала физического блока.
- beat_id: physical_block_start_08_00
  order: 2
  status: required
  character_ids:
  - akira
  - livia
  - haru
  - raiden
  - kiara
  temporary_npcs:
  - marten_weiss
  summary: '08:00. Объясняют физический блок: это не экзамен и не рейтинг, а рабочий
    профиль тела. Киара обязательно рядом с Райденом и Хару. Старшекурсники помогают
    наблюдать.'
- beat_id: individual_observation_pairs
  order: 3
  status: available_during_physical_block
  character_ids:
  - akira
  - livia
  - raiden
  temporary_npcs:
  - marten_weiss
  summary: Райден может наблюдать Акиру и постепенно замечать несостыковки, если игрок
    выбирает скрываться. Мартен может быть мягким наблюдателем/крючком для Ливии.
- beat_id: debrief_or_short_lecture
  order: 4
  status: optional_or_compressible
  character_ids:
  - akira
  - livia
  - haru
  - raiden
  - kiara
  summary: Короткий разбор/лекция о физических анкетах, рабочем пределе и контроле.
    Можно сжать, если игрок не хочет сидеть на лекции.
- beat_id: after_15_free_time
  order: 5
  status: required_transition_after_blocks
  character_ids:
  - akira
  - livia
  summary: 'После 15:00 свободное время. NPC продолжают жить: Хару ищет повод, Райден
    наблюдает, Киара держится рядом, Ливия тянется к красивому хаосу.'
- beat_id: ribbons_game
  order: 6
  status: optional_but_strong_social_hook
  character_ids:
  - akira
  - livia
  - haru
  - raiden
  - kiara
  temporary_npcs:
  - marten_weiss
  summary: Командная игра «Ленты» после 15:00. Участие Акиры желательно для сюжета,
    но остаётся выбором игрока. Если она не участвует, можно оставить игру фоном.
do_not:
- Не делать физический блок публичным рейтингом.
- Не делить студентов на слабых и сильных при всех.
- Не заставлять Акиру раскрывать максимум без выбора игрока.
- Не делать Райдена всезнающим.
- Не делать так, что Райден сразу понял правду об Акире.
- Не делать Киару карикатурной стервой.
- Не делать Ливию дурой.
- Не делать Мартена слабаком, которого Ливия выбирает только из жалости.
- Не писать за Акиру согласие на игру, если игрок отказался.
- Не вводить Самуэля.
- Не вводить Кэйла Норта 16 августа без explicit override; день уже занят физическим
  блоком и Киарой.
- Не менять глобальные правила Академии из этого файла.
