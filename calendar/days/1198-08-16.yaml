date: '1198-08-16'
year: 1198
day_month: 16 августа
label: первые проверки / ориентация / возможный ввод Кэйла
calendar_role:
  type: checks_orientation_node
  rule:
  - День задаёт проверки, маршруты и первые выводы системы, но не сухой протокол.
  - Кэйл Норт может войти через проверочный/кураторский контекст, если сцена даёт естественный повод.
day_rhythm:
  morning_to_15: проверки, вводные блоки, маршруты, кураторские окна
  after_15: свободное время, столовая, двор, спортзона, общежитие
scene_characters:
  required_if_beat_reached:
  - akira
  conditional:
    kael_north: появляется через инструктора/куратора/проверку, не случайно
    haru_raiden_kir_livia: могут появляться после введения по месту и текущим отношениям
day_beats:
- beat_id: first_checks
  order: 1
  character_ids:
  - akira
  summary: Первичные проверки, маршруты, бытовая адаптация и первые выводы Академии.
- beat_id: kael_north_intro
  order: 2
  character_ids:
  - kael_north
  summary: Кэйл Норт может впервые войти в сюжет через академический, кураторский или проверочный контекст.
notes:
- Не делать день сухим списком проверок.
- Если уже сыгран сильный эпизод, можно сжать остаток дня до результата.
do_not:
- Не писать за Акиру намеренное действие, реплику, выбор маршрута или внутренний вывод.
- Не раскрывать hidden lore персонажам без сценического источника.
- Не раздувать день пустыми переходами.
