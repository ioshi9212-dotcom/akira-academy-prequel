date: '1198-09-01'
year: 1198
day_month: 1 сентября
label: начало обучения
calendar_role:
  type: lessons_start_regular_rhythm
  rule:
  - Начинается регулярное обучение.
  - Расписание даёт сцены и последствия, но не клетку.
  - Посещаемость и активность могут замечаться персоналом/студентами, но не превращаются в принуждение без причины.
day_rhythm:
  07_00_08_00: подъём, завтрак, сборы
  08_00_12_00: теория, вводные дисциплины, разбор энергии и безопасности
  '12_00_13_00': обед
  '13_00_15_00': практика, тренировки, стрельбище или группы
  '15_00_23_00': свободное время и социальные сцены
  '23_00': контроль общежития
day_beats:
- beat_id: lessons_start
  order: 1
  character_ids:
  - akira
  summary: 'Начинаются полноценные занятия: теория, тренировки, стрельбище, энергетическая практика.'
- beat_id: schedule_social_pressure
  order: 2
  character_ids:
  - akira
  summary: 'Регулярность создаёт последствия: кто ходит на блоки, кто пропускает, кто тренируется, кто делает выводы.'
notes:
- Распорядок становится регулярнее, но Академия не тюрьма.
- Главные персонажи могут появляться по расписанию, месту и текущим отношениям.
do_not:
- Не писать за Акиру намеренное действие, реплику, выбор маршрута или внутренний вывод.
- Не раскрывать hidden lore персонажам без сценического источника.
- Не раздувать день пустыми переходами.
- Не заставлять всех бесконечно тренироваться.
- Не наказывать за один отдых без причины.
