date: '1198-08-15'
year: 1198
day_month: 15 августа
start_phase: позднее утро
label: приезд Рэя / задний вход через спортплощадки / корт / регистрация / заселение
calendar_role:
  type: fixed_arrival_start_day
  rules:
  - Первая сцена дня начинается возле машины Рэя у зоны высадки Академии.
  - 'Стартовый приезд неизменный: Рэй привёз Акиру и Ливию.'
  - После стартового кадра игрок управляет Акирой.
  - Хару, Райден и корт не вводятся в первые строки у машины.
  - Хару и Райден становятся активными только когда зона корта/спортплощадок видима
    или достигнута.
route_logic:
  start_route:
  - arrival_dropoff
  - back_court_route
  - basketball_court
  - registration_area
  - dorm_block
  rules:
  - Задний вход ведёт через спортплощадки и корт.
  - Нет альтернативного обхода к регистрации на этом маршруте.
  - Если игрок просит регистрацию из зоны высадки, ближайший значимый переход всё
    равно идёт через back_court_route и basketball_court.
  - Регистрация начинается только после кортового beat или явного структурного перехода
    state.
scene_characters:
  active_at_start:
  - akira
  - livia
  temporary_start_only:
  - ray_temporary
  scheduled_for_court:
  - haru
  - raiden
  delayed_after_registration:
  - kir
arrival_inventory:
  visible:
  - тяжёлая спортивная сумка
  - дорожные вещи без раскрытого содержимого
  hidden_until_seen:
  - две гири по 10 кг
  - дополнительная тренировочная одежда
  - личные вещи
  rules:
  - NPC не знают содержимое сумки, пока не увидят его напрямую.
  - Райден у корта может заметить вес сумки по внешнему движению Акиры, но не знает
    содержимое.
  - Хару может использовать сумку как повод заговорить, если сцена уже дошла до корта.
uniform_info:
  academy_female_basic_set:
  - чёрная рубашка
  - бордовый пиджак с эмблемой Академии
  - бордовая юбка
  rules:
  - На старте форма не надета.
  - Полученная форма не считается надетой без действия игрока или state.
  - Тема юбки может всплыть только когда форма выдана или обсуждается.
livia_context:
  court_reaction:
  - Ливия не становится скучным проводником к регистрации, если перед ней появился
    социальный крючок.
  - У корта она замечает контраст рыжего шумного парня и тёмного высокого рядом.
  - Она может помнить школьную игру Акиры в баскетбол, но не знает скрытый лор.
  kir_awareness:
  - Ливия знает Кира как старого знакомого.
  - Ливия не знает историю с деревом, грозой и котом, пока ей не скажут.
day_beats:
- beat_id: fixed_car_arrival_with_ray
  order: 1
  status: fixed_start
  location_id: arrival_dropoff
  character_ids:
  - akira
  - livia
  temporary_npcs:
  - ray_temporary
  summary: Рэй привозит Акиру и Ливию. Сумка заметно тяжёлая. Рэй остаётся временным
    стартовым NPC и уезжает после передачи.
  stop_logic: После стартового кадра ждать player input.
- beat_id: entrance_transition
  order: 2
  status: required_route
  location_id: back_court_route
  character_ids:
  - akira
  - livia
  summary: Акира и Ливия идут по заднему маршруту. Спортплощадки становятся ближе,
    но Хару и Райден не дают meaningful-реплик до видимого кортового beat.
  progress_logic: Если игрок двигается к регистрации, сжать переход до видимой зоны
    корта.
- beat_id: court_visible_entry
  order: 3
  status: required_before_registration
  location_id: basketball_court
  character_ids:
  - akira
  - livia
  - haru
  - raiden
  summary: У корта Хару и Райден уже рядом. Хару — рыжий шумный курсант с мячом. Райден
    — очень высокий тёмноволосый курсант рядом с ним.
  required_visible_facts:
  - Хару и Райден оба видимы, если показан кортовый контакт.
  - Райден рядом с Хару и не исчезает из сцены.
  - Ливия замечает контраст между ними и реагирует по своему голосу.
  - Акира не знает их имён без сценического источника.
  forbidden:
  - не называть Хару беловолосым
  - не оставлять Райдена невидимым, если Хару уже показан у корта
  - не вести Акиру сразу к регистрации без кадра корта
- beat_id: court_ball_hook
  order: 4
  status: meaningful_hook
  location_id: basketball_court
  character_ids:
  - akira
  - livia
  - haru
  - raiden
  summary: Мяч создаёт повод для контакта. Хару ведёт сцену живо и провокационно;
    Райден остаётся сухим, наблюдательным и коротким.
  stop_logic: Остановиться, если мяч/реплика/взгляд требует реакции Акиры.
- beat_id: registration
  order: 5
  status: required_after_court
  location_id: registration_area
  character_ids:
  - akira
  - livia
  summary: 'Короткая процедура регистрации после прохода через корт: документы, подтверждение
    прибытия, базовое направление дальше.'
  progress_logic: Рутинную очередь и формальности сжимать до результата или значимого
    вопроса персонала.
- beat_id: dorm_assignment
  order: 6
  status: required_after_registration
  location_id: dorm_block
  character_ids:
  - akira
  - livia
  summary: Акира и Ливия получают направление в общежитие и переходят к заселению.
  progress_logic: Не раздувать бытовую дорогу без социального крючка или вопроса.
- beat_id: kir_late_arrival_on_floor
  order: 7
  status: delayed_after_settlement_route
  location_id: dorm_block
  character_ids:
  - akira
  - livia
  - kir
  summary: Кир появляется на этаже заселения как опоздавший старый знакомый. Ливия
    может заметить странность его поведения.
  knowledge_boundary: Ливия не знает скрытую историю с котом/деревом без сценического
    источника.
- beat_id: medical_check
  order: 8
  status: scheduled_after_settlement
  location_id: medblock
  character_ids:
  - akira
  summary: Обязательный базовый медосмотр и минимальная проверка отклика. Подробности
    брать из medblock/location and state only when this beat reached.
  knowledge_boundary: Врач не знает дату ссадины и скрытую природу Акиры без видимого
    источника.
- beat_id: orientation_or_free_time
  order: 9
  status: available_after_required_procedures
  location_id: null
  character_ids:
  - akira
  - livia
  summary: После обязательных процедур появляется свободное время или короткий инструктаж
    по правилам и маршрутам.
  progress_logic: Не делать длинную лекцию без причины.
do_not:
- Не начинать день сразу у корта.
- Не делать мяч первым кадром дня.
- Не делать Райдена главным активным крючком до кортового beat.
- Не оставлять Райдена невидимым, когда Хару уже показан у корта.
- Не вести Акиру и Ливию к регистрации мимо корта.
- Не писать за Акиру намеренные решения после fixed opening.
- Не раскрывать hidden lore без сценического источника.
- Не делать Кира присутствующим на старте у машины.
- Не оставлять Рэя в Академии после стартовой передачи.
- Не вводить Самуэля и Каэла Норта 15 августа без отдельного state/calendar разрешения.
