date: '1198-08-15'
year: 1198
day_month: 15 августа
start_phase: позднее утро
label: приезд Рэя / задний вход через спортплощадки / Хару и Райден у корта / регистрация / заселение / Кир / медосмотр

calendar_role:
  type: fixed_arrival_start_day
  rule:
    - Первая сцена дня начинается возле машины Рэя у входа/подъезда к территории Академии.
    - Стартовый приезд неизменный: Рэй привёз Акиру и Ливию; игрок не выбирает способ прибытия.
    - Короткий диалог у машины можно писать как установленный стартовый кадр до первого выбора игрока.
    - После стартового кадра игрок управляет реакциями Акиры, репликами, вниманием и действиями.
    - Хару, Райден и корт не вводятся в первые строки сцены у машины.
    - Когда Акира и Ливия доходят до зоны корта/спортплощадок, Хару и Райден уже находятся там и становятся активными персонажами сцены.

route_logic:
  academy_entrance:
    rule:
      - Акира и Ливия входят через задний вход.
      - Задний вход ведёт только через спортплощадки/зону корта.
      - 'Нет выбора «налево/направо» и нет альтернативного обхода: чтобы попасть дальше к регистрации, они проходят через корт/спортплощадки.'
      - Если игрок пишет «пойти на регистрацию», маршрут всё равно проходит через спортплощадки и корт как обязательный промежуточный кадр.
      - Регистрация начинается только после прохода через кортовый beat или после явного сжатия этого прохода в тексте.

scene_general_info:
  summary:
    - Рэй привозит Акиру и Ливию к Академии на машине.
    - Акира выходит с тяжёлой спортивной сумкой.
    - Ливия выходит рядом, быстро оживает, осматривает территорию и не упускает случая прокомментировать Рея.
    - Рэй остаётся только в стартовом прибытии и после передачи девушек уезжает.
    - После машины маршрут идёт к заднему входу; этот вход ведёт через спортплощадки и корт.
    - 'У корта Хару и Райден уже находятся рядом: Хару активный/шумный с мячом, Райден рядом с ним более тихий и наблюдательный.'
  player_freedom_after_opening:
    - ответить Рэю или Ливии
    - взять сумку молча
    - проверить документы/телефон
    - осмотреть территорию Академии
    - заметить поток студентов, указатели, шум, вход, охрану/персонал или звук мяча
    - идти дальше к заднему входу и спортплощадкам
  world_pressure_if_player_hesitates:
    - Ливия может заполнить паузу живым комментарием.
    - Рэй может коротко напомнить о документах, сумке или времени.
    - Поток студентов и персонал вокруг движутся, Академия не стоит на паузе.

fixed_opening:
  location: подъезд к территории Академии / вход перед задним маршрутом
  active_visible_people:
    - akira
    - livia
    - ray_temporary
  temporary_ray_profile:
    status: temporary_start_only; no character file required
    role: старший брат / семейная опора Акиры; привозит Акиру и Ливию в Академию
    personality:
      - сдержанный
      - собранный
      - заботится через контроль и сухие замечания
      - не сюсюкает
      - может коротко поддеть Акиру
      - не устраивает драматичное прощание
    speech:
      - коротко
      - спокойно
      - с лёгким старше-братским контролем
    exit_rule:
      - после стартового прибытия Рэй уезжает
      - Рэй не становится активным персонажем Академии
      - не возвращать Рея в академические сцены без отдельного override
  required_micro_dialogue:
    ray_can_ask: Что ты туда положила?
    akira_default_answer: Минимальный спортивный инвентарь.
    rule: Эту короткую реплику Акиры можно использовать как установленную часть стартового кадра; дальше выбор игрока возвращается полностью.
  livia_opening_behavior:
    rule:
      - Ливия может поддеть Акиру из-за Рэя и семейной доставки.
      - Это не серьёзная симпатия и не романтическая линия.
      - Не делать Ливию пошлой, глупой или карикатурной.

arrival_inventory:
  visible:
    - тяжёлая спортивная сумка
    - телефон
    - деньги
    - документы для регистрации
    - личные принадлежности
    - сменная одежда
    - обувь/ботинки
    - минимальный набор для учёбы и быта
  hidden_or_not_obvious_until_checked:
    - две гири по 10 кг
    - дополнительная тренировочная одежда
    - мелкие личные вещи
  rules:
    - Сумка реально тяжёлая.
    - NPC не знают содержимое сумки, пока не увидят его напрямую.
    - Райден у корта может заметить вес сумки по тому, как Акира её несёт, но не знает, что внутри.
    - Хару позже может догнать Акиру и предложить понести сумку как повод заговорить.

uniform_info:
  academy_female_basic_set:
    - чёрная рубашка
    - бордовый пиджак с эмблемой Академии
    - бордовая юбка
  rules:
    - Базовый женский комплект — именно юбка, не юбка-шорты.
    - Акира не носит юбки уже год.
    - Ливия знает, что Акира не носит юбки уже год, и помнит причину.
    - 'Причина: Ливия уговорила Акиру надеть юбку на встречу с Каем, потому что искренне считала, что Акире это идёт.'
    - После случая с Каем их сняли, и в чате шутили «Картер что девушка?»
    - Эта тема может всплывать позже через форму Академии, но не должна принудительно раскрываться в первых строках.

livia_context:
  court_reaction:
    - Когда Ливия видит у корта рыжего шумного парня и тёмного высокого рядом с ним, её внимание резко переключается на них.
    - Ливия не должна механически толкать Акиру к регистрации, если перед ней появился интересный социальный объект.
    - Ливия скорее отвлечётся, прокомментирует, оценит, захочет посмотреть или зацепить реакцию, чем скучно поведёт Акиру к стойке.
    - Она может помнить, что за последний год с Акирой почти никто не играл.
  akira_basketball_memory_livia_knows:
    - 'Ливия знает стиль игры Акиры: резкий, неприятно точный, с постоянными победами.'
    - Ливия помнит, что перед тем как Акира вступала на площадку, площадку часто освобождали и оставляли её одну с мячом.
    - Ливия помнит случай с Каем и может из-за этого напрячься или начать комментировать мягче/острее.
    - Ливия не знает скрытый лор и не знает сцену с Киром, котом и деревом, пока ей кто-то не расскажет.

kir_memory_hook:
  known_to_livia_at_start:
    - Ливия знает Кира как старого знакомого из связки Акира–Ливия–Кир.
    - Ливия не знает подробность про дерево, грозу, кота и первую неловкость Акиры с Киром.
  hidden_until_revealed:
    tree_cat_rain_scene:
      - Когда Акира вытаскивала кота с дерева, кот поцарапал её за щеку.
      - Была гроза и ливень.
      - Ливия убежала за пластырем.
      - В это время Акира стояла на ветке дерева, мокрая, злая, с длинными белыми волосами.
      - Кот спрыгнул к Киру, Кир его отпустил.
      - Потом Кир снял Акиру с дерева.
      - Это была первая неловкость между Акирой и Киром.
      - Ливия может узнать это только если ей скажут или если сцена сама даст внешний повод для расспроса.
  use_later:
    - Когда Кир появляется на этаже заселения, Ливия может заметить, что он ведёт себя странно.
    - Ливия может начать допрашивать, если увидит неловкость между Акирой и Киром.

scene_characters:
  active_at_start:
    akira:
      role: player_character
      control_rule: after fixed opening, player controls actions, speech, route and inner conclusions
    livia:
      role: old_friend
      scene_goal:
        - разрядить напряжение
        - тащить Акиру в живую Академию
        - флиртовать и шуметь по характеру
        - поддеть Акиру из-за Рэя
        - заметить интересных людей у корта и не дать сцене стать скучной регистрацией
    ray_temporary:
      role: temporary_start_only
      load_rule: use inline profile from fixed_opening; do not require character file
  scheduled_or_nearby:
    haru:
      load_when: when court/sports площадка becomes visible or reached
      scene_goal:
        - быть у корта рядом с Райденом
        - заметить новеньких
        - намеренно сделать так, чтобы мяч отскочил к Акире/Ливии или оказался рядом как повод
        - позже догнать Акиру и предложить понести сумку
    raiden:
      load_when: with Haru when court/sports площадка becomes visible or reached
      rule:
        - находится рядом с Хару у корта
        - может молчать или сухо прокомментировать Хару
        - не обязан сразу подходить к Акире
        - не знает Акиру лично
        - не знает hidden lore
        - замечает тяжесть сумки как внешнюю деталь
    kir:
      load_when: floor_settlement_after_registration
      rule:
        - старый знакомый Акиры и Ливии
        - не стоит у машины и не приходит вместе с ними на старт
        - появляется на этаже заселения как опоздавший крючок
        - Ливия может заметить странность его поведения

day_beats:
  - beat_id: fixed_car_arrival_with_ray
    order: 1
    status: fixed_start_no_player_choice_until_micro_dialogue_ends
    character_ids:
      - akira
      - livia
    temporary_npcs:
      - ray_temporary
    summary: Рэй привозит Акиру и Ливию. Диалог про тяжёлую сумку и «минимальный спортивный инвентарь». Ливия поддевает Акиру из-за Рэя.

  - beat_id: entrance_transition
    order: 2
    status: required_route_to_back_entrance
    character_ids:
      - akira
      - livia
    summary: 'Акира и Ливия идут к заднему входу. Маршрут не ветвится: чтобы попасть дальше к регистрации, нужно пройти через спортплощадки и корт.'
    minor_hooks_allowed:
      - фоновые NPC замечают тяжёлую сумку
      - кто-то оценивает новеньких взглядом
      - слышен мяч со стороны спортплощадок
      - Ливия ловит звук/движение и начинает отвлекаться

  - beat_id: court_visible_entry
    order: 3
    status: required_before_registration
    character_ids:
      - akira
      - livia
      - haru
      - raiden
    summary: У спортплощадок Хару и Райден уже рядом. Хару заметный, рыжий, шумный, с мячом. Райден рядом с ним — высокий, тёмный, более тихий. Ливия обращает на них внимание и уже не ведёт Акиру механически к регистрации.
    required_visible_facts:
      - задний вход ведёт через корт
      - Хару и Райден уже там
      - Райден находится рядом с Хару
      - Райден может заметить тяжесть сумки Акиры
      - Ливия замечает рыжего и тёмного и переключается на них
      - Ливия может вспомнить, что за последний год с Акирой почти никто не играл
      - Ливия может помнить стиль игры Акиры, постоянные победы и случай с Каем
    forbidden:
      - не вести Акиру сразу к регистрации без кадра корта
      - не делать вид, что у входа есть другой обход
      - не оставлять Райдена невидимым, если Хару уже показан у корта

  - beat_id: court_ball_hook
    order: 4
    status: required_court_interaction_hook
    character_ids:
      - akira
      - livia
      - haru
      - raiden
    summary: Хару создаёт повод через мяч. Акира сама выбирает, что делать с мячом. Райден рядом с Хару, может молчать, наблюдать или сухо реагировать. Его не надо сразу делать главным крючком, но он не должен исчезать.
    player_choice:
      - взять мяч
      - пнуть/отбить
      - проигнорировать
      - посмотреть на Хару и Райдена
      - ответить Ливии
      - сказать что-то
      - пройти дальше через корт к регистрации

  - beat_id: optional_haru_later_bag_offer
    order: 5
    status: optional_after_court_hook
    character_ids:
      - haru
      - raiden
    summary: Если Акира и Ливия уходят дальше, Хару позже может догнать и предложить понести сумку. Это повод заговорить, не обязательная помощь и не знание содержимого сумки.

  - beat_id: registration
    order: 6
    status: required_after_court_path
    character_ids:
      - akira
      - livia
    summary: 'Короткая регистрация после прохода через спортплощадки: документы, подтверждение прибытия, базовая информация, направление в общежитие. Не раздувать бюрократию.'

  - beat_id: dorm_assignment
    order: 7
    status: required_after_registration
    character_ids:
      - akira
      - livia
    summary: Акира и Ливия идут заселяться. Получают комнату/место/информацию по общежитию. Кир ещё не с ними на старте.

  - beat_id: kir_late_arrival_on_floor
    order: 8
    status: delayed_on_settlement_floor
    character_ids:
      - akira
      - livia
      - kir
    summary: Кир появляется на этаже заселения как опоздавший старый знакомый. Ливия может заметить, что он ведёт себя странно, особенно если между ним и Акирой появляется неловкость.
    livia_allowed_reaction:
      - заметить странность Кира
      - начать расспрашивать
      - не знать историю с котом/деревом без объяснения

  - beat_id: medical_check
    order: 9
    status: required_or_scheduled_after_settlement
    character_ids:
      - akira
    summary: 'Обязательный медосмотр: базовое состояние, вопросы, осмотр, минимальный отклик. Момент с пластырем/зажившей царапиной зависит от выбора игрока.'
    scratch_detail:
      truth:
        - царапина у Акиры уже зажила
        - 'скрытая причина: высокая регенерация из-за природы Акиры'
        - это не норма мира; сильный носитель энергии не получает автоматическую быструю регенерацию
      visible_to_doctor:
        - врач может увидеть пластырь, если он заметен или Акира показывает его
        - врач может увидеть зажившее место, если пластырь снят
        - врач не знает, что царапина была вчера, без слов Акиры/Ливии/Кира
      doctor_allowed_questions:
        - Когда была царапина?
        - Это свежее?
        - Почему пластырь ещё на месте?
      doctor_forbidden:
        - не говорить, что царапина была вчера, если это не раскрыто сценой
        - не делать мгновенное подозрение о скрытой природе Акиры
        - не поднимать тревогу с первой секунды
      player_choice:
        - показать пластырь
        - снять пластырь
        - оставить пластырь
        - ответить честно
        - отшутиться
        - сказать неполную правду

  - beat_id: minimal_energy_response
    order: 10
    status: required_minimal_check
    character_ids:
      - akira
    summary: Проверка минимального отклика энергии как обычная процедура для поступивших. Она не раскрывает истинную природу Акиры.
    rule:
      - не раскрывать кайросов
      - не раскрывать скрытую природу Акиры
      - результат может быть странным/слабым/неровным, но без прямого вывода hidden lore

  - beat_id: short_orientation
    order: 11
    status: available_after_required_procedures
    character_ids:
      - akira
      - livia
    summary: 'Короткий общий инструктаж: правила, распорядок, общежитие, столовая, тренировочные зоны, аудитории. Не делать длинную лекцию.'

  - beat_id: free_time
    order: 12
    status: available_after_orientation_or_day_compression
    character_ids:
      - akira
      - livia
    summary: 'После обязательных процедур появляется свободное время: комната, столовая, двор, корт, разговор с Ливией, поиск Кира, разбор вещей.'

do_not:
  - Не начинать сцену сразу у корта.
  - Не начинать сцену сразу с Хару.
  - Не делать мяч первым кадром дня.
  - Не делать Райдена главным активным крючком с первой сцены.
  - Не оставлять Райдена невидимым, когда Хару уже показан у корта.
  - 'Не вести Акиру и Ливию к регистрации мимо корта: задний вход ведёт через спортплощадки.'
  - Не писать за Акиру намеренные действия после fixed_opening.
  - Не раскрывать hidden lore персонажам без сценического источника.
  - Не делать врача экстрасенсом по царапине.
  - Не писать, что врач знает про вчерашнюю царапину.
  - Не делать Кира уже присутствующим с Акирой и Ливией на старте.
  - Не оставлять Рея в Академии после стартовой сцены.
  - Не вводить Самуэля.
  - Не вводить Кэйла Норта 15 августа.
  - Не превращать регистрацию/инструктаж в длинную сухую бюрократию.
