date: '1198-08-15'
year: 1198
day_month: 15 августа
start_phase: позднее утро
label: приезд на машине Рэя / вход в Академию / Хару с мячом / регистрация / заселение / медосмотр
calendar_role:
  type: fixed_arrival_start_day
  rule:
  - Первая сцена дня начинается не у корта, а возле машины Рэя у входа/подъезда к территории Академии.
  - 'Стартовый приезд неизменный: Рэй привёз Акиру и Ливию; игрок не выбирает способ прибытия.'
  - Короткий диалог у машины можно писать как установленный стартовый кадр до первого выбора игрока.
  - После стартового кадра игрок управляет реакциями Акиры, репликами, маршрутом внимания и действиями.
  - Не вводить Хару, Райдена и корт в первые строки сцены.
scene_general_info:
  summary:
  - Рэй привозит Акиру и Ливию к Академии на машине.
  - Машина останавливается у входа/подъезда к территории, откуда дальше можно пройти к заднему маршруту и к зоне корта.
  - Акира выходит с тяжёлой спортивной сумкой.
  - Ливия выходит рядом, быстро оживает, осматривает территорию и не упускает случая прокомментировать Рея.
  - Рэй остаётся только в стартовом прибытии и после передачи девушек уезжает.
  - Переход к корту должен быть после входа и нескольких живых деталей территории, а не первым кадром.
  player_freedom_after_opening:
  - ответить Рэю или Ливии
  - взять сумку молча
  - проверить документы/телефон
  - осмотреть территорию Академии
  - заметить поток студентов, указатели, шум, вход, охрану/персонал или задний маршрут
  - не делать лишних реплик и идти дальше
  world_pressure_if_player_hesitates:
  - Ливия может заполнить паузу живым комментарием.
  - Рэй может коротко напомнить о документах, сумке или времени.
  - Поток студентов и персонал вокруг движутся, Академия не стоит на паузе.
fixed_opening:
  location: подъезд к территории Академии / вход перед задним маршрутом
  active_visible_people:
  - akira
  - livia
  - ray_temporary
  temporary_ray_profile:
    status: temporary_start_only; no character file required
    role: старший брат / семейная опора Акиры; привозит Акиру и Ливию в Академию
    personality:
    - сдержанный
    - собранный
    - заботится через контроль и сухие замечания
    - не сюсюкает
    - может коротко поддеть Акиру
    - не устраивает драматичное прощание
    speech:
    - коротко
    - спокойно
    - с лёгким старше-братским контролем
    exit_rule:
    - после стартового прибытия Рэй уезжает
    - Рэй не становится активным персонажем Академии
    - не возвращать Рея в академические сцены без отдельного override
  required_micro_dialogue:
    ray_can_ask: Что ты туда положила?
    akira_default_answer: Минимальный спортивный инвентарь.
    rule: Эту короткую реплику Акиры можно использовать как установленную часть стартового кадра; дальше выбор игрока возвращается
      полностью.
  livia_opening_behavior:
    rule:
    - 'Ливия замечает Рея и реагирует в своём стиле: живо, игриво, с лёгким флиртом.'
    - Это не серьёзная симпатия и не романтическая линия.
    - Ливия может поддеть Акиру фразой про брата/семейную доставку/взгляд Рея.
    - Не делать Ливию пошлой, глупой или карикатурной.
    possible_tone:
    - Ты могла предупредить, что семейная доставка такая эффектная.
    - У тебя брат всегда смотрит так, будто уже знает, кто тут будет проблемой?
    - Ну конечно. У кого-то брат — почти отдельный вступительный бонус.
arrival_inventory:
  visible:
  - тяжёлая спортивная сумка
  - телефон
  - деньги
  - документы для регистрации
  - личные принадлежности
  - сменная одежда
  - обувь/ботинки
  - минимальный набор для учёбы и быта
  hidden_or_not_obvious_until_checked:
  - две гири по 10 кг
  - дополнительная тренировочная одежда
  - мелкие личные вещи
  rules:
  - Сумка реально тяжёлая.
  - NPC не знают содержимое сумки, пока не увидят его напрямую.
  - Райден позже может заметить вес по тому, как Акира несёт сумку, но не знает, что внутри.
scene_characters:
  active_at_start:
    akira:
      role: player_character
      control_rule: after fixed opening, player controls actions, speech, route and inner conclusions
    livia:
      role: old_friend
      scene_goal:
      - разрядить напряжение
      - тащить Акиру в живую Академию
      - флиртовать и шуметь по характеру
      - поддеть Акиру из-за Рея
    ray_temporary:
      role: temporary_start_only
      load_rule: use inline profile from fixed_opening; do not require character file
  scheduled_or_nearby:
    haru:
      load_when: after entrance transition, when court/basketball zone becomes visible or reached
      scene_goal:
      - заметить новеньких
      - намеренно сделать так, чтобы мяч отскочил к Акире/Ливии
      - создать повод подойти будто случайно
    raiden:
      load_when: background near Haru after court zone is reached or if scene gives reason
      rule:
      - может молчать или сухо прокомментировать Хару
      - не обязан сразу подходить к Акире
      - не знает Акиру лично
      - не знает hidden lore
      - может заметить тяжесть сумки как внешнюю деталь
    kir:
      load_when: late_arrival_after_registration_or_settlement
      rule:
      - старый знакомый Акиры и Ливии
      - не стоит у машины и не приходит вместе с ними на старт
      - появляется отдельным крючком позже
day_beats:
- beat_id: fixed_car_arrival_with_ray
  order: 1
  status: fixed_start_no_player_choice_until_micro_dialogue_ends
  character_ids:
  - akira
  - livia
  temporary_npcs:
  - ray_temporary
  summary: Рэй привозит Акиру и Ливию. Диалог про тяжёлую сумку и «минимальный спортивный инвентарь». Ливия поддевает Акиру
    из-за Рея.
- beat_id: entrance_transition
  order: 2
  status: first_player_choice_window
  character_ids:
  - akira
  - livia
  summary: Акира и Ливия идут к входу/заднему маршруту. Показать территорию, поток студентов, указатели, живой фон и мягкий
    выбор реакции.
  minor_hooks_allowed:
  - фоновые NPC замечают тяжёлую сумку
  - кто-то оценивает новеньких взглядом
  - короткая бытовая фраза про регистрацию или задний вход
- beat_id: court_ball_hook
  order: 3
  status: required_after_entrance_transition
  character_ids:
  - haru
  - raiden
  summary: У зоны корта Хару намеренно отправляет мяч так, чтобы он отскочил рядом с Акирой. Акира сама выбирает, что делать
    с мячом. Райден рядом с Хару фоном/комментарием.
  player_choice:
  - взять мяч
  - пнуть/отбить
  - проигнорировать
  - посмотреть на Хару
  - ответить Ливии
  - сказать что-то
  - пройти дальше
- beat_id: optional_haru_pov_after_ball
  order: 4
  status: only_if_player_selects_haru_pov
  character_ids:
  - haru
  - raiden
  summary: 'Если выбран POV Хару после ухода Акиры и Ливии, можно показать короткий разговор Хару и Райдена: Райден невзначай
    замечает тяжесть сумки, Хару цепляется за повод подойти позже.'
  visibility_rule: Если POV Хару не выбран, эту сцену не показывать игроку.
- beat_id: registration
  order: 5
  status: required_after_court_or_if_player_goes_directly
  character_ids:
  - akira
  - livia
  summary: 'Короткая регистрация: документы, подтверждение прибытия, базовая информация, направление в общежитие. Не раздувать
    бюрократию.'
- beat_id: dorm_assignment
  order: 6
  status: required_after_registration
  character_ids:
  - akira
  - livia
  summary: Акира и Ливия идут заселяться. Получают комнату/место/информацию по общежитию. Кир ещё не с ними на старте.
- beat_id: kir_late_arrival
  order: 7
  status: delayed_after_registration_or_settlement
  character_ids:
  - kir
  summary: Кир появляется позже как опоздавший старый знакомый, не как новый знакомый и не как спутник у машины.
- beat_id: medical_check
  order: 8
  status: required_or_scheduled_after_settlement
  character_ids:
  - akira
  summary: 'Обязательный медосмотр: базовое состояние, вопросы, осмотр, минимальный отклик. Момент с пластырем/зажившей царапиной
    зависит от выбора игрока.'
  scratch_detail:
    truth:
    - царапина у Акиры уже зажила
    - 'скрытая причина: высокая регенерация из-за природы Акиры'
    - это не норма мира; сильный носитель энергии не получает автоматическую быструю регенерацию
    visible_to_doctor:
    - врач может увидеть пластырь, если он заметен или Акира показывает его
    - врач может увидеть зажившее место, если пластырь снят
    - врач не знает, что царапина была вчера, без слов Акиры/Ливии/Кира
    doctor_allowed_questions:
    - Когда была царапина?
    - Это свежее?
    - Почему пластырь ещё на месте?
    doctor_forbidden:
    - не говорить, что царапина была вчера, если это не раскрыто сценой
    - не делать мгновенное подозрение о скрытой природе Акиры
    - не поднимать тревогу с первой секунды
    player_choice:
    - показать пластырь
    - снять пластырь
    - оставить пластырь
    - ответить честно
    - отшутиться
    - сказать неполную правду
- beat_id: minimal_energy_response
  order: 9
  status: required_minimal_check
  character_ids:
  - akira
  summary: Проверка минимального отклика энергии как обычная процедура для поступивших. Она не раскрывает истинную природу
    Акиры.
  rule:
  - не раскрывать кайросов
  - не раскрывать скрытую природу Акиры
  - результат может быть странным/слабым/неровным, но без прямого вывода hidden lore
- beat_id: short_orientation
  order: 10
  status: available_after_required_procedures
  character_ids:
  - akira
  - livia
  summary: 'Короткий общий инструктаж: правила, распорядок, общежитие, столовая, тренировочные зоны, аудитории. Не делать
    длинную лекцию.'
- beat_id: free_time
  order: 11
  status: available_after_orientation_or_day_compression
  character_ids:
  - akira
  - livia
  summary: 'После обязательных процедур появляется свободное время: комната, столовая, двор, корт, разговор с Ливией, поиск
    Кира, разбор вещей.'
do_not:
- Не начинать сцену сразу у корта.
- Не начинать сцену сразу с Хару.
- Не делать мяч первым кадром дня.
- Не делать Райдена главным активным крючком с первой сцены.
- Не писать за Акиру намеренные действия после fixed_opening.
- Не раскрывать hidden lore персонажам без сценического источника.
- Не делать врача экстрасенсом по царапине.
- Не писать, что врач знает про вчерашнюю царапину.
- Не делать Кира уже присутствующим с Акирой и Ливией на старте.
- Не оставлять Рея в Академии после стартовой сцены.
- Не вводить Самуэля.
- Не вводить Кэйла Норта 15 августа.
- Не превращать регистрацию/инструктаж в длинную сухую бюрократию.
