character_appearance_rules:
  haru:
    first_window: 1198-08-15 после прибытия, когда Акира и Ливия проходят мимо корта
    mode: direct hook through intentionally bounced ball; not first frame of the day
  raiden:
    first_window: 1198-08-15 background near Haru / court area; 1198-08-16 active senior observer during physical block
    direct_contact_rule: 'direct contact with Akira needs visible reason: ball, Haru hook, shared block, observer role, player
      action or scene escalation'
    do_not: do not force romance, instant recognition or hidden-lore knowledge; use attention, irritation, silence and observation
      as подтекст
  kir:
    first_window: 1198-08-15 later than Akira and Livia, after registration/settlement timing
    mode: old friend, not new acquaintance and not present at car arrival
  kiara:
    first_window: 1198-08-16 physical block near Raiden and Haru
    mode: status figure/social rival; confident, not villain and not copy of Livia
  kael_north:
    first_window: 1198-08-17 or later checks/instructors/orientation context unless explicit override
    mode: academic/curator pressure, not random dramatic entrance
  samuel:
    first_window: 1198-08-31 only
    mode: strong pressure node; do not introduce earlier without explicit override
