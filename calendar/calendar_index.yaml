character_appearance_rules:
  haru:
    first_window: 1198-08-15 back court / basketball area
    mode: can be direct because scene starts near his social zone
  raiden:
    first_window: 1198-08-15 background near Haru / court area
    direct_contact_rule: 'direct contact with Akira needs visible reason: collision, ball, Livia/Haru hook, shared route,
      or player action'
    do_not: do not force romance or instant recognition; use irritation, attention or silence as подтекст
  kir:
    first_window: 1198-08-15 later than Akira and Livia
    mode: old friend, not new acquaintance and not constant attachment
  kiara:
    first_window: stronger after 1198-08-23; may appear earlier as background if social scene gives reason
    mode: social rival/status figure, not villain and not copy of Livia
  kael_north:
    first_window: 1198-08-16/17 checks, instructors, orientation or observation
    mode: academic/curator pressure, not random dramatic entrance
  samuel:
    first_window: 1198-08-31 only
    mode: strong pressure node; do not introduce earlier without explicit override
