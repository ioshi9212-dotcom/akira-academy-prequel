source_policy:
  runtime_source: project_files_only
  rules:
  - Календарь опирается только на файлы проекта, current_state, calendar_runtime и ввод игрока.
  - Материалы вне загруженных файлов и current_state не являются знанием движка.
  - Календарь не задаёт действие, реплики, маршрут или внутренние выводы Акиры; Акирой управляет игрок.
  - Календарь задаёт состояние мира, окна событий, давление, цели NPC, последствия, социальный фон и ссылки на файлы.
  - Скрытый лор используется только как авторская логика подтекста; персонажи не знают его без сценического источника.
loading_policy:
  normal_play:
  - Всегда брать current_date из state/current_state.json или state/calendar_runtime.json.
  - Для активной сцены грузить calendar/calendar_index.yaml, story_spine_1198 как общий обзор и только файл текущего дня.
  - Будущие day-файлы не грузить в обычную сцену.
  timeskip_or_calendar_audit:
  - Можно смотреть следующие даты только при явном таймскипе, переходе даты или проверке календаря.
  - Свободные промежутки между датами можно играть подробно, сжать итогом или пропустить по рутине игрока.
pace_policy:
  academy_day_rhythm:
  - Академия не тюрьма.
  - До 15:00 обычно идут проверки, вводные занятия, тренировки, кураторские блоки или обязательные окна.
  - 'После 15:00 свободное время: столовая, двор, спортзона, библиотека, общежитие, прогулки, разговоры, добровольные тренировки.'
  - 'После 23:00 общежитие контролируется: поздний вход или отсутствие фиксируются и могут иметь последствия.'
  - Не дробить день на каждый шаг, воду, переодевание и переход, если это не создаёт сцену.
  scene_goal:
  - Каждая сцена должна двигать отношения, конфликт, репутацию, обучение, слухи, способности, систему Академии или будущий
    канон.
  - Если сцена ничего не двигает, её нужно сжать и перейти к meaningful beat.
