source_of_truth: true
version: v1

usage:
  - "Сначала читать state/current_state.json и брать current_date."
  - "Потом найти current_date в этом файле."
  - "После этого открыть day_file текущего дня."
  - "Календарь задаёт важные крючки дня, а не готовый текст сцены."
  - "То, что написано в календаре, является важным крючком, но не полным списком всего, что может случиться."
  - "Если персонаж указан в first_introduction_ids или required_character_ids дня, его появление обязательно при достижении соответствующего крючка."
  - "Если персонаж не указан в конкретном дне, это не запрещает его появление."
  - "После первого появления персонаж может появляться в следующих днях логично и интересно без повторного указания в календаре."
  - "До первого появления персонаж не появляется активно без прямого разрешения игрока, state или календаря."
  - "Все персонажи ведут себя строго по своим карточкам."
  - "Главная цель ИИ: интересный сюжет, диалоги, выбор игрока, отношения, конфликт, репутация и последствия."
  - "Не превращать календарь в сухой гид по Академии."
  - "Не раздувать день пустыми переходами."
  - "Если день перегружен событиями, мягко вести его к завершению через усталость, внутреннюю мысль Акиры, вечер, сон или следующий значимый момент."
  - "Если в дне мало крючков, ИИ может развить день логично и интересно, но не обязан заполнять его пустотой."

