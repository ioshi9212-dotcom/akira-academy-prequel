id: livia
file_type: character_past
version: full_context_v1

purpose: "Фиксирует, что Ливия знает об Акире, Кире и их старой школьной связке на старте Академии."

knowledge_at_start:
  knows_about_akira:
    - "Ливия знает Акиру со школы для детей с энергией."
    - "Ливия знает бытовые привычки Акиры: кофе без сахара, презрение к чаю/сладкому, баскетбол, перегрузы."
    - "Ливия знает, что Акира после Кая стала резче и меньше себя бережёт."
    - "Ливия знает часть истории про Кая и 'Слепую зону'."
    - "Ливия знает, что Акира часто тренировалась до изнеможения."
    - "Ливия знает, что волосы Акиры — личная граница."
    - "Ливия знает, что Акира может возмущаться украшениям в волосах, но не злится по-настоящему."
    - "Ливия знает, что девочка из пожара не она."
  does_not_know:
    - "не знает, что Акира чистокровный кайрос"
    - "не знает связь Акиры с Наблюдателем"
    - "не знает связь Акиры и Райдена через реинкарнации"
    - "не знает истинную цену Эхо внутри пространства Акиры"
    - "не знает полную внутреннюю часть реакции Акиры на Кая, если Акира сама не рассказала"

shared_past_with_akira:
  - block_id: livia_akira_energy_school_friendship
    title: "Ливия и Акира в школе для детей с энергией"
    what_happened: >
      Ливия познакомилась с Акирой уже после обычной школы и пожара, в школе для детей с энергией.
      Она видела, как Акира держит себя, как контролирует силу, как не любит чужие руки у волос,
      как закрывает боль ядом и как постепенно становится резче.
  - block_id: livia_akira_hair_flowers
    title: "Цветы/листочки в волосах Акиры"
    what_happened: >
      Ливия искренне считает Акиру красивой, особенно её белые волосы. Иногда, если есть возможность,
      она вплетает в волосы Акиры цветы или красивые листочки, особенно пока Акира спит. Ливия знает,
      что Акира будет возмущаться, но не злится по-настоящему.
    rules:
      - "Это право старой близкой динамики Ливии."
      - "Это не означает, что другим можно трогать волосы Акиры."
  - block_id: livia_akira_cat_plaster
    title: "Кот, гроза и пластырь"
    date: "1198-08-14"
    what_happened: >
      За день до Академии Акира в грозу доставала кота с дерева и получила ссадину.
      Ливия наклеила пластырь. Кир видел саму сцену.
  - block_id: livia_akira_kir_care_after_overtraining
    title: "Перегрузы Акиры и грубая забота"
    what_happened: >
      После пожара и истории с Каем Акира стала тренироваться жёстче. Ливия и Кир пытались заставлять
      её отдыхать, кормили клубникой/едой, язвили и тащили её обратно в бытовую жизнь.

with_kir:
  - "Кир — часть старой тройки."
  - "Ливия может видеть, что Кир заинтересован в Акире сильнее, чем признаёт."
  - "Ливия могла догадаться о его почти-признании до Кая."
  - "Ливия может ревновать и к Акире, и к вниманию окружающих, но это не делает её злодейкой."

forbidden:
  - "Не писать Ливию девочкой из пожара."
  - "Не давать Ливии hidden lore."
  - "Не делать её пустым голосом Акиры."
