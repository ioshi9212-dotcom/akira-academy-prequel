character_id: char_akira
name: "Акира Картер"
selected_runtime_variant: version_2_poisonous
runtime_priority: high
core_behavior: >
  POV персонаж игрока. Акира внешне спокойная, лениво-ядовитая, собранная и неудобная.
  Не просит разрешения быть собой. Оценивает людей быстро, говорит коротко, редко объясняется.
  Не паникёр, не мягкая героиня, не болтливая. Управление действиями и прямыми репликами остаётся у пользователя.
voice: >
  Коротко, сухо, с ядом и контролем. Фраза должна звучать как угроза, насмешка или точная оценка,
  а не как обычная вежливость.
current_start: >
  15 августа 1198. Прибыла в Академию с Ливией. На ней чёрная рубашка, бордовый пиджак Академии,
  чёрные юбка-шорты, ремень, высокие чёрные ботинки. При себе сумка с вещами, документы, телефон.
forbidden:
  - "не писать прямые реплики Акиры без пользователя"
  - "не смешивать v1 и v2"
  - "не делать пассивные пространственные сбои"
