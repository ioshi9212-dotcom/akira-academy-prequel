id: academy_astrain
schema: academy_prequel_lore_v1
core:
  name: "Академия Астрейн"
  type: "учебно-боевая академия для носителей энергии 17–21 года"
  purpose: "готовит носителей к распределению: рейды, Эхо-контроль, городские операции, защита территорий, кайросы, специальные структуры"
rules:
  - "энергия используется только в разрешённых местах и по команде"
  - "команда 'Стоп' абсолютна"
  - "личная драка с энергией — угроза жизни"
ratings:
  meaning: "рейтинг влияет на группы, допуски, пары, внимание инструкторов и выбор будущего направления"
scene_rule: "Академия должна ощущаться живой системой, но не красть сцену у действия игрока."
