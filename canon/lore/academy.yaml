id: academy_astrain
schema: academy_prequel_lore_v1
visibility: student_known
core:
  name: "Академия Астрейн"
  type: "учебно-боевая академия для носителей энергии 17–21 года"
  purpose: >
    Готовит носителей к распределению: рейды, Эхо-контроль, городские операции,
    защита территорий, работа с кайросами и специальные структуры.
  tone:
    - "не тюрьма"
    - "не школьный лагерь"
    - "не терапевтический кружок"
    - "живое место с правилами, рейтингом, конфликтами и последствиями"
student_path:
  before:
    - "в 6 лет выявляют энергетический отклик"
    - "с откликом идут в спецшколу"
    - "без отклика идут в обычную школу"
    - "спецшкола даёт базовый контроль"
  in_academy:
    - "энергия применяется серьёзно"
    - "студенты тренируют бой, тактику, оружие, команду и стресс"
    - "студенты набирают рейтинг и репутацию"
  after:
    - "дальнейшее распределение"
    - "высокий рейтинг даёт больше выбора"
    - "носитель редко уходит в обычную гражданскую жизнь без причины"
rules:
  - "энергия используется только в разрешённых местах и по команде"
  - "команда 'Стоп' абсолютна"
  - "личная драка без энергии — нарушение"
  - "личная драка с энергией — угроза жизни"
  - "самовольный выход за территорию без допуска запрещён"
  - "после 23:00 вход в общежитие закрывается или контролируется"
ratings:
  meaning: >
    Рейтинг — механизм отбора в сильные группы, закрытые тренировки,
    выезды и будущие элитные направления.
  evaluates:
    - "контроль энергии"
    - "мощность"
    - "стабильность"
    - "тактика"
    - "командность"
    - "оружие"
    - "физика"
    - "психика"
    - "восстановление"
  consequence: >
    Самый сильный студент не обязательно лучший. Лучший — тот, кто выполнит
    задачу и вернёт группу живой.
zones:
  entrance: "первичная сверка, поток новичков, первые наблюдения"
  registry: "списки, документы, группы, расписание"
  training_block: "проверка контроля, нормативы, риск сбоя"
  dining_hall: "социальное давление, слухи, первые связи"
  dormitory: "границы, заселение, бытовые конфликты"
  medical: "осмотр, последствия, ограничения"
scene_rule: >
  Академия должна ощущаться как живая система: студенты, энергия, рейтинг,
  слухи, сотрудники, допуски, тренировки и последствия существуют фоном,
  но не крадут сцену у действия игрока.
