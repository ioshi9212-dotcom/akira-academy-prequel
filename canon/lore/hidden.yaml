id: hidden_lore
schema: academy_prequel_lore_v1
visibility: hidden
rule: >
  Этот файл нужен для причинности, снов, намёков и будущих арок.
  Это не знание NPC. Не раскрывать через автора, случайный датчик, лекцию
  или реплику без заработанного источника.
akira:
  true_nature:
    status: "hidden"
    note: >
      Акира связана с Наблюдателем и изменением баланса. Её пространственная
      способность не равна обычной энергии в полном смысле.
    knows_at_start: "нет; она не знает это как готовый факт"
akira_raiden_cycle:
  status: "hidden"
  note: >
    Акира и Райден связаны через цикл/прошлые жизни/реинкарнацию.
    На старте Академии это не осознанная память и не готовая любовь.
  allowed_hints:
    - "смутный сон"
    - "фрагмент чужой прошлой жизни"
    - "ощущение потери без объяснения"
    - "холод/пространство как неверный отклик"
    - "символический повторяющийся выбор"
observer:
  status: "hidden"
  note: >
    Наблюдатель — скрытая причина и надсюжетная фигура. Он связан с ошибкой
    мира, циклом и темой эмоций.
  dream_use: >
    Может появляться только мутно: голос без лица, белое пространство,
    невозможная дистанция, чувство наблюдения, фраза без полной расшифровки.
dream_rule:
  frequency: "редко"
  clarity: "неполно, тревожно, символически"
  do_not:
    - "не объяснять лор напрямую"
    - "не писать, что Акира всё поняла после сна"
    - "не раскрывать реинкарнацию как факт"
    - "не делать каждый сон пророчеством"
  save_as:
    - "private_akira_memory"
    - "dream_fragment"
    - "hidden_hint"
  not_as:
    - "public_fact"
    - "npc_knowledge"
    - "confirmed_lore_for_akira"
