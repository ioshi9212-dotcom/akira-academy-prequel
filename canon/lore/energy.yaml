id: energy_world_rules
schema: academy_prequel_lore_v1
core:
  principle: "Энергия — часть мира, тела, эмоций и среды."
  not_magic: "не декоративная магия и не универсальное решение"
background_presence:
  rule: "У сильных или эмоционально напряжённых носителей энергия может ощущаться фоном, но не обязана вспыхивать в каждой сцене."
control_rules:
  - "чем сильнее эмоции, боль, усталость или голод, тем хуже контроль"
  - "чем слабее тело, тем опаснее собственная энергия"
kairos_control:
  visibility: "hidden_causal_lore"
  note: "кайросам легче держать контроль из-за иной эмоциональной амплитуды, но они не роботы"
academy_scene_rule: "Добавлять 0–1 небольшой физический след энергии только если он усиливает сцену."
