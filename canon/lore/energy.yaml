id: energy_world_rules
schema: academy_prequel_lore_v1
visibility: public_or_student_known
core:
  principle: >
    Энергия — суть этого мира. Она есть в теле, среде, эмоциях, быту,
    тренировках, социальных реакциях и Академии как системе.
  not_magic:
    - "не декоративная магия"
    - "не чудо из ничего"
    - "не универсальное решение"
    - "не спецэффект в каждой бытовой сцене"
background_presence:
  rule: >
    У сильных или эмоционально напряжённых носителей энергия может ощущаться
    фоном: как жар, холод, давление, вибрация, свет, тяжесть, запах, изменение
    воздуха или реакция среды. Это не всегда означает активное применение силы.
  use_limit: >
    Фоновое ощущение энергии допустимо, если связано с персонажем, эмоцией,
    усталостью, местом или сценическим давлением. Не повторять один и тот же
    эффект в каждой сцене.
control_rules:
  - "чем сильнее эмоции, тем хуже контроль"
  - "чем сильнее усталость, боль или голод, тем хуже контроль"
  - "чем слабее тело, тем опаснее собственная энергия для носителя"
  - "контроль — это не только сила воли, но и физическое состояние, привычка, опыт и среда"
  - "энергия может вредить самому носителю, если тело или контроль не выдерживают"
kairos_control:
  hidden_reason: >
    Кайросы часто легче удерживают контроль не потому, что они просто сильнее,
    а потому что их эмоциональная амплитуда устроена иначе. Наблюдатель считал
    эмоции причиной войн и хаоса, поэтому создал существ с подавленной или иной
    эмоциональной основой.
  nuance: >
    Это не значит, что кайросы ничего не чувствуют. Но на материке кайросов
    многие живут с меньшими человеческими эмоциональными всплесками, поэтому
    энергия реже срывается из-за эмоций.
  visibility: "hidden_causal_lore; не давать как публичную лекцию"
visible_effects:
  possible:
    - "жар"
    - "холод"
    - "давление"
    - "свет"
    - "вибрация"
    - "звук"
    - "запах озона, гари, металла или мокрого бетона"
    - "реакция тела"
    - "реакция датчика"
    - "изменение траектории"
    - "изменение поверхности"
academy_scene_rule: >
  В сценах Академии можно добавлять 0–1 маленький физический след энергии,
  если это усиливает сцену. Не добавлять энергию автоматически в каждый абзац.
character_specific_rule: >
  Личные проявления энергии брать из character.yaml персонажа. Общий файл
  задаёт принципы, а не шаблонные повторяющиеся фразы.
