id: world
schema: academy_prequel_lore_v1
visibility: public_or_semi_public
world:
  year: 1198
  frame: "Академия Астрейн, предыстория"
people_and_carriers:
  ordinary_people:
    description: "люди без выявленного энергетического отклика"
    life_path: "имеют больше бытовой свободы и могут выбирать обычные гражданские профессии"
  energy_carriers:
    description: "люди с выявленным энергетическим откликом"
    population_note: >
      Носителей много. В некоторых регионах и поколениях их может быть даже больше,
      чем обычных людей. Носитель энергии — не легенда и не автоматическая элита.
    freedom_limit: >
      У носителей меньше гражданской свободы, чем у обычных людей. Если система
      нуждается в их типе энергии, они почти всегда попадают в нужные структуры:
      академии, рейдовые, военные, охранные, медицинские, инженерные, барьерные,
      исследовательские или специальные службы.
    family_pressure: >
      Носителей не презирают и не избегают по умолчанию, но связь с носителем —
      серьёзное решение. Ребёнок с высокой вероятностью тоже станет носителем,
      его проверят и могут отправить в спецшколу. Не все обычные люди хотят
      связывать жизнь с системой, распределением и риском.
child_detection:
  age: 6
  rule: "В 6 лет детей проверяют на энергетический отклик. Это обычная норма мира."
  if_response_detected:
    path: "специальная школа для детей с энергией"
    purpose:
      - "безопасность ребёнка и окружающих"
      - "базовый контроль энергии"
      - "понимание типа энергии"
      - "дисциплина и подготовка к системе"
  if_no_response:
    path: "обычная школа для обычных людей"
    note: >
      Если отклика нет, ребёнок считается обычным и идёт в обычную школу.
      Ошибка выявления возможна, но не является нормой.
education_path:
  ordinary_school:
    for: "дети без выявленного энергетического отклика"
    note: "обычная школа не рассчитана на детские энергетические срывы"
  energy_school:
    for: "дети с выявленным энергетическим откликом"
    purpose:
      - "научить базовому контролю"
      - "снизить риск срывов"
      - "дать понимание своего типа энергии"
    not_academy: "это ещё не полноценная боевая подготовка"
  academy:
    for: "носители 17–21 года после базовой школы контроля"
    purpose: >
      Академия уже серьёзно тренирует: энергия, физика, оружие, тактика,
      стресс, командная работа, рейтинг, допуски и опыт для дальнейшего распределения.
distribution:
  rule: >
    После обучения носитель применяется системой. Чем выше успех, рейтинг,
    контроль и репутация, тем больше выбора у студента, куда идти дальше.
  high_success:
    - "больше выбора"
    - "доступ к элитным направлениям"
    - "рекомендации инструкторов и командиров"
  low_success:
    - "меньше выбора"
    - "более жёсткое назначение"
    - "менее престижные или более рутинные направления"
kairos:
  public_status: "существуют; не миф"
  public_attitude:
    - "люди считают кайросов чужими и опасными"
    - "проживание кайроса среди людей запрещено или преследуется"
    - "скрывающийся кайрос может жить среди людей, если не проявляет себя"
  detection_rule: >
    Нет простого анализа, который гарантированно отличает человека от кайроса
    в любой ситуации. Не позволять NPC мгновенно определять кайроса без источника.
echo:
  public_status: "существуют и опасны"
  description: >
    Эхо связывают с пространственно-энергетическими аномалиями, разрушениями
    и угрозой для территорий. Эхо не обычный враг и не действует как человек.
  combat_note: >
    Против Эхо обычное оружие почти бесполезно без энергии, тактики и группы.
not_public:
  - "истинная природа Акиры"
  - "связь Акиры с Наблюдателем"
  - "цикл/реинкарнация Акиры и Райдена"
  - "гибридность Райдена"
  - "скрытая линия Самуэля"
