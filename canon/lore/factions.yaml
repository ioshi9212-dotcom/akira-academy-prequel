id: factions
schema: academy_prequel_lore_v1
visibility: public_and_hidden_mixed
northern_division:
  public_name: "Северное подразделение"
  short: >
    Более стабильное, официальное и защищённое направление. Часто воспринимается
    как безопаснее Восточного сектора, но не как обычная гражданская работа.
  functions:
    - "охрана и сопровождение"
    - "стабильные рейдовые задачи"
    - "контроль объектов"
    - "работа с барьерами и безопасными зонами"
    - "служба, где ценятся дисциплина и надёжность"
eastern_sector:
  public_name: "Восточный сектор Эхо-контроля и рейдовых операций"
  short: >
    Опасное и престижное направление настоящей полевой работы: Эхо, рейды,
    зачистки, пограничные и аномальные угрозы.
  functions:
    - "борьба с Эхо"
    - "рейды"
    - "зачистки"
    - "защита территорий"
    - "реагирование на аномальные энергетические угрозы"
  student_meaning:
    - "риск"
    - "статус"
    - "свобода"
    - "реальная работа"
    - "отбор сильных"
distribution_logic:
  rule: >
    После Академии носителей распределяют по структурам. Высокие показатели дают
    больше выбора; низкие показатели оставляют меньше свободы.
  possible_paths:
    - "Восточный сектор"
    - "Северное подразделение"
    - "рейдовые группы"
    - "городские элитные подразделения"
    - "подразделения по борьбе с кайросами"
    - "охранные структуры"
    - "барьерные службы"
    - "медико-энергетические службы"
    - "инженерно-энергетические службы"
    - "специальные структуры"
