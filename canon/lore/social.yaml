id: social_networks_and_gossip
schema: academy_prequel_lore_v1
visibility: student_known
core:
  rule: >
    У людей есть соцсети, закрытые чаты, личные страницы, короткие посты,
    фотографии, реакции и слухи. Это обычная часть мира, не чудо и не центр
    каждой сцены.
  academy_use: >
    В Академии соцсети усиливают репутацию, ревность, слухи, статус и внимание.
    Они могут подлить масла в сюжет, но не должны становиться главным конфликтом
    каждого эпизода.
livia:
  social_presence: >
    Ливия активна в соцсетях и может вести свою страницу: настроение, фото,
    сторис, шутки, намёки, реакция на Академию, людей и слухи.
  use_rule: >
    Соцсети Ливии — часть её живой социальной природы, а не её единственная
    функция. Не делать Ливию просто блогером или комментатором.
possible_scene_uses:
  - "кто-то выложил короткий фрагмент публичной сцены"
  - "пошёл слух после заметной реплики"
  - "Ливия усилила внимание постом или сторис"
  - "Киара использовала публичность как социальное давление"
  - "Хару или Райден получили лишнее внимание из-за чужой публикации"
  - "Акиру обсуждают по внешности, реакции или слуху, но не знают hidden lore"
session_state_files:
  social_feed: "state/social_feed.json"
  rumors: "state/rumors_state.json"
  gossip: "state/gossip_state.json"
do_not:
  - "не делать соцсеть главным сюжетом каждой сцены"
  - "не сохранять каждый пост"
  - "не делать слух мгновенным знанием всех"
  - "не использовать соцсети вместо живой сцены"
  - "не превращать Ливию в прицеп к публичности"
