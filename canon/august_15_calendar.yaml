id: august_15_calendar
file_type: calendar_day_plan
version: draft_v1

date: "1198-08-15"
label: "прибытие / регистрация / заселение"

calendar_rules:
  - "15 августа календарь должен тянуть только события 15 августа."
  - "Не подтягивать 16, 17, 23–30, 31 августа, если сцена ещё не перешла туда."
  - "Если 15 августа завершён, календарь 15 августа больше не использовать как активный план."
  - "После завершения дня фиксировать только то, что реально произошло в сценах."
  - "Не считать несыгранные пункты календаря уже случившимися."
  - "Календарь даёт допустимый порядок и фон, но не заставляет все события случиться одинаково."

day_core:
  - "Акира и Ливия приходят вместе."
  - "Сцена начинается не сразу внутри Академии, а с улицы/подхода."
  - "Первым их встречает Хару."
  - "Райден может быть в поле зрения/фоне, но делает вид, что не замечает."
  - "Дальше развитие зависит от игрока и сцены."
  - "Кир появляется чуть позже как опоздавший, не как новый знакомый."

order:
  - step_id: approach
    label: "Подход к Академии"
    notes:
      - "Акира и Ливия вместе."
      - "Внешний вид Академии и поток новичков коротко, без экскурсии на страницу."
      - "Хару может первым попасть в поле внимания/контакт."
      - "Райден может быть заметен фоном, но не должен сразу вступать без причины."
  - step_id: registration
    label: "Регистрация"
    notes:
      - "Короткая функциональная регистрация."
      - "Без раскрытия конфиденциального досье."
      - "Фамилия Картер может быть на слуху, но Акира не кичится этим."
      - "Академия знает Джуна как командующего базой Восточного сектора."
      - "Это не статусный пропуск."
  - step_id: dorm_assignment
    label: "Заселение"
    notes:
      - "Акира и Ливия заселяются в комнату 214."
      - "Окна комнаты 214 не заперты и не заблокированы."
      - "Не делать общежитие тюрьмой."
  - step_id: kir_late_arrival
    label: "Кир появляется позже"
    notes:
      - "Кир опоздавший."
      - "Кир старая школьная связка Акиры и Ливии."
      - "Не знакомить Кира с Акирой и Ливией с нуля."
  - step_id: medical_check
    label: "Медосмотр"
    notes:
      - "Можно отметить ссадины, порезы и ушибы Акиры."
      - "Можно отметить крепкое тело, особенно ноги."
      - "Можно спросить про происхождение травм."
      - "Можно сослаться на семью военных/фамилию Картер без давления."
  - step_id: energy_response
    label: "Энергетический отклик"
    notes:
      - "Отклик для подтверждения типа."
      - "Не больше."
      - "Акира может дать минимальный контролируемый отклик."
      - "Не раскрывать максимум."
      - "Не делать вывод 'она скрывает весь потенциал' сразу."
  - step_id: free_day
    label: "Свободный день"
    notes:
      - "NPC и крючки допустимы."
      - "Не раздувать день пустыми проходами."
      - "Если сцена бытовая без события — коротко перемотать до значимого момента."

allowed_characters_on_august_15:
  akira: "игрок управляет"
  livia: "рядом с Акирой с начала"
  haru: "первый внешний контакт / социальный узел"
  raiden: "может быть фоном или заметной фигурой, делает вид, что не замечает; прямой контакт требует причины"
  kir: "позже, опоздавший"
  kiara: "не вводить без причины на первом входе"
  kael_north: "не вводить 15 августа без отдельного решения"

forbidden:
  - "Не тянуть день по минутам."
  - "Не распаковывать 16 августа до завершения 15."
  - "Не подтягивать события будущих дней как уже случившиеся."
  - "Не превращать регистрацию в долгий допрос."
  - "Не делать Акиру подозрительной для Академии."
  - "Не закрывать окна 214."
  - "Не делать еду/кофе доступом по браслету."
  - "Не делать баскетбол секретным тестом кураторов."
