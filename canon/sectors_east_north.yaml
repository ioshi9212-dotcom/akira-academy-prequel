id: sectors_east_north
file_type: canon_reference
version: draft_v1

purpose: >
  Файл читается только если в сцене упоминаются Восточный сектор, Северный сектор,
  Джун Картер, Самуэль, рейды, будущий выбор подразделения или статусные военные направления.

quick_context:
  - "Восточный сектор — рабочий, полевой, опасный, живой."
  - "Северный сектор — престижный, элитный, ресурсный, городской/витринный."
  - "Восточный не хуже Северного."
  - "Северный не автоматически правильнее Восточного."
  - "Выбор сектора — не просто статус, а мировоззрение."

eastern_sector:
  public_name: "Восточный сектор Эхо-контроля и рейдовых операций"
  commander: "Джун Картер"
  essence:
    - "борьба с Эхо"
    - "рейды"
    - "зачистки"
    - "защита территорий"
    - "реагирование на аномальные пространственные/энергетические угрозы"
    - "полевые операции"
    - "открытые точки с Эхо и кайросами"
  tone:
    - "проще"
    - "живее"
    - "опаснее"
    - "меньше статуса"
    - "больше реальной грязной работы"
  principle:
    - "туда идут те, кто не ищет статуса, власти или тёплого кресла"
    - "принцип Джуна: место найдётся каждому"
    - "это не означает, что Восточный разбрасывается рейдерами"
    - "там своя семья, своя ответственность и свои потери"
  reputation:
    - "не престижная витрина"
    - "опасное направление"
    - "чаще погибают"
    - "уважение там не даётся формой"
  future_notes:
    - "в 1206 Райден, Хару и некоторые другие уходят именно в Восточный"
    - "для Райдена это способ уйти от семейного статуса и выбрать реальную работу"
    - "для Хару это естественная линия действия, риска и живой команды"

northern_sector:
  public_name: "Северный сектор / элитное городское направление"
  essence:
    - "престиж"
    - "городские операции"
    - "лучшее оборудование"
    - "лучшее оружие"
    - "лучшая униформа"
    - "отбор лучших из лучших"
    - "больше статуса и видимости"
  tone:
    - "элитнее"
    - "дороже"
    - "чище визуально"
    - "престижнее"
    - "ближе к красоте города"
  not_weak:
    - "Северный не слабый."
    - "Северный берёт лучших из лучших."
    - "Северный не обязан принимать просто по желанию: место нужно заслужить."
  akira_future_note:
    - "Акира в будущем выберет Северный не ради статуса."
    - "Причины сейчас не раскрывать: это рано."

comparison:
  east_vs_north:
    - "Восточный — место для тех, кто выбирает работу, риск и людей."
    - "Северный — место для тех, кто прошёл жёсткий элитный отбор и работает в более престижной системе."
    - "Восточный принимает шире, потому что на опасной работе место найдётся каждому, кто готов отвечать."
    - "Северный принимает уже доказавших, что они одни из лучших."
  forbidden:
    - "Не писать Восточный как мусорный или слабый."
    - "Не писать Северный как единственно правильный."
    - "Не делать Восточный социальным дном."
    - "Не делать выбор Восточного наказанием."
    - "Не раскрывать будущий выбор Акиры заранее."
