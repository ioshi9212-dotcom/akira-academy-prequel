id: academy_core_1198
file_type: canon_rules
version: draft_v1

purpose: >
  Коротко и чётко фиксирует, что такое Академия Астрейн в 1198 году,
  чтобы ИИ не превращал её в тюрьму, теплицу, подозрительную лабораторию или школу базового контроля энергии.

quick_context:
  - "Академия Астрейн не учит детей впервые пользоваться энергией."
  - "Базовый контроль энергии проходят в школе для детей с энергией."
  - "Академия готовит рейдеров."
  - "Рейдеры должны работать с Эхо, кайросами, открытыми точками, боевыми рисками и последствиями решений."
  - "Академия не боится сильных студентов."
  - "Академия не любит не силу, а ложь о возможностях, отсутствие контроля и безответственность."
  - "Сильный и контролируемый студент ценен для системы."

academy_is_not:
  - "не тюрьма"
  - "не лаборатория, которая паникует от каждого редкого типа"
  - "не школа для малышей, где учат базово держать энергию"
  - "не элитный клуб только для богатых"
  - "не место, где еда выдаётся по браслету как в карцере"
  - "не место, где баскетбол автоматически считается тайным тестом куратора"

who_studies_here:
  - "дети из статусных семей"
  - "сильные студенты, прошедшие экзамен и допуск"
  - "сироты и люди без статуса, если они прошли отбор"
  - "те, кто потенциально может стать рейдером"
  - "Хару — пример: он не богатый дурачок, а сильный студент с тяжёлым прошлым"

first_week:
  purpose: "личная проверка Академии, не обучение с нуля"
  checks:
    - "документы"
    - "физическое состояние"
    - "медосмотр"
    - "базовый энергетический отклик"
    - "тип энергии"
    - "контроль"
    - "реакция на давление"
    - "готовность отвечать за действия"
  rules:
    - "Не раздувать регистрацию."
    - "Не раскрывать конфиденциальные досье на входе."
    - "Энергетический отклик нужен для подтверждения типа, а не для раскрытия максимума."
    - "Академия не должна сразу понимать, что Акира не показывает весь потенциал."
    - "Физически сильные/редкие студенты не получают автоматические жёлтые метки."

training_and_consequences:
  - "Спарринги возможны."
  - "Допзанятия возможны."
  - "Оружие возможно, но только в тренировочных зонах и по правилам."
  - "Личное оружие не носят свободно по общежитию."
  - "Новички не ходят в тренировочные зоны одни: куратор, старший студент или наблюдение."
  - "Тренировочные зоны не закрываются только потому, что идёт первая неделя."
  - "Подрался — отвечаешь за последствия."
  - "Перенапрягся — твои проблемы и твоя ответственность."
  - "Академия учит не избегать риска, а понимать цену действия."

akira_handling_rule:
  public_academy_view:
    - "Акира Картер — дочь Джуна Картера по доступным документам."
    - "Джун Картер — командующий базой Восточного сектора."
    - "У Акиры есть короткое конфиденциальное досье."
    - "У Акиры редкий пространственный тип/аномальность."
    - "У Акиры сильная физическая подготовка, особенно ноги."
    - "Фамилия Картер на слуху, но это не элитный статус и не пропуск без проверок."
  forbidden:
    - "Не делать Акиру странной для Академии с первой минуты."
    - "Не делать Академию мгновенно понимающей её скрытый максимум."
    - "Не делать регистрацию допросом."
    - "Не делать её особенной для Академии раньше сцены."
    - "Не ставить жёлтые метки только из-за идеального контроля или редкого типа."

raiden_handling_rule:
  - "Райден не скрывает потенциал намеренно."
  - "Он показывает то, что реально умеет."
  - "Его раздражает, когда другие сверяют его с семейным статусом."
  - "Его раздражает скрытность уровня, потому что системе неудобно оценить человека для угрозы."

forbidden:
  - "Не писать доступ к кофе/еде по браслету без нужды."
  - "Не делать баскетбол под постоянным наблюдением кураторов."
  - "Не превращать сильных студентов в хрустальных."
  - "Не запрещать всё из страха срыва."
  - "Не делать Академию врагом способностей Акиры."
