id: energy_lineage_lore
file_type: canon_lore
version: draft_v1

purpose: >
  Короткий фон лора энергии, кайросов и гибридов. Читать при сценах с происхождением энергии,
  классификацией, гибридами, сильными носителями, срывами и рассуждениями Академии о пригодности рейдера.

quick_context:
  - "Люди с энергией являются потомками гибридных линий."
  - "Кайрос + человек = гибрид."
  - "Гибриды сильные и опасные."
  - "Раньше гибридов истребляли."
  - "В современности их не уничтожают автоматически, но контролируют и ограничивают."
  - "Сильная энергия без контроля тела и психики опасна."
  - "Слабая энергия не делает человека слабым рейдером."

hybrids:
  definition: "потомки связи кайроса и человека"
  historical_treatment:
    - "раньше гибридов часто истребляли"
    - "их считали нестабильными и опасными"
  current_treatment:
    - "сейчас их не убивают автоматически"
    - "за ними могут жёстко следить"
    - "нестабильных могут изолировать, ограничить или сломать жизнь"
    - "если гибрид перестаёт контролировать себя, его могут фактически превратить в овощ"
  knowledge_rule:
    - "не каждый персонаж знает, кто является гибридом"
    - "Райден не знает, что он гибрид"
    - "Самуэль и отец Райдена знают/подозревают правду о Райдена; точность знания уточняется сценами"

energy_strength:
  rule:
    - "чем ближе линия к кайросу/гибриду, тем потенциально сильнее может быть энергия"
    - "но близость к кайросу не равна автоматической силе"
    - "слабый по энергии человек может быть сильным через контроль, тело, психику, тактику и дисциплину"
    - "сильная энергия без тела и головы может сломать носителя"
  examples:
    - "Райден и Хару сильные не потому, что перекачанные дебилы, а потому что иначе тело не выдержит их силу."
    - "Акира бегает и тренируется не просто потому, что любит, а потому что это контроль и дисциплина."
    - "Рэй силён не особым типом, а телом, головой, опытом и тактикой."

academy_use:
  - "Академия ценит сильных контролируемых студентов."
  - "Академия должна знать реальные возможности, чтобы правильно использовать человека в угрозе."
  - "Скрытый потенциал неудобен системе не морально, а функционально."
  - "Показуха выше возможностей опасна."
  - "Контроль важнее красивой демонстрации."

forbidden:
  - "Не писать, что сильная энергия автоматически делает лучшего рейдера."
  - "Не писать, что слабая энергия автоматически делает человека бесполезным."
  - "Не раскрывать гибридность Райдена через случайный разговор."
  - "Не делать Академию боящейся всех сильных носителей."
